<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2316a34a'/><text y='72' x='50' text-anchor='middle' font-size='60' font-family='Arial' font-weight='900' fill='white'>C</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usine Cataleya — Production</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --bg: #f5f6fa;
    --card: #ffffff;
    --border: #e8eaf0;
    --text: #1a1d2e;
    --text2: #6b7280;
    --text3: #9ca3af;

    /* Couleurs étapes */
    --c-stock:     #3b82f6;
    --c-cao:       #8b5cf6;
    --c-coupe:     #f97316;
    --c-etiq:      #14b8a6;
    --c-dispatch:  #84cc16;
    --c-ctrl1:     #f59e0b;
    --c-defauts:   #ef4444;
    --c-atelier:   #f97316;
    --c-final:     #22c55e;
    --c-admin:     #6366f1;

    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #screen-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 100%);
  }
  .login-box {
    background: var(--white);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .login-logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .login-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
  }
  .login-sub {
    color: var(--text2);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .login-field {
    margin-bottom: 16px;
    text-align: left;
  }
  .login-field label {
    display: block;
    font-weight: 700;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .login-field input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--c-admin); }
  .btn-login {
    width: 100%;
    padding: 16px;
    background: var(--c-admin);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 17px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .login-error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 12px;
    display: none;
  }

  /* ── APP SHELL ── */
  #screen-app { display: none; min-height: 100vh; flex-direction: column; }
  #screen-app.visible { display: flex; }

  /* Header */
  .app-header {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo { font-size: 28px; }
  .header-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
  }
  .header-title span {
    font-weight: 400;
    color: var(--text2);
    font-size: 14px;
    display: block;
    line-height: 1;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    padding: 6px 12px 6px 6px;
    border-radius: 50px;
    border: 2px solid var(--border);
  }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: white;
  }
  .user-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .btn-logout {
    background: none;
    border: 2px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

  /* Main content */
  .app-main {
    flex: 1;
    padding: 24px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* Page header */
  .page-header {
    margin-bottom: 28px;
  }
  .page-eyebrow {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .page-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
  }
  .page-sub {
    font-size: 15px;
    color: var(--text2);
    font-weight: 600;
  }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 2px solid var(--border);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  /* Boutons génériques */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--c-admin); color: white; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-success { background: var(--c-final); color: white; }
  .btn-success:hover { opacity: 0.88; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-danger:hover { opacity: 0.88; }
  .btn-ghost { background: var(--bg); color: var(--text); border: 2px solid var(--border); }
  .btn-ghost:hover { border-color: #9ca3af; }
  .btn-big {
    padding: 18px 28px;
    font-size: 17px;
    border-radius: var(--radius);
    width: 100%;
    justify-content: center;
  }

  /* Tâche / item de liste */
  .task-item {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .task-item:hover { border-color: #d1d5db; }
  .task-item-left { flex: 1; min-width: 0; }
  .task-item-icon {
    font-size: 32px;
    margin-bottom: 4px;
  }
  .task-item-name {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 2px;
  }
  .task-item-meta {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
  }
  .task-item-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 800;
  }

  /* Lot card — admin dashboard */
  .lot-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .lot-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lot-name {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
  }
  .lot-pieces {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
    margin-top: 2px;
  }

  /* Pipeline visuel */
  .pipeline {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .pipeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 60px;
  }
  .pipeline-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 3px solid var(--border);
    background: var(--bg);
    transition: all 0.2s;
  }
  .pipeline-dot.done {
    background: #dcfce7;
    border-color: #22c55e;
  }
  .pipeline-dot.current {
    background: #fff;
    border-width: 3px;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
    50% { box-shadow: 0 0 0 8px rgba(99,102,241,0.08); }
  }
  .pipeline-label {
    font-size: 9px;
    font-weight: 800;
    text-align: center;
    color: var(--text3);
    text-transform: uppercase;
    line-height: 1.2;
  }
  .pipeline-connector {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    flex-shrink: 0;
    max-width: 20px;
  }
  .pipeline-connector.done { background: #22c55e; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state-icon { font-size: 56px; margin-bottom: 12px; }
  .empty-state-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .empty-state-sub { font-size: 14px; font-weight: 600; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 14px 24px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: #22c55e; }
  #toast.error { background: #ef4444; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--white);
    border-radius: 24px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.95);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal-box { transform: scale(1); }
  .modal-title {
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 14px;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 24px;
  }
  .form-field { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    background: var(--white);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--c-admin); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* Nav tabs (admin) */
  .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: var(--radius-sm);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .nav-tab {
    flex: 1;
    min-width: 80px;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 800;
    font-family: inherit;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-align: center;
  }
  .nav-tab.active {
    background: var(--white);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-icon { font-size: 28px; margin-bottom: 6px; }
  .stat-num {
    font-size: 32px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Coupe table */
  .coupe-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .coupe-table th {
    background: var(--bg);
    padding: 10px 8px;
    font-weight: 800;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    border-bottom: 2px solid var(--border);
    text-align: center;
  }
  .coupe-table th:first-child { text-align: left; }
  .coupe-table td {
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-weight: 600;
  }
  .coupe-table td:first-child { text-align: left; font-weight: 700; }
  .coupe-cell-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .coupe-cell-btn:hover { border-color: var(--c-coupe); background: #fff7ed; }
  .coupe-cell-btn.done { background: #dcfce7; border-color: #22c55e; color: #15803d; }

  /* Section titre */
  .section-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 12px;
    margin-top: 24px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }
  .section-title:first-child { margin-top: 0; }

  /* Pièce detail card */
  .piece-history {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--bg);
    border: 2px solid var(--border);
  }
  .history-item.done { background: #f0fdf4; border-color: #bbf7d0; }
  .history-item.current { background: #eff6ff; border-color: #bfdbfe; }
  .history-item.returned { background: #fff7ed; border-color: #fed7aa; }
  .history-dot { font-size: 20px; width: 32px; text-align: center; }
  .history-text { flex: 1; }
  .history-stage { font-size: 14px; font-weight: 800; }
  .history-time { font-size: 12px; color: var(--text2); font-weight: 600; }

  /* Coming soon */
  .coming-soon {
    text-align: center;
    padding: 80px 20px;
    background: var(--card);
    border-radius: var(--radius);
    border: 2px dashed var(--border);
  }
  .coming-soon-icon { font-size: 64px; margin-bottom: 16px; }
  .coming-soon-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .coming-soon-sub { font-size: 15px; color: var(--text2); font-weight: 600; }

  /* Responsive */
  @media (max-width: 600px) {
    .app-main { padding: 16px; }
    .app-header { padding: 0 16px; }
    .header-title span { display: none; }
    .task-item { flex-direction: column; align-items: flex-start; }
    .task-item-actions { width: 100%; }
    .task-item-actions .btn { flex: 1; justify-content: center; }
    .modal-box { padding: 24px 20px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- ══ ÉCRAN LOGIN ══ -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">🧵</div>
    <div class="login-title">Usine Cataleya</div>
    <div class="login-sub">Gestion de Production</div>

    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="poste@usine-cataleyaparis.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══ ÉCRAN APP ══ -->
<div id="screen-app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-logo">🧵</div>
      <div class="header-title">
        Usine Cataleya
        <span>Gestion de Production</span>
      </div>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </header>

  <!-- Contenu principal -->
  <main class="app-main" id="app-main">
    <div class="empty-state">
      <div class="empty-state-icon">⏳</div>
      <div class="empty-state-title">Chargement…</div>
    </div>
  </main>
</div>

<!-- ══ MODALS ══ -->

<!-- Nouveau lot -->
<!-- Modal Zoom Photo -->
<div class="modal-overlay" id="modal-zoom" onclick="closeModal('modal-zoom')" style="cursor:zoom-out;background:rgba(0,0,0,0.85)">
  <img id="modal-zoom-img" src="" style="max-width:88vw;max-height:88vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)" onclick="event.stopPropagation()">
</div>

<div class="modal-overlay" id="modal-new-lot">
  <div class="modal-box">
    <div class="modal-title">➕ Nouveau Lot</div>
    <div class="modal-sub">Créer un nouveau lot de production</div>
    <div class="form-field">
      <label class="form-label">Nom du lot</label>
      <input class="form-input" id="new-lot-name" placeholder="Ex : LOT-MARS-001">
    </div>
    <div class="form-field">
      <label class="form-label">Nombre de pièces</label>
      <input class="form-input" type="number" id="new-lot-qty" placeholder="Ex : 24" min="1">
    </div>
    <div class="form-field">
      <label class="form-label">Description (optionnel)</label>
      <input class="form-input" id="new-lot-desc" placeholder="Ex : Abaya Sineme Noir S/M/L">
    </div>
    <div class="form-field">
      <label class="form-label">Liste de coupe (optionnel)</label>
      <select class="form-select" id="new-lot-liste">
        <option value="">— Aucune liste associée —</option>
      </select>
    </div>
    <div class="form-field" style="margin-bottom:0">

let currentUser = null;

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    errEl.textContent = '❌ Email ou mot de passe incorrect.';
    errEl.style.display = 'block';
  }
}

function doLogout() {
  auth.signOut();
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    currentEmail = user.email;
    currentRole = EMAIL_ROLE[user.email] || 'guest';
    // Déterminer coupe1/2/3 selon email
    if (currentRole === 'coupe') {
      if (currentEmail.includes('coupe1')) currentCoupeStage = 'coupe1';
      else if (currentEmail.includes('coupe2')) currentCoupeStage = 'coupe2';
      else currentCoupeStage = 'coupe3';
    }
    setupUserBadge();
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-app').classList.add('visible');
    startListeners();
  } else {
    currentUser = null; currentRole = null;
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('screen-app').classList.remove('visible');
  }
});

function setupUserBadge() {
  const info = ROLE_INFO[currentRole] || { label: currentRole, color:'#6b7280', avatar:'👤' };

  const nameEl   = document.getElementById('user-name');
  avatarEl.textContent = info.avatar;
  avatarEl.style.background = info.color;
  nameEl.textContent = info.label;
}

// ══════════════════════════════════════════════

let lotsLoaded = false;
let listesLoaded = false;

function startListeners() {
  db.ref('production').on('value', snap => {
    allLots = snap.val() || {};
    lotsLoaded = true;
    if (listesLoaded) render();
  });
  db.ref('listescoupe').on('value', snap => {
    allListes = snap.val() || {};
    listesLoaded = true;
    if (lotsLoaded) render();
  });
}

// ══════════════════════════════════════════════
// RENDU PRINCIPAL
// ══════════════════════════════════════════════
function render() {
  const main = document.getElementById('app-main');
  if (currentRole === 'admin') { renderAdmin(main); return; }
  if (currentRole === 'sara') { renderSara(main); return; }
  if (currentRole === 'cao') { renderCAO(main); return; }
  if (currentRole === 'coupe') { renderCoupe(main); return; }
  if (currentRole === 'atelier') { renderAbderrahim(main); return; }

  const stageId = ROLE_STAGE[currentRole];
  if (stageId) {
    const stageDef = STAGES.find(s => s.id === stageId);
    const canReturn = ['controle1','defauts','atelier','final'].includes(currentRole);
    renderPoste(stageId, stageDef, main, canReturn);
    return;
  }
  main.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔒</div><div class="empty-state-title">Accès non autorisé</div></div>`;
}

  const totalPieces = lots.reduce((s,[,l]) => s + (l.pieces ? Object.keys(l.pieces).length : 0), 0);

  main.innerHTML = `

      <div class="page-eyebrow">Administration</div>

      <button class="nav-tab ${adminTab==='produits'?'active':''}" onclick="setAdminTab('produits')">👗 Fiches Produits</button>
      <button class="nav-tab ${adminTab==='listes'?'active':''}" onclick="setAdminTab('listes')">📋 Listes Coupe</button>
      <button class="nav-tab ${adminTab==='patrons'?'active':''}" onclick="setAdminTab('patrons')">📐 Patrons</button>

  adminTab = tab;
  renderAdmin(document.getElementById('app-main'));

  setTimeout(() => {
    const el = document.getElementById('admin-tab-content');
    if (el) renderAdminTab();

}

function renderAdminTab() {
  const el = document.getElementById('admin-tab-content');
  if (adminTab === 'lots') renderAdminLots(el);
  else if (adminTab === 'pipeline') renderAdminPipeline(el);
  else if (adminTab === 'listes') renderAdminListes(el);
  else if (adminTab === 'reset') renderAdminReset(el);
  else if (adminTab === 'produits') renderComingSoon(el, '👗', 'Fiches Produits', 'Cette section permettra de gérer les fiches de chaque modèle (photos, matières, références…)');
  else if (adminTab === 'patrons') renderComingSoon(el, '📐', 'Patrons de Couture', 'Cette section permettra d\'uploader et gérer les patrons pour chaque modèle.');
}

function renderAdminLots(el) {
  const search = (document.getElementById('lots-search')?.value || '').toLowerCase().trim();
  let lots = Object.entries(allLots).sort((a,b) => (a[1].name||'').localeCompare(b[1].name||'', 'fr'));
  if (search) lots = lots.filter(([,l]) => (l.name||'').toLowerCase().includes(search));

  let html = `
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <input id="lots-search" class="form-input" placeholder="🔍 Rechercher un lot…" style="flex:1;min-width:200px" oninput="renderAdminLots(document.getElementById('admin-tab-content'))" value="${search}">
      <button class="btn btn-primary" onclick="populateListeSelect();openModal('modal-new-lot')">➕ Nouveau Lot</button>
    </div>`;

  if (!lots.length) {
    html += search
      ? `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-title">Aucun résultat</div><div class="empty-state-sub">Aucun lot ne correspond à "${search}"</div></div>`
      : `<div class="empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-title">Aucun lot</div><div class="empty-state-sub">Activez une liste de coupe pour créer les lots automatiquement</div></div>`;
    el.innerHTML = html; return;
  }

  html += lots.map(([lid, lot]) => {
    const stage = getCurrentStage(lot);
    const stageDef = STAGES.find(s => s.id === stage);
    const pieces = lot.pieces ? Object.entries(lot.pieces) : [];
    const done = pieces.filter(([,p]) => p.stage === 'final' || isLotDone(lot)).length;

    return `
      <div class="lot-card">
        <div class="lot-card-header">
          <div>
            <div class="lot-name">${lot.name || lid}</div>
            <div class="lot-pieces">${pieces.length} pièce${pieces.length>1?'s':''} · Créé ${ts(lot.createdAt)}</div>
            ${lot.description ? `<div class="lot-pieces" style="margin-top:2px">📝 ${lot.description}</div>` : ''}
          </div>
          <div style="text-align:right">
            ${stageDef ? `<span class="badge" style="background:${stageDef.color}22;color:${stageDef.color};font-size:13px;padding:6px 14px">${stageDef.icon} ${stageDef.label}</span>` : '<span class="badge" style="background:#dcfce7;color:#15803d">✅ Terminé</span>'}
          </div>
        </div>
        ${renderPipelineHtml(lot)}
        ${pieces.length > 0 ? `
        <div style="margin-top:16px">
          <div class="section-title">Pièces</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${pieces.map(([pid, p]) => {
              const pStage = STAGES.find(s=>s.id===p.stage);
              return `<span class="badge" style="background:${pStage?pStage.color+'22':'#f3f4f6'};color:${pStage?pStage.color:'#6b7280'};cursor:pointer;padding:6px 12px;font-size:12px" onclick="showPieceDetail('${lid}','${pid}')">${p.name||pid} ${p.returnReason?'⚠️':''}</span>`;
            }).join('')}
          </div>
        </div>` : ''}
      </div>`;
  }).join('');

  el.innerHTML = html;
}

function renderAdminPipeline(el) {
  // Section retouches Abderrahim (hors pipeline)
  const retouches = [];
  Object.entries(allLots).forEach(([lid, lot]) => {
    if (!lot.pieces) return;
    Object.entries(lot.pieces).forEach(([pid, p]) => {
      if (p.stage === 'atelier') retouches.push({ name: p.name || pid, lotName: lot.name, reason: p.returnReason, from: p.returnedFrom });
    });
  });

  let html = '';

  // Bloc Abderrahim en haut si des retouches en cours
  if (retouches.length > 0) {
    html += `
      <div class="card" style="margin-bottom:20px;border:2px solid var(--c-atelier);background:#fff7ed">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:32px">🔧</span>
            <div>
              <div style="font-weight:900;font-size:18px;color:var(--c-atelier)">Retouches — Abderrahim</div>
              <div style="font-size:12px;color:var(--text2);font-weight:600">Chef Atelier · Pièces renvoyées pour correction</div>
            </div>
          </div>
          <span class="badge" style="background:var(--c-atelier)22;color:var(--c-atelier);font-size:16px;padding:8px 18px;font-weight:900">${retouches.length} pièce${retouches.length>1?'s':''}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${retouches.map(r => `
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:white;border-radius:10px;border:1px solid #fed7aa">
              <span style="font-size:18px">⚠️</span>
              <div style="flex:1">
                <div style="font-weight:800;font-size:14px">${r.name}</div>
                <div style="font-size:12px;color:var(--text2)">Lot : ${r.lotName}${r.from ? ` · Renvoyé depuis : ${r.from}` : ''}</div>
                ${r.reason ? `<div style="font-size:12px;color:#c2410c;font-weight:700;margin-top:2px">↩️ ${r.reason}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  html += `<div class="section-title">Vue Pipeline — Où en est chaque étape</div>`;

  STAGES.forEach(stage => {
    const items = [];
    Object.entries(allLots).forEach(([lid, lot]) => {
      if (stage.unit === 'lot') {
        if (getCurrentStage(lot) === stage.id) items.push({ name: lot.name, lot: lot });
      } else {
        if (lot.pieces) {
          Object.entries(lot.pieces).forEach(([pid, p]) => {
            if (p.stage === stage.id) items.push({ name: p.name || pid, lotName: lot.name });
          });
        }
      }
    });
    html += `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${items.length?'12px':'0'}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:24px">${stage.icon}</span>
            <div>
              <div style="font-weight:800;font-size:16px">${stage.label}</div>
              <div style="font-size:12px;color:var(--text2);font-weight:600">${stage.person}</div>
            </div>
          </div>
          <span class="badge" style="background:${stage.color}22;color:${stage.color};font-size:14px;padding:6px 14px">${items.length} ${stage.unit==='lot'?'lot':'pièce'}${items.length>1?'s':''}</span>
        </div>
        ${items.length ? `<div style="display:flex;flex-wrap:wrap;gap:8px">${items.map(i=>`<span class="badge" style="background:${stage.color}15;color:${stage.color};padding:5px 12px">${i.name}${i.lotName?` · ${i.lotName}`:''}</span>`).join('')}</div>` : ''}
      </div>`;
  });
  el.innerHTML = html;
}

function renderPipelineHtml(lot) {
  const currentStage = getCurrentStage(lot);
  const currentIdx = STAGES.findIndex(s => s.id === currentStage);

  let html = '<div class="pipeline">';
  STAGES.forEach((stage, idx) => {
    const isDone = idx < currentIdx || isLotDone(lot);
    const isCurrent = stage.id === currentStage;
    let dotClass = isDone ? 'done' : (isCurrent ? 'current' : '');
    let dotStyle = isCurrent ? `border-color:${stage.color}` : '';

    html += `<div class="pipeline-step">
      <div class="pipeline-dot ${dotClass}" style="${dotStyle}" title="${stage.label}">${isDone ? '✓' : stage.icon}</div>
      <div class="pipeline-label">${stage.short}</div>
    </div>`;
    if (idx < STAGES.length - 1) {
      html += `<div class="pipeline-connector ${isDone?'done':''}" style="align-self:start;margin-top:18px"></div>`;
    }
  });
  html += '</div>';
  return html;
}

function renderAdminListes(el) {
  const listes = Object.entries(allListes);
  if (!listes.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Aucune liste de coupe</div><div class="empty-state-sub">Créez des listes dans l'app Suivi de Production (index.html)</div></div>`;
    return;
  }

  let html = `<div class="section-title">Listes de coupe disponibles — Cliquez "Activer" pour créer les lots automatiquement</div>`;
  listes.forEach(([lid, liste]) => {
    const lignes = Object.values(liste.lignes || {});
    const lotsExistants = Object.values(allLots).filter(l => l.listeId === lid && !l.archived);

    // Détecter les modèles uniques
    const modeles = new Set();
    lignes.forEach(row => {
      const nom = (row.c || '').split('||')[0] || '';
      if (nom) modeles.add(getModele(nom));
    });

    const dejaCrees = lotsExistants.length;
    const total = modeles.size;
    const restants = total - dejaCrees;

    html += `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <div>

function caoToggleLot(lid) {
  const cb = document.getElementById(`cao-check-${lid}`);
  if (cb) { cb.checked = !cb.checked; caoUpdateCount(); }
}

function caoToggleAll(checked) {
  document.querySelectorAll('[id^="cao-check-"]').forEach(cb => cb.checked = checked);
  caoUpdateCount();
}

function caoUpdateCount() {
  const checked = document.querySelectorAll('[id^="cao-check-"]:checked').length;
  const total = document.querySelectorAll('[id^="cao-check-"]').length;
  const el = document.getElementById('cao-selected-count');
  if (el) el.textContent = checked > 0 ? `${checked} lot(s) sélectionné(s)` : '';
  const allCb = document.getElementById('cao-select-all');
  if (allCb) allCb.checked = checked === total && total > 0;
}

async function validateCAOBulk() {
  const table = document.getElementById('cao-table-bulk')?.value;
  if (!table) { toast('⚠️ Choisissez une table de coupe', 'error'); return; }
  const checked = [...document.querySelectorAll('[id^="cao-check-"]:checked')];
  if (!checked.length) { toast('⚠️ Sélectionnez au moins un lot', 'error'); return; }
  toast(`⏳ Assignation de ${checked.length} lot(s)...`, 'info');
  for (const cb of checked) {
    const lid = cb.id.replace('cao-check-', '');
    const lot = allLots[lid];
    if (!lot?.listeId) continue;
    await db.ref(`production/${lid}/coupeAssign`).set(table);
    await validateLotStage(lid, 'cao', table);
  }
  toast(`✅ ${checked.length} lot(s) assignés à la table !`, 'success');
}

async function validateCAO(lotId) {
  const table = document.getElementById(`cao-table-${lotId}`)?.value;
  if (!table) { toast('⚠️ Choisissez une table de coupe', 'error'); return; }
  const lot = allLots[lotId];
  if (!lot?.listeId) { toast('⚠️ Ce lot na pas de liste de coupe associee', 'error'); return; }
  await db.ref(`production/${lotId}/coupeAssign`).set(table);
  await validateLotStage(lotId, 'cao', table);
}

function renderCoupe(main) {
  const stage = currentCoupeStage;
  const stageDef = STAGES.find(s => s.id === stage);
  // Un lot est "à ma table" si coupeAssign === mon stage ET currentStage === mon stage
  const lots = Object.entries(allLots).filter(([,l]) =>
    l.coupeAssign === stage && getCurrentStage(l) === stage
  ).sort((a,b) => (a[1].name||'').localeCompare(b[1].name||'','fr'));

  // Aussi récupérer les lots déjà terminés (envoyés à étiquetage) pour la sidebar
  const lotsFinis = Object.entries(allLots).filter(([,l]) =>
    l.coupeAssign === stage && getCurrentStage(l) !== stage
  ).sort((a,b) => (a[1].name||'').localeCompare(b[1].name||'','fr'));

  main.innerHTML = `
    <div class="page-header">
      <div class="page-eyebrow">Poste · ${stageDef?.person || 'Coupe'}</div>
      <div class="page-title">${stageDef?.icon} ${stageDef?.label}</div>
      <div class="page-sub">${lots.length} en cours · ${lotsFinis.length} terminé(s)</div>
    </div>
    <div style="display:flex;gap:0;align-items:flex-start">
      <div id="coupe-sidebar" style="width:180px;flex-shrink:0;position:sticky;top:16px;background:white;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;margin-right:16px;max-height:80vh;overflow-y:auto">
        <div style="padding:10px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-size:11px;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:.5px">Mes lots</div>
        ${lots.map(([lid, lot]) => `
          <div onclick="document.getElementById('lot-${lid}').scrollIntoView({behavior:'smooth',block:'start'})"
            style="padding:10px 12px;border-bottom:1px solid #f3f4f6;cursor:pointer;font-size:13px;font-weight:700;color:#111;display:flex;align-items:center;gap:8px;hover:background:#f9fafb">
            <span style="width:8px;height:8px;border-radius:50%;background:#f97316;flex-shrink:0"></span>
            ${lot.name}
          </div>`).join('')}
        ${lotsFinis.map(([lid, lot]) => `
          <div style="padding:10px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;font-weight:700;color:#9ca3af;display:flex;align-items:center;gap:8px">
            <span style="width:8px;height:8px;border-radius:50%;background:#16a34a;flex-shrink:0"></span>
            ${lot.name}
          </div>`).join('')}
      </div>
      <div id="coupe-content" style="flex:1;min-width:0"></div>
    </div>`;

  const coupeEl = document.getElementById('coupe-content');
  if (!lots.length) {
    coupeEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✂️</div><div class="empty-state-title">Aucun lot assigné</div><div class="empty-state-sub">En attente d'un lot du CAO</div></div>`;
    return;
  }

  lots.forEach(([lid, lot]) => {
    const listeId = lot.listeId;
    const liste = listeId ? allListes[listeId] : null;
    // Filtrer uniquement les lignes qui correspondent au modèle de ce lot
    const toutesLignes = liste ? Object.entries(liste.lignes || {}).sort((a,b) => (a[1].at||0)-(b[1].at||0)) : [];
    const lignes = toutesLignes.filter(([,row]) => {
      const nom = (row.c || '').split('||')[0] || '';
      return getModele(nom) === lot.name;
    });

    let html = `
      <div id="lot-${lid}" class="card" style="margin-bottom:20px;scroll-margin-top:16px">
        <div style="font-size:20px;font-weight:900;margin-bottom:4px">${lot.name}</div>
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:4px">${lot.description || ''}</div>
        ${liste ? `<div style="font-size:12px;font-weight:700;color:var(--c-cao);margin-bottom:16px">📋 ${liste.name || listeId}</div>` : ''}`;

    if (!lignes.length) {
      html += `<div style="text-align:center;padding:24px;background:#fef9c3;border-radius:10px;color:#92400e;font-weight:700">⚠️ Aucune liste de coupe associée — demandez au CAO d'en assigner une</div>`;
    } else {
      // Lire les headers depuis le champ h de la première ligne
      const firstRow = lignes[0]?.[1];
      const headers = firstRow?.h ? firstRow.h.split('||') : (firstRow?.headers || []);
      html += `<div style="overflow-x:auto"><table class="coupe-table"><thead><tr>`;
      headers.forEach(h => { html += `<th>${h}</th>`; });
      html += `<th style="width:80px">Action</th></tr></thead><tbody>`;
      lignes.forEach(([rowKey, row]) => {
        const cells = row.c ? row.c.split('||') : (row.cells || []);
        const isDone = row.done; // ligne validée manuellement
        // Vérifier si toutes les cellules numériques de cette ligne sont cochées
        const numCellsIdx = cells.map((c,ci) => ci).filter(ci =>
          ci > 1 && !isNaN(cells[ci]) && parseInt(cells[ci]) > 0 &&
          headers[ci] !== 'Commentaire' && headers[ci] !== 'comment'
        );
        const allCellsDone = numCellsIdx.length > 0 && numCellsIdx.every(ci => row.cells_done?.[ci]);
        const rowGrised = isDone || allCellsDone;
        html += `<tr style="${rowGrised ? 'opacity:0.35;background:#f3f4f6;' : ''}">`;
        cells.forEach((cell, ci) => {
          const isNum = ci > 1 && !isNaN(cell) && parseInt(cell) > 0 && headers[ci] !== 'Commentaire' && headers[ci] !== 'comment';
          const cellDone = row.cells_done?.[ci];
          if (isNum) {
            if (rowGrised) {
              html += `<td><button class="coupe-cell-btn done" disabled>✓</button></td>`;
            } else {
              html += `<td><button class="coupe-cell-btn ${cellDone?'done':''}" onclick="toggleCoupeCell('${lid}','${rowKey}',${ci},${!!cellDone})">${cellDone?'✓':cell}</button></td>`;
            }
          } else if (headers[ci] === 'Image' && cell?.startsWith('http')) {
            html += `<td><img src="${cell}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;cursor:zoom-in" onclick="openZoom('${cell}')" onerror="this.style.display='none'"></td>`;
          } else {
            html += `<td>${cell||''}</td>`;
          }
        });
        // Bouton valider la ligne (si pas encore grisée)
        html += `<td>${rowGrised
          ? `<span style="font-size:11px;color:#9ca3af;font-weight:700">✓ Fait</span>`
          : `<button class='btn btn-success' style='padding:4px 12px;font-size:12px' onclick='validateCoupeLigne("${lid}","${rowKey}")'>✅ Valider</button>`
        }</td>`;
        html += `</tr>`;
      });
      html += `</tbody></table></div>`;
    }

    // Compter uniquement les pièces de ce modèle
    let pieceCount = 0;
    if (liste?.lignes) {
      const lignesDuModele = Object.fromEntries(
        Object.entries(liste.lignes).filter(([,row]) => getModele((row.c||'').split('||')[0]||'') === lot.name)
      );
      pieceCount = parseLignesEnPieces(lignesDuModele).length;
    }

    // Vérifier si toutes les lignes sont validées
    const toutesValidees = lignes.length > 0 && lignes.every(([,row]) => {
      if (row.done) return true;
      const c = row.c ? row.c.split('||') : [];
      const h = row.h ? row.h.split('||') : headers;
      const nums = c.map((_,ci) => ci).filter(ci => ci > 1 && !isNaN(c[ci]) && parseInt(c[ci]) > 0 && h[ci] !== 'Commentaire' && h[ci] !== 'comment');
      return nums.length > 0 && nums.every(ci => row.cells_done?.[ci]);
    });

    html += `
      <div style="margin-top:16px">
        ${pieceCount > 0 ? `<div style="text-align:center;margin-bottom:10px;padding:10px;background:#f0fdf4;border-radius:10px;font-size:14px;font-weight:800;color:#15803d">🔢 ${pieceCount} pièces seront générées à la validation</div>` : ''}
        <button class="btn btn-success btn-big" style="${(!liste||!toutesValidees)?'opacity:0.4;cursor:not-allowed':''}" onclick="${toutesValidees?`validateLotStage('${lid}','${stage}','etiquetage')`:`toast('Validez toutes les lignes avant de terminer','error')`}">
          ${toutesValidees ? '✅ Coupe terminée — Envoyer à l\'Étiquetage' : '⏳ Validez toutes les lignes pour terminer'}
        </button>
      </div>
    </div>`;
    coupeEl.innerHTML += html;
  });
}

async function regenPieces(lotId) {
  if (!confirm('Régénérer les pièces de ce lot ? Les pièces actuelles seront supprimées.')) return;
  const lot = allLots[lotId];
  const listeId = lot?.listeId;
  const liste = listeId ? allListes[listeId] : null;
  if (!liste?.lignes) { toast('⚠️ Pas de liste associée', 'error'); return; }

  const lignesDuModele = Object.fromEntries(
    Object.entries(liste.lignes).filter(([,row]) => getModele((row.c||'').split('||')[0]||'') === lot.name)
  );
  const noms = parseLignesEnPieces(lignesDuModele);
  if (!noms.length) { toast('⚠️ Aucune pièce détectée', 'error'); return; }

  // Supprimer les pièces existantes
  await db.ref(`production/${lotId}/pieces`).remove();

  // Régénérer
  const updates = {};
  const tempRef = db.ref(`production/${lotId}/pieces`);
  noms.forEach(piece => {
    const pKey = tempRef.push().key;
    updates[`production/${lotId}/pieces/${pKey}`] = {
      name: piece.name,
      image: piece.image || null,
      comment: piece.comment || null,
      largeur: piece.largeur || null,
      option: piece.option || null,
      stage: lot.currentStage || 'etiquetage',
      history: [{ stage: lot.currentStage || 'etiquetage', status:'pending', at:Date.now() }]
    };
  });
  await db.ref().update(updates);
  toast(`✅ ${noms.length} pièces régénérées !`, 'success');
}

async function resetLot(lotId) {
  if (!confirm('Remettre ce lot à zéro ? Les pièces seront supprimées et le lot retournera à l\'étape coupe.')) return;
  const lot = allLots[lotId];
  const coupeStage = lot.coupeAssign || 'coupe1';
  await db.ref(`production/${lotId}/pieces`).remove();
  await db.ref(`production/${lotId}`).update({
    currentStage: coupeStage,
    stages: { stock: lot.stages?.stock || null, cao: lot.stages?.cao || null }

  toast('✅ Lot remis à l\'étape coupe', 'success');
}

async function resetTout() {

// ── Parsing liste de coupe → pièces individuelles ──
function parseLignesEnPieces(lignes) {
  const IGNORE = new Set(['Produit','Image','Commentaire','comment','Qté','','Largeur','LARGEUR','Option','OPTION','Option2','OPTION2','largeur','option']);
  const pieces = [];
  Object.values(lignes).forEach(row => {
    const h = (row.h || '').split('||');
    const c = (row.c || '').split('||');
    const nomProduit = c[0] || '';
    if (!nomProduit) return;
    // Récupérer l'image (colonne Image)
    const imgIdx = h.indexOf('Image');
    const image = (imgIdx >= 0 && c[imgIdx]?.startsWith('http')) ? c[imgIdx] : null;
    // Récupérer le commentaire Fatima (colonne Commentaire ou comments Firebase)
    const commentIdx = h.findIndex(x => x === 'Commentaire' || x === 'comment');
    const commentCell = (commentIdx >= 0 && c[commentIdx]) ? c[commentIdx].trim() : '';
    // Aussi récupérer les commentaires structurés (objets {text} dans row.comments)
    const commentsObj = row.comments || {};
    const commentsFatima = Object.values(commentsObj)
      .map(co => typeof co === 'object' ? co.text : co)
      .filter(Boolean).join(' / ');
    const comment = commentsFatima || commentCell || null;
    // Récupérer largeur et option (attributs fixes de la ligne)
    const largeurIdx = h.findIndex(x => x === 'Largeur' || x === 'LARGEUR');
    const largeur = (largeurIdx >= 0 && c[largeurIdx]?.trim()) ? c[largeurIdx].trim() : null;
    const optionIdx = h.findIndex(x => x === 'Option' || x === 'OPTION' || x === 'Option2' || x === 'OPTION2');
    const option = (optionIdx >= 0 && c[optionIdx]?.trim()) ? c[optionIdx].trim() : null;
    // Option2 séparée si présente
    const option2Idx = h.findIndex(x => x === 'Option2' || x === 'OPTION2');
    const option2 = (option2Idx >= 0 && option2Idx !== optionIdx && c[option2Idx]?.trim()) ? c[option2Idx].trim() : null;

    // Construire le suffixe attributs (ex: " M-L Palazzo")
    const attrs = [largeur, option, option2].filter(Boolean).join(' ');

    // Trouver les colonnes taille/quantité
    h.forEach((header, idx) => {
      if (IGNORE.has(header)) return;
      // Largeur et Option déjà dans IGNORE — skip si non numérique
      const val = parseInt(c[idx]) || 0;
      if (val <= 0) return;
      // Nom complet : "Produit Taille Largeur Option"
      const fullName = [nomProduit, header, attrs].filter(Boolean).join(' ').trim();
      for (let i = 0; i < val; i++) {
        pieces.push({ name: fullName, image, comment, largeur, option });
      }
    });
    // Cas "Sans déclinaison"
    if (row.section === 'Sans déclinaison') {
      const qteIdx = h.indexOf('Qté');
      if (qteIdx >= 0) {
        const qty = parseInt(c[qteIdx]) || 0;
        const fullName = [nomProduit, attrs].filter(Boolean).join(' ').trim();
        for (let i = 0; i < qty; i++) {
          pieces.push({ name: fullName, image, comment, largeur, option });
        }
      }
    }
  });
  return pieces;
}

async function validateLotStage(lotId, stageId, nextStageId) {
  const updates = {};
  updates[`production/${lotId}/stages/${stageId}`] = { status:'done', doneAt:Date.now(), by:currentEmail };
  updates[`production/${lotId}/currentStage`] = nextStageId;

  const nextDef = STAGES.find(s => s.id === nextStageId);
  const lot = allLots[lotId];

  // Transition vers étiquetage = fin de coupe → éclater en pièces individuelles
  if (nextStageId === 'etiquetage') {
    const listeId = lot?.listeId;
    const liste = listeId ? allListes[listeId] : null;
    if (liste?.lignes) {
      // Filtrer uniquement les lignes du modèle de ce lot
      const lignesDuModele = Object.fromEntries(
        Object.entries(liste.lignes).filter(([,row]) => getModele((row.c||'').split('||')[0]||'') === lot.name)
      );
      const noms = parseLignesEnPieces(lignesDuModele);
      if (noms.length > 0) {
        // D'abord vider les pièces existantes, puis créer les nouvelles en deux étapes
        await db.ref(`production/${lotId}/pieces`).remove();
        const tempRef = db.ref(`production/${lotId}/pieces`);
        noms.forEach(piece => {
          const pKey = tempRef.push().key;
          updates[`production/${lotId}/pieces/${pKey}`] = {
            name: piece.name,
            image: piece.image || null,
            comment: piece.comment || null,
            largeur: piece.largeur || null,
            option: piece.option || null,
            stage: 'etiquetage',
            history: [{ stage:'etiquetage', status:'pending', at:Date.now() }]
          };
        });
        toast(`✅ Coupe terminée — ${noms.length} pièces générées automatiquement`, 'success');
      } else {
        toast('✅ Coupe terminée — aucune pièce détectée dans la liste', 'success');
      }
    } else {
      toast('✅ Coupe terminée — pas de liste associée', 'success');
    }
  } else {
    toast('✅ Étape validée !', 'success');
  }

  await db.ref().update(updates);
}

async function validatePiece(lotId, pieceId, nextStage) {
  const piece = allLots[lotId]?.pieces?.[pieceId];
  if (!piece) return;
  // Abderrahim renvoie vers le contrôle d'origine (returnedFrom), sinon étape suivante normale
  const targetStage = (piece.stage === 'atelier' && piece.returnedFrom) ? piece.returnedFrom : nextStage;
  const history = [...(piece.history||[]), { stage:targetStage, status:'pending', at:Date.now(), by:currentEmail }];
  await db.ref(`production/${lotId}/pieces/${pieceId}`).update({ stage:targetStage, history, returnReason:null, returnedFrom:null });
  toast('✅ Pièce retouchée — renvoyée au contrôle !', 'success');
}

// ── Matching intelligent pièce → commande index.html ──
function extractPieceInfo(pieceName, pieceLargeur, pieceOption) {
  // Ex: "Abaya Ryhna Beige T56 M-L" → { base: "Abaya Ryhna Beige", taille: "56", largeur: "M-L" }
  const tailleMatch = pieceName.match(/\bT(\d+)\b/i);
  const taille = tailleMatch ? tailleMatch[1] : null;
  // Retirer la taille et les attrs du nom pour obtenir le base
  let base = pieceName.replace(/\bT\d+\b/i, '');
  if (pieceLargeur) base = base.replace(pieceLargeur, '');
  if (pieceOption) base = base.replace(pieceOption, '');
  base = base.trim().replace(/\s+/g,' ');
  return { base, taille, largeur: pieceLargeur || null, option: pieceOption || null };
}

function normalizeStr(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // accents
    .replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
}

function orderMatchesPiece(orderName, pieceBase, pieceTaille, pieceLargeur, pieceOption) {
  const n = normalizeStr(orderName);
  const b = normalizeStr(pieceBase);

  // 1. Match du nom de base — tous les mots significatifs doivent être présents
  const words = b.split(' ').filter(w => w.length > 2);
  if (words.length === 0) return false;
  const baseMatch = words.every(w => n.includes(w));
  if (!baseMatch) return false;

  // 2. Score attributs — on cherche le meilleur match, pas le parfait
  // La taille peut être : "56", "t56", "taille 56", "taille personnalisee 56"
  if (pieceTaille) {
    const taillePatterns = [pieceTaille, `t${pieceTaille}`, `taille ${pieceTaille}`, `taille personnalisee ${pieceTaille}`];
    if (!taillePatterns.some(p => n.includes(normalizeStr(p)))) return false;
  }
  // La largeur peut être : "m l", "ml", "xs s" etc. — on cherche les lettres séparément aussi
  if (pieceLargeur) {
    const lNorm = normalizeStr(pieceLargeur); // ex: "m l" ou "xs s"
    const lCompact = lNorm.replace(/\s/g,''); // ex: "ml" ou "xss"
    if (!n.includes(lNorm) && !n.includes(lCompact)) return false;
  }
  // L'option : matching souple (60% des mots)
  if (pieceOption) {
    const oWords = normalizeStr(pieceOption).split(' ').filter(w => w.length > 1);
    if (oWords.length > 0) {
      const oMatch = oWords.filter(w => n.includes(w)).length / oWords.length;
      if (oMatch < 0.6) return false;
    }
  }
  return true;
}

async function assignPieceToOrder(pieceName, pieceLargeur, pieceOption) {
  const { base, taille, largeur, option } = extractPieceInfo(pieceName, pieceLargeur, pieceOption);
  // Lire toutes les listes dans lists/
  const snap = await db.ref('lists').once('value');
  const allListsData = snap.val() || {};

  let bestMatch = null; // { listId, listData, orderIdx, advancedCount }

  Object.entries(allListsData).forEach(([listId, listData]) => {
    const orders = listData.orders || [];
    orders.forEach((order, idx) => {
      if (!order || order.status === 'Reçu') return;
      if (!orderMatchesPiece(order.name, base, taille, largeur, option)) return;
      // Compter combien de commandes sont déjà "Reçu" dans cette liste (= liste la plus avancée)
      const advancedCount = orders.filter(o => o && o.status === 'Reçu').length;
      if (!bestMatch || advancedCount > bestMatch.advancedCount) {
        bestMatch = { listId, listData, orderIdx: idx, advancedCount };
      }
    });
  });

  if (bestMatch) {
    const { listId, orderIdx } = bestMatch;
    await db.ref(`lists/${listId}/orders/${orderIdx}/status`).set('Reçu');
    const orderName = bestMatch.listData.orders[orderIdx].name;
    toast(`📦 Assigné automatiquement → ${orderName.substring(0,40)}...`, 'success');
    return true;
  } else {
    console.warn(`[Cataleya] Pas de commande trouvée pour : "${pieceName}" (base: "${base}", taille: "${taille}", largeur: "${largeur}")`);
    toast(`⚠️ Pas de commande trouvée pour : ${pieceName.substring(0,30)}`, 'error');
    return false;
  }
}

async function finalizePiece(lotId, pieceId) {
  const piece = allLots[lotId]?.pieces?.[pieceId];
  if (!piece) return;
  const history = [...(piece.history||[]), { stage:'done', status:'done', at:Date.now(), by:currentEmail }];
  await db.ref(`production/${lotId}/pieces/${pieceId}`).update({ stage:'done', history });
  // Assigner automatiquement à une commande dans index.html
  await assignPieceToOrder(piece.name || '', piece.largeur || null, piece.option || null);
}

// Renvoyer pièce
function openReturn(lotId, pieceId, pieceName) {
  returnContext = { lotId, pieceId };
  document.getElementById('modal-return-sub').textContent = `Pièce : ${pieceName}`;
  document.getElementById('return-reason').value = '';
  openModal('modal-return');
}

async function confirmReturn() {
  const reason = document.getElementById('return-reason').value.trim();
  if (!reason) { toast('⚠️ Précisez la raison du renvoi', 'error'); return; }
  const { lotId, pieceId } = returnContext;
  const piece = allLots[lotId]?.pieces?.[pieceId];
  // Les contrôles renvoient toujours vers Abderrahim (retouche)
  const fromStage = piece.stage;
  const returnStage = ['controle1','defauts','final'].includes(fromStage) ? 'atelier' : getPrevStage(fromStage);
  if (!returnStage) return;
  const history = [...(piece.history||[]), { stage:returnStage, status:'returned', reason, at:Date.now(), by:currentEmail }];
  await db.ref(`production/${lotId}/pieces/${pieceId}`).update({
    stage: returnStage,
    history,
    returnReason: reason,
    returnedFrom: returnStage === 'atelier' ? fromStage : null
  });
  closeModal('modal-return');
  toast('↩️ Pièce renvoyée', 'success');
}

// Détail pièce
function showPieceDetail(lotId, pieceId) {
  const lot = allLots[lotId];
  const piece = lot?.pieces?.[pieceId];
  if (!piece) return;
  document.getElementById('detail-title').textContent = piece.name || pieceId;
  document.getElementById('detail-sub').textContent = `Lot : ${lot.name}`;
  const history = piece.history || [];
  const histEl = document.getElementById('detail-history');
  if (!history.length) { histEl.innerHTML = '<div style="color:var(--text2)">Aucun historique</div>'; }
  else {
    histEl.innerHTML = history.map(h => {
      const stageDef = STAGES.find(s => s.id === h.stage) || { icon:'📦', label:h.stage };
      const cls = h.status === 'done' ? 'done' : h.status === 'returned' ? 'returned' : 'current';
      return `<div class="history-item ${cls}">
        <div class="history-dot">${stageDef.icon}</div>
        <div class="history-text">
          <div class="history-stage">${stageDef.label}</div>
          <div class="history-time">${ts(h.at)}${h.reason?` · ⚠️ ${h.reason}`:''}</div>
        </div>
      </div>`;
    }).join('');
  }
  openModal('modal-piece-detail');
}

// HELPERS
// ══════════════════════════════════════════════
function getCurrentStage(lot) {
  if (lot.currentStage) return lot.currentStage;
  // Fallback : déduire depuis les stages validés
  for (let i = STAGES.length - 1; i >= 0; i--) {
    if (lot.stages?.[STAGES[i].id]?.status === 'done') {
      return i < STAGES.length - 1 ? STAGES[i+1].id : null;
    }
  }
  return 'stock'; // début par défaut
}

function isLotDone(lot) {
  return lot.stages?.[STAGES[STAGES.length-1].id]?.status === 'done' || lot.currentStage === 'done';
}

function getPrevStage(stageId) {
  const idx = STAGES.findIndex(s => s.id === stageId);
  return idx > 0 ? STAGES[idx-1].id : null;
}

function getNextStage(stageId) {
  const idx = STAGES.findIndex(s => s.id === stageId);
  return idx >= 0 && idx < STAGES.length - 1 ? STAGES[idx+1].id : null;
}

function ts(timestamp) {
  if (!timestamp) return '—';
  const d = new Date(timestamp);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

// EXTRACTION NOM DE MODÈLE (même logique que index.html)
// ══════════════════════════════════════════════
const COULEURS = new Set([
  'noir','noire','black','blanc','blanche','white','gris','grise','grey','gray',
  'rouge','red','rose','pink','bleu','bleue','blue','vert','verte','green',
  'jaune','yellow','orange','violet','purple','lilas','beige','marron','brown',
  'camel','mocha','mokka','taupe','greige','ivoire','ecru','nude','creme','marine',
  'navy','bordeaux','burgundy','kaki','khaki','ocre','sable','corail','coral',
  'aubergine','terracotta','terracota','gold','dore','argent','silver','cognac',
  'caramel','chocolat','miel','latte','cappuccino','espresso','praline','noisette',
  'poudre','poudree','poudre','emeraude','amande','grenat','cobalt',
  'indigo','saphir','saphyr','sapphire','turquoise','teal','aqua','cyan','lavande',
  'menthe','olive','anthracite','charbon','ebony','pearl','champagne','cuivre',
  'copper','bronze','sienna','rouille','rust','blush','peach','abricot','citron',
  'vanille','vanilla','cacao','stone','sand','clay','smoke','ash','coal','ivory',
  'mist','sage','plum','cerise','framboise','magenta','fuchsia','fushia',
  'nuit','roi','mate','satin','vif','doux','nacre','irise','brule','fume','velvet',
  'glace','intense','profond','deep','dark','light','bright','soft','baby','dusty',
  'pale','vivid','lime','mint','sky','forest','ocean','denim','electric','neon',
  'fluo','pastel','naturel','naturelle','multicolore',
].map(c => c.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')));

const normMot = (w) => (w||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
const isCouleur = (w) => COULEURS.has(normMot(w));
const cleanName = (raw) => (raw || '').replace(/\s*\(.*?\)/g, '').trim();

function getModele(raw) {
  const cleaned = cleanName(raw);
  const words = cleaned.split(' ');
  let end = words.length;
  while (end > 1) {
    const w = words[end - 1];
    const prev = end >= 2 ? words[end - 2] : '';
    const pprev = end >= 3 ? words[end - 3] : '';
    if (isCouleur(w)) {
      if (prev === '&' && isCouleur(pprev)) end -= 3;
      else if (prev === '&') end -= 2;
      else if (isCouleur(prev)) end -= 2;
      else end -= 1;
    } else { break; }
  }
  return words.slice(0, end).join(' ') || cleaned;
}

// ══════════════════════════════════════════════
// ACTIVATION LISTE DE COUPE → CRÉATION AUTO DES LOTS
// ══════════════════════════════════════════════
async function activerListe(listeId) {
  const liste = allListes[listeId];
  if (!liste?.lignes) { toast('⚠️ Liste vide ou introuvable', 'error'); return; }

  // Grouper les lignes par modèle
  const groupes = {};
  Object.entries(liste.lignes).forEach(([rowKey, row]) => {
    const nomProduit = (row.c || '').split('||')[0] || (row.cells || [])[0] || '';
    if (!nomProduit) return;
    const modele = getModele(nomProduit);
    if (!groupes[modele]) groupes[modele] = [];
    groupes[modele].push(rowKey);
  });

  const modeles = Object.keys(groupes);
  if (!modeles.length) { toast('⚠️ Aucun modèle détecté dans cette liste', 'error'); return; }

  // Vérifier si des lots existent déjà pour cette liste
  const lotsExistants = Object.values(allLots).filter(l => l.listeId === listeId && !l.archived);
  if (lotsExistants.length > 0) {
    if (!confirm(`⚠️ ${lotsExistants.length} lot(s) existent déjà pour cette liste. Créer quand même les lots manquants ?`)) return;
  }

  const updates = {};
  let created = 0;
  modeles.forEach(modele => {
    // Ne pas recréer si existe déjà
    const existe = Object.values(allLots).some(l => l.listeId === listeId && l.name === modele);
    if (existe) return;
    const ref = db.ref('production').push();
    updates[`production/${ref.key}`] = {
      name: modele,
      description: `${liste.name} · ${groupes[modele].length} ligne(s)`,
      listeId,
      createdAt: Date.now(),
      currentStage: 'stock',
      autoCreated: true,
      stages: {},
      pieces: {}
    };
    created++;
  });

  if (!created) { toast('✅ Tous les lots existent déjà', 'success'); return; }
  await db.ref().update(updates);
  toast(`✅ ${created} lot(s) créé(s) automatiquement !`, 'success');
}
