<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maîtrise de Claude — Formation pour Sousou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bordeaux: #6b1e2e;
  --bordeaux-deep: #4a1320;
  --terracotta: #c75b12;
  --terracotta-soft: #e08654;
  --cream: #f5f1e8;
  --cream-warm: #ede5d3;
  --paper: #fbf8f1;
  --ink: #2a1f1a;
  --ink-soft: #5a4a42;
  --gold: #b8924a;
  --line: #d4c8b5;
  --green-success: #5a7d3f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.7;
  font-weight: 400;
  background-image:
    radial-gradient(at 20% 10%, rgba(199, 91, 18, 0.04) 0%, transparent 40%),
    radial-gradient(at 80% 80%, rgba(107, 30, 46, 0.04) 0%, transparent 40%);
  min-height: 100vh;
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(251, 248, 241, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  font-style: italic;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.logo .amp {
  color: var(--terracotta);
  font-weight: 400;
}

.progress-shell {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 16px;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--cream-warm);
  border-radius: 100px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--bordeaux) 0%, var(--terracotta) 100%);
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  width: 0%;
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 16px;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4));
}

.progress-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--bordeaux);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.btn-reset {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.btn-reset:hover {
  border-color: var(--terracotta);
  color: var(--terracotta);
}

/* ===== LAYOUT ===== */
.layout {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 32px 80px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 56px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: sticky;
  top: 96px;
  height: calc(100vh - 120px);
  overflow-y: auto;
  padding-right: 8px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 100px; }

.toc-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-soft);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 400;
}

.toc {
  list-style: none;
}

.toc-item {
  margin-bottom: 4px;
}

.toc-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}

.toc-link:hover {
  background: var(--cream);
  color: var(--bordeaux);
}

.toc-link.active {
  background: var(--bordeaux);
  color: var(--paper);
}

.toc-link.active .toc-num {
  color: var(--terracotta-soft);
}

.toc-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--terracotta);
  font-style: italic;
  min-width: 18px;
}

.toc-check {
  margin-left: auto;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.3s;
}

.toc-check.completed {
  background: var(--green-success);
  border-color: var(--green-success);
}

.toc-check.completed::after {
  content: '✓';
  color: white;
  font-size: 10px;
  font-weight: 700;
}

.toc-link.active .toc-check {
  border-color: var(--terracotta-soft);
}

/* ===== MAIN CONTENT ===== */
.content {
  max-width: 780px;
  min-width: 0;
}

.section {
  display: none;
  animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.section.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== SECTION HEADER ===== */
.section-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 16px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-eyebrow::before {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--terracotta);
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 500;
  line-height: 1.05;
  color: var(--bordeaux-deep);
  margin-bottom: 24px;
  letter-spacing: -0.02em;
}

.section-title em {
  font-style: italic;
  color: var(--terracotta);
  font-weight: 400;
}

.section-lead {
  font-size: 19px;
  line-height: 1.6;
  color: var(--ink-soft);
  margin-bottom: 48px;
  font-weight: 300;
  max-width: 680px;
}

/* ===== TYPOGRAPHY ===== */
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 600;
  color: var(--bordeaux);
  margin: 56px 0 16px;
  line-height: 1.2;
  letter-spacing: -0.01em;
}

h2::before {
  content: '§';
  color: var(--terracotta);
  font-style: italic;
  font-weight: 400;
  margin-right: 12px;
  opacity: 0.6;
}

h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  margin: 36px 0 12px;
  line-height: 1.3;
}

h4 {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--terracotta);
  margin: 24px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

p {
  margin-bottom: 16px;
  color: var(--ink);
}

p.lead {
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  line-height: 1.5;
}

strong {
  color: var(--bordeaux);
  font-weight: 600;
}

em {
  color: var(--terracotta);
  font-style: italic;
}

ul, ol {
  margin: 16px 0 24px;
  padding-left: 0;
  list-style: none;
}

ul li, ol li {
  position: relative;
  padding-left: 28px;
  margin-bottom: 12px;
  line-height: 1.65;
}

ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 8px;
  height: 1px;
  background: var(--terracotta);
}

ol {
  counter-reset: ord;
}

ol li {
  counter-increment: ord;
}

ol li::before {
  content: counter(ord);
  position: absolute;
  left: 0;
  top: 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-weight: 600;
  font-size: 18px;
  line-height: 1.4;
}

/* ===== CALLOUT ===== */
.callout {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-warm) 100%);
  border-left: 3px solid var(--terracotta);
  padding: 24px 28px;
  margin: 32px 0;
  border-radius: 0 6px 6px 0;
  position: relative;
}

.callout.bordeaux {
  border-left-color: var(--bordeaux);
}

.callout-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.callout-title::before {
  content: '◆';
  color: var(--terracotta);
  font-size: 14px;
}

.callout p:last-child { margin-bottom: 0; }

/* ===== TABLE ===== */
.table-wrap {
  margin: 32px 0;
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--line);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--paper);
  font-size: 14px;
}

th {
  background: var(--bordeaux);
  color: var(--paper);
  text-align: left;
  padding: 14px 18px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.02em;
}

td {
  padding: 14px 18px;
  border-top: 1px solid var(--line);
  vertical-align: top;
  line-height: 1.5;
}

tr:nth-child(even) td {
  background: rgba(245, 241, 232, 0.5);
}

td strong { color: var(--bordeaux); }

/* ===== CODE ===== */
pre, code.inline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

code.inline {
  background: var(--cream);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--bordeaux);
  font-size: 13px;
  border: 1px solid var(--line);
}

pre {
  background: #1f1816;
  color: #e8d9c8;
  padding: 20px 24px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 24px 0;
  line-height: 1.65;
  border-left: 3px solid var(--terracotta);
}

pre .kw { color: #e08654; }
pre .str { color: #b8c97a; }
pre .com { color: #7a6a5e; font-style: italic; }
pre .fn { color: #d4a05a; }

/* ===== EXERCISES ===== */
.exercises {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 28px 32px;
  margin: 40px 0;
  position: relative;
}

.exercises::before {
  content: 'Exercices';
  position: absolute;
  top: -12px;
  left: 24px;
  background: var(--bordeaux);
  color: var(--paper);
  padding: 4px 14px;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  border-radius: 4px;
}

.exercise-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--cream-warm);
  cursor: pointer;
  transition: background 0.2s;
}

.exercise-item:last-child {
  border-bottom: none;
}

.exercise-item:hover {
  background: var(--cream);
  margin: 0 -16px;
  padding: 12px 16px;
  border-radius: 4px;
  border-bottom-color: transparent;
}

.checkbox {
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.exercise-item:hover .checkbox {
  border-color: var(--terracotta);
}

.checkbox.checked {
  background: var(--green-success);
  border-color: var(--green-success);
}

.checkbox.checked::after {
  content: '✓';
  color: white;
  font-size: 14px;
  font-weight: 700;
}

.exercise-text {
  flex: 1;
  line-height: 1.55;
  font-size: 15px;
}

.exercise-item.completed .exercise-text {
  text-decoration: line-through;
  color: var(--ink-soft);
}

/* ===== NAV BUTTONS ===== */
.nav-buttons {
  display: flex;
  gap: 16px;
  margin-top: 80px;
  padding-top: 40px;
  border-top: 1px solid var(--line);
}

.nav-btn {
  flex: 1;
  padding: 18px 24px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  text-align: left;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--ink);
  display: block;
}

.nav-btn:hover {
  border-color: var(--terracotta);
  background: var(--cream);
  transform: translateY(-1px);
}

.nav-btn-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: block;
}

.nav-btn-title {
  font-weight: 500;
  color: var(--bordeaux);
}

.nav-btn-prev { text-align: left; }
.nav-btn-next { text-align: right; }

.nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.mark-done-btn {
  background: var(--bordeaux);
  color: var(--paper);
  border: none;
  padding: 14px 32px;
  border-radius: 100px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 32px;
}

.mark-done-btn:hover {
  background: var(--bordeaux-deep);
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(107, 30, 46, 0.2);
}

.mark-done-btn.completed {
  background: var(--green-success);
}

.mark-done-btn.completed::after {
  content: '✓';
}

/* ===== HOMEPAGE / COVER ===== */
.cover {
  text-align: center;
  padding: 60px 20px 40px;
}

.cover-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 18px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 96px;
  line-height: 0.95;
  color: var(--bordeaux-deep);
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: -0.03em;
}

.cover-title em {
  font-style: italic;
  color: var(--terracotta);
  font-weight: 400;
}

.cover-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 28px;
  color: var(--ink-soft);
  margin-bottom: 48px;
  font-weight: 400;
}

.cover-meta {
  display: flex;
  justify-content: center;
  gap: 48px;
  margin: 64px 0;
  padding: 32px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.meta-item {
  text-align: center;
}

.meta-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 600;
  color: var(--terracotta);
  line-height: 1;
  font-style: italic;
}

.meta-label {
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 8px;
  font-weight: 500;
}

.cover-cta {
  background: var(--bordeaux);
  color: var(--paper);
  border: none;
  padding: 18px 48px;
  border-radius: 100px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.3s;
  margin-top: 16px;
}

.cover-cta:hover {
  background: var(--bordeaux-deep);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(107, 30, 46, 0.25);
}

.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin: 48px 0;
}

.level-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 24px;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.level-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--terracotta);
  transform: scaleY(0);
  transition: transform 0.3s;
  transform-origin: bottom;
}

.level-card:hover {
  transform: translateY(-2px);
  border-color: var(--terracotta);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
}

.level-card:hover::before {
  transform: scaleY(1);
}

.level-card-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 14px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
}

.level-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  line-height: 1.2;
  margin-bottom: 8px;
}

.level-card-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
}

.level-card-progress {
  height: 3px;
  background: var(--cream-warm);
  border-radius: 100px;
  margin-top: 16px;
  overflow: hidden;
}

.level-card-progress-fill {
  height: 100%;
  background: var(--terracotta);
  border-radius: 100px;
  transition: width 0.5s;
  width: 0%;
}

/* ===== ORNAMENT ===== */
.ornament {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  margin: 48px 0;
  letter-spacing: 0.4em;
  opacity: 0.6;
  font-size: 18px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 968px) {
  .layout {
    grid-template-columns: 1fr;
    gap: 32px;
  }
  .sidebar {
    position: static;
    height: auto;
    max-height: 60vh;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
  }
  .cover-title { font-size: 64px; }
  .cover-sub { font-size: 22px; }
  .section-title { font-size: 40px; }
  .cover-meta { flex-wrap: wrap; gap: 24px; }
  .meta-num { font-size: 40px; }
}

@media (max-width: 640px) {
  .layout { padding: 24px 16px 60px; }
  .topbar-inner { padding: 12px 16px; gap: 12px; }
  .logo { font-size: 18px; }
  .progress-label { font-size: 16px; }
  .btn-reset { display: none; }
  .cover-title { font-size: 48px; }
  .section-title { font-size: 32px; }
  h2 { font-size: 28px; }
  h3 { font-size: 22px; }
  .nav-buttons { flex-direction: column; }
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--bordeaux);
  color: var(--paper);
  padding: 14px 24px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 200;
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* Loading state */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
  color: var(--ink-soft);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
</style>

      </ol>

      <div class="callout bordeaux">
        <div class="callout-title">Pour finir</div>
        <p style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--bordeaux);">« Tu n'as pas besoin d'être génial pour commencer. Tu dois commencer pour être génial. » — Zig Ziglar</p>
        <p>Et plus pragmatiquement : la fenêtre 2026 est exceptionnelle. Les marques qui veulent de l'IA n'ont presque personne de compétent à qui parler. Dans 3-5 ans, le marché sera saturé. Maintenant, c'est l'âge d'or pour quelqu'un comme toi. 🥋</p>
      </div>
    `,
    exercises: [
      "Rédiger ta phrase de positionnement (et la tester sur 5 amis)",
      "Lister tes 50 prospects cibles avec contact LinkedIn",
      "Écrire ta page d'offre (3 packs : Audit, SAV, Catalogue)",
      "Préparer ton canevas d'appel de 15 min",
      "Mettre en place 1 automation Cataleya documentée comme case study",
      "Publier ton premier post LinkedIn sur le sujet IA + e-commerce"
    ]
  }
];

// ============================================================
// STATE MANAGEMENT
// ============================================================

let state = {
  currentSection: 'cover',
  sectionsRead: {},      // { sectionId: true }
  exercisesDone: {},     // { "sectionId-idx": true }
};

const STORAGE_KEY = 'sousou-formation-state-v1';

async function loadState() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (result && result.value) {
      state = JSON.parse(result.value);
    }
  } catch (e) {
    // First load or no data — keep defaults
    console.log('No saved state yet');
  }
}

async function saveState() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save error:', e);
  }
}

// ============================================================
// PROGRESS COMPUTATION
// ============================================================

function computeProgress() {
  // Total checkpoints: each level section read + each exercise
  const learnableSections = SECTIONS.filter(s => !s.isHome);
  let total = 0;
  let done = 0;

  learnableSections.forEach(s => {
    // Mark section as read
    total += 1;
    if (state.sectionsRead[s.id]) done += 1;
    // Each exercise
    s.exercises.forEach((_, idx) => {
      total += 1;
      const k = s.id + '-' + idx;
      if (state.exercisesDone[k]) done += 1;
    });
  });

  return total === 0 ? 0 : Math.round((done / total) * 100);
}

function isSectionCompleted(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section || section.isHome) return false;
  if (!state.sectionsRead[sectionId]) return false;
  return section.exercises.every((_, idx) => state.exercisesDone[sectionId + '-' + idx]);
}

function levelProgress(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section || section.isHome) return 0;
  const total = 1 + section.exercises.length;
  let done = 0;
  if (state.sectionsRead[sectionId]) done += 1;
  section.exercises.forEach((_, idx) => {
    if (state.exercisesDone[sectionId + '-' + idx]) done += 1;
  });
  return Math.round((done / total) * 100);
}

// ============================================================
// RENDERING
// ============================================================

function renderTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = SECTIONS.map(s => {
    const isActive = s.id === state.currentSection;
    const completed = isSectionCompleted(s.id);
    return `
      <li class="toc-item">
        <a class="toc-link ${isActive ? 'active' : ''}" data-section="${s.id}" onclick="navigateTo('${s.id}')">
          ${s.num ? `<span class="toc-num">${s.num}</span>` : '<span class="toc-num" style="opacity:0.3;">★</span>'}
          <span>${s.label}</span>
          ${!s.isHome ? `<span class="toc-check ${completed ? 'completed' : ''}"></span>` : ''}
        </a>
      </li>
    `;
  }).join('');
}

function renderProgressBar() {
  const pct = computeProgress();
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

function renderLevelGrid() {
  const grid = document.getElementById('levelGrid');
  if (!grid) return;
  const levels = SECTIONS.filter(s => !s.isHome);
  grid.innerHTML = levels.map(s => {
    const pct = levelProgress(s.id);
    const descs = {
      'level1': "Modèles, prompt engineering, plans, limites",
      'level2': "Projects, Memory, Artifacts, Skills, MCP",
      'level3': "API, Claude Code, tool use, agents",
      'level4': "Chrome, Cowork, multi-agents, Computer Use",
      'level5': "Consulting, offres, plan 90 jours, mindset"
    };
    return `
      <div class="level-card" onclick="navigateTo('${s.id}')">
        <div class="level-card-num">Niveau ${s.num}</div>
        <div class="level-card-title">${s.label}</div>
        <div class="level-card-desc">${descs[s.id] || ''}</div>
        <div class="level-card-progress">
          <div class="level-card-progress-fill" style="width: ${pct}%"></div>
        </div>
      </div>
    `;
  }).join('');
}

function renderSection() {
  const section = SECTIONS.find(s => s.id === state.currentSection);
  if (!section) return;

  const content = document.getElementById('content');
  let html = section.html;

  // Append exercises if any
  if (section.exercises && section.exercises.length > 0) {
    html += `<div class="exercises"><h3 style="margin-top: 8px;">À faire ensemble</h3>`;
    html += section.exercises.map((ex, idx) => {
      const k = section.id + '-' + idx;
      const checked = state.exercisesDone[k];
      return `
        <div class="exercise-item ${checked ? 'completed' : ''}" onclick="toggleExercise('${section.id}', ${idx})">
          <div class="checkbox ${checked ? 'checked' : ''}"></div>
          <div class="exercise-text">${ex}</div>
        </div>
      `;
    }).join('');
    html += `</div>`;
  }

  // Append "mark as done" button for level sections
  if (!section.isHome) {
    const isRead = state.sectionsRead[section.id];
    html += `
      <div style="text-align: center;">
        <button class="mark-done-btn ${isRead ? 'completed' : ''}" onclick="markSectionRead('${section.id}')">
          ${isRead ? 'Section lue' : 'Marquer cette section comme lue'}
        </button>
      </div>
    `;
  }

  // Nav buttons
  const idx = SECTIONS.findIndex(s => s.id === section.id);
  const prev = SECTIONS[idx - 1];
  const next = SECTIONS[idx + 1];
  if (prev || next) {
    html += `<div class="nav-buttons">`;
    if (prev) {
      html += `
        <a class="nav-btn nav-btn-prev" onclick="navigateTo('${prev.id}')">
          <span class="nav-btn-label">← Précédent</span>
          <span class="nav-btn-title">${prev.label}</span>
        </a>
      `;
    } else {
      html += `<div style="flex:1;"></div>`;
    }
    if (next) {
      html += `
        <a class="nav-btn nav-btn-next" onclick="navigateTo('${next.id}')">
          <span class="nav-btn-label">Suivant →</span>
          <span class="nav-btn-title">${next.label}</span>
        </a>
      `;
    } else {
      html += `<div style="flex:1;"></div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;

  if (section.isHome) {
    renderLevelGrid();
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderAll() {
  renderTOC();
  renderProgressBar();
  renderSection();
}

// ============================================================
// ACTIONS
// ============================================================

window.navigateTo = async function(sectionId) {
  state.currentSection = sectionId;
  await saveState();
  renderAll();
};

window.navigateToFirst = async function() {
  await navigateTo('level1');
};

window.toggleExercise = async function(sectionId, idx) {
  const k = sectionId + '-' + idx;
  if (state.exercisesDone[k]) {
    delete state.exercisesDone[k];
  } else {
    state.exercisesDone[k] = true;
    showToast('Exercice validé ✓');
  }
  await saveState();
  renderAll();
};

window.markSectionRead = async function(sectionId) {
  if (state.sectionsRead[sectionId]) {
    delete state.sectionsRead[sectionId];
  } else {
    state.sectionsRead[sectionId] = true;
    showToast('Section marquée comme lue');
  }
  await saveState();
  renderAll();
};

window.resetProgress = async function() {
  if (!confirm('Réinitialiser toute ta progression ? Cette action est irréversible.')) return;
  state = { currentSection: 'cover', sectionsRead: {}, exercisesDone: {} };
  await saveState();
  renderAll();
  showToast('Progression réinitialisée');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ============================================================
// INIT
// ============================================================

(async function init() {
  await loadState();
  renderAll();
})();
</script>

</body>
</html>
