<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext, Fragment } = React;

// ===================== ALGO REGROUPEMENT PAR MODELE =====================
const COULEURS = new Set([
  'noir','noire','black','blanc','blanche','white','gris','grise','grey','gray',
  'rouge','red','rose','pink','bleu','bleue','blue','vert','verte','green',
  'jaune','yellow','orange','violet','purple','lilas','beige','marron','brown',
  'camel','mocha','mokka','taupe','greige','ivoire','ecru','nude','creme','marine',
  'navy','bordeaux','burgundy','kaki','khaki','ocre','sable','corail','coral',
  'aubergine','terracotta','terracota','gold','dore','argent','silver','cognac',
  'caramel','chocolat','miel','latte','cappuccino','espresso','praline','noisette',
  'poudre','poudree','emeraude','amande','grenat','cobalt',
  'indigo','saphir','saphyr','sapphire','turquoise','teal','aqua','cyan','lavande',
  'menthe','olive','anthracite','charbon','ebony','pearl','champagne','cuivre',
  'copper','bronze','sienna','rouille','rust','blush','peach','abricot','citron',
  'vanille','vanilla','cacao','stone','sand','clay','smoke','ash','coal','ivory',
  'mist','sage','plum','cerise','framboise','magenta','fuchsia','fushia',
  'nuit','roi','mate','satin','vif','doux','nacre','irise','brule','fume','velvet',
  'glace','intense','profond','deep','dark','light','bright','soft','baby','dusty',
  'pale','vivid','lime','mint','sky','forest','ocean','denim','electric','neon',
  'fluo','pastel','naturel','naturelle','multicolore'
].map(c => c.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')));

const norm = (w) => (w||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
const isCouleur = (w) => COULEURS.has(norm(w));
const cleanName = (raw) => (raw || '').replace(/\s*\(.*?\)/g, '').trim();
const getModele = (raw) => {
  const cleaned = cleanName(raw);
  const words = cleaned.split(' ');
  let end = words.length;
  while (end > 1) {
    const w = words[end - 1];
    const prev = end >= 2 ? words[end - 2] : '';
    const pprev = end >= 3 ? words[end - 3] : '';
    if (isCouleur(w)) {
      if (prev === '&' && isCouleur(pprev)) end -= 3;
      else if (prev === '&') end -= 2;
      else if (isCouleur(prev)) end -= 2;
      else end -= 1;
    } else { break; }
  }
  return words.slice(0, end).join(' ') || cleaned;
};

const modeleKey = (modele) => {
  return (modele || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[.#$\[\]\/]/g, '_')
    .replace(/\s+/g, '_')
    .replace(/[^a-z0-9_]/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_|_$/g, '');
};

// ===================== TOAST =====================
const ToastContext = createContext(null);
function ToastProvider({ children }) {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type) => {
    const t = type || 'success';
    setToast({ msg, type: t, id: Date.now() });
    // Erreurs : 6s pour avoir le temps de lire. Sinon : 2.5s.
    const duration = t === 'error' ? 6000 : 2500;
    setTimeout(() => setToast(null), duration);
  }, []);
  return (
    <ToastContext.Provider value={show}>
      {children}
      {toast && (
        <div
          className="toast"
          style={{
            background: toast.type === 'success' ? 'var(--success)' : toast.type === 'error' ? 'var(--danger)' : 'var(--bordeaux)',
            color: 'white'
          }}
        >
          {toast.type === 'success' ? '✓ ' : toast.type === 'error' ? '⚠ ' : ''}{toast.msg}
        </div>
      )}
    </ToastContext.Provider>
  );
}
const useToast = () => useContext(ToastContext);

// ===================== LOGIN =====================
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      await window.firebaseSignIn(email, password);
    } catch (err) {
      setError('Email ou mot de passe incorrect');
      setLoading(false);
    }
  };

  return (
    <div className="login-bg min-h-screen flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl card-shadow-lg p-8 w-full max-w-md fade-in">
        <div className="text-center mb-8">
          <div className="font-display text-4xl text-bordeaux mb-1" style={{ letterSpacing: '0.05em' }}>Cataleya</div>
          <div className="text-xs uppercase tracking-widest text-ink-soft mb-4">Paris</div>
          <div className="divider mb-4"></div>
          <h2 className="font-display text-2xl text-ink">Coûts de fabrication</h2>
          <p className="text-sm text-ink-soft mt-1">Connecte-toi pour continuer</p>
        </div>
        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <label className="block text-xs font-semibold uppercase tracking-wider text-ink-soft mb-1.5">Email</label>
            <input
              type="email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              required
              className="input-field"
              autoComplete="email"
            />
          </div>
          <div>
            <label className="block text-xs font-semibold uppercase tracking-wider text-ink-soft mb-1.5">Mot de passe</label>
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              required
              className="input-field"
              autoComplete="current-password"
            />
          </div>
          {error && <div className="text-sm text-red-600 bg-red-50 px-3 py-2 rounded-md">{error}</div>}
          <button type="submit" disabled={loading} className="btn-primary w-full py-2.5">
            {loading ? 'Connexion…' : 'Se connecter'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ===================== IMPORT MODAL =====================
function ImportModal({ existingModeles, onImport, onClose }) {
  const [loading, setLoading] = useState(true);
  const [candidates, setCandidates] = useState([]);
  const [selected, setSelected] = useState({});
  const [mode, setMode] = useState('new'); // 'new' = nouveaux, 'all' = mise à jour des qtés
  const [debugInfo, setDebugInfo] = useState(null);
  const [showDebug, setShowDebug] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const snap = await window.firebaseGet(window.firebaseRef(window.db, 'lists'));
        const lists = snap.val() || {};
        const modeleCount = {};
        const debug = {
          listsCount: 0,
          listsArchived: 0,
          ordersTotal: 0,
          ordersWithName: 0,
          ordersSkipped: 0,
          listBreakdown: []
        };
        const allLists = Array.isArray(lists) ? lists : Object.values(lists);
        allLists.forEach(list => {
          if (!list) return;
          if (list.archived) { debug.listsArchived++; return; }
          debug.listsCount++;
          const orders = list.orders || [];
          const orderArr = Array.isArray(orders) ? orders : Object.values(orders);
          let listOrderCount = 0;
          let listWithName = 0;
          orderArr.forEach(o => {
            debug.ordersTotal++;
            listOrderCount++;
            if (o && o.name) {
              const modele = getModele(o.name);
              if (modele) {
                modeleCount[modele] = (modeleCount[modele] || 0) + 1;
                debug.ordersWithName++;
                listWithName++;
              } else {
                debug.ordersSkipped++;
              }
            } else {
              debug.ordersSkipped++;
            }
          });
          debug.listBreakdown.push({
            name: list.name || '(sans nom)',
            id: list.id,
            total: listOrderCount,
            withName: listWithName
          });
        });
        debug.modelesDistinct = Object.keys(modeleCount).length;
        debug.totalUnites = Object.values(modeleCount).reduce((s, n) => s + n, 0);
        setDebugInfo(debug);

        const existingKeys = new Set(Object.keys(existingModeles || {}));
        const arr = Object.entries(modeleCount)
          .map(([modele, occurrences]) => {
            const k = modeleKey(modele);
            const existing = (existingModeles || {})[k];
            return {
              modele,
              key: k,
              occurrences,
              alreadyExists: existingKeys.has(k),
              previousQuantite: existing ? (existing.quantite || 0) : null,
              quantiteChanged: existing ? (existing.quantite !== occurrences) : true
            };
          })
          .sort((a, b) => b.occurrences - a.occurrences || a.modele.localeCompare(b.modele, 'fr'));
        setCandidates(arr);
        const presel = {};
        arr.forEach(c => {
          if (!c.alreadyExists || c.quantiteChanged) presel[c.modele] = true;
        });
        setSelected(presel);
        setLoading(false);
      } catch (err) {
        console.error('Import error:', err);
        setLoading(false);
      }
    })();
  }, []);

  const visibleCandidates = useMemo(() => {
    if (mode === 'new') return candidates.filter(c => !c.alreadyExists);
    return candidates;
  }, [candidates, mode]);

  const toggleAll = () => {
    const allVisibleSelected = visibleCandidates.every(c => selected[c.modele]);
    if (allVisibleSelected) {
      const next = { ...selected };
      visibleCandidates.forEach(c => delete next[c.modele]);
      setSelected(next);
    } else {
      const next = { ...selected };
      visibleCandidates.forEach(c => { next[c.modele] = true; });
      setSelected(next);
    }
  };

  const handleImport = () => {
    const toImport = candidates
      .filter(c => selected[c.modele])
      .map(c => ({ modele: c.modele, quantite: c.occurrences, alreadyExists: c.alreadyExists }));
    onImport(toImport);
  };

  const selectedCount = Object.values(selected).filter(Boolean).length;
  const newCount = candidates.filter(c => !c.alreadyExists).length;
  const updateCount = candidates.filter(c => c.alreadyExists && c.quantiteChanged).length;

  return (
    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl card-shadow-lg w-full max-w-2xl max-h-[85vh] flex flex-col fade-in" onClick={(e) => e.stopPropagation()}>
        <div className="p-5 border-b border-creme-warm flex items-center justify-between">
          <div>
            <h3 className="font-display text-2xl text-bordeaux">Importer depuis usine-cataleya</h3>
            <p className="text-sm text-ink-soft">Modèles regroupés depuis les commandes (couleurs fusionnées)</p>
          </div>
          <div className="flex items-center gap-2">
            {debugInfo && (

            </button>
          </div>
        )}

        <div className="p-5 overflow-y-auto flex-1">
          {loading ? (
            <div className="text-center py-12 text-ink-soft">Chargement des commandes…</div>
          ) : candidates.length === 0 ? (
            <div className="text-center py-12 text-ink-soft">Aucune commande trouvée</div>
          ) : visibleCandidates.length === 0 ? (
            <div className="text-center py-12 text-ink-soft">
              {mode === 'new' ? 'Tous les modèles sont déjà importés. Va dans l\'onglet "Tous" pour mettre à jour les quantités.' : 'Aucun modèle'}
            </div>
          ) : (
            <Fragment>
              <div className="flex items-center justify-between mb-3">
                <div className="text-sm text-ink-soft">
                  {mode === 'new'
                    ? `${visibleCandidates.length} nouveaux modèles à importer`
                    : `${visibleCandidates.length} modèles • ${updateCount} avec quantité différente`}
                </div>
                {visibleCandidates.length > 0 && (
                  <button onClick={toggleAll} className="btn-ghost text-xs">
                    Tout {visibleCandidates.every(c => selected[c.modele]) ? 'désélectionner' : 'sélectionner'}
                  </button>
                )}
              </div>
              <div className="space-y-1">
                {visibleCandidates.map(c => {
                  const isSel = !!selected[c.modele];
                  const qtyDiff = c.alreadyExists ? c.occurrences - (c.previousQuantite || 0) : null;
                  return (
                    <label
                      key={c.modele}
                      className={`flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer transition hover:bg-creme-warm ${isSel ? 'bg-creme-warm' : ''}`}
                    >
                      <input
                        type="checkbox"
                        checked={isSel}
                        onChange={(e) => setSelected(s => ({ ...s, [c.modele]: e.target.checked }))}
                        className="w-4 h-4 accent-bordeaux"
                      />
                      <span className="flex-1 text-sm text-ink">{c.modele}</span>
                      {c.alreadyExists ? (
                        <Fragment>
                          {c.quantiteChanged ? (
                            <span className="text-xs text-ink-soft">
                              <span className="text-ink-soft">{c.previousQuantite}</span>
                              <span className="mx-1">→</span>
                              <span className="text-bordeaux font-semibold">{c.occurrences}</span>
                              {qtyDiff > 0 && <span className="ml-1 text-green-700">(+{qtyDiff})</span>}
                              {qtyDiff < 0 && <span className="ml-1 text-red-600">({qtyDiff})</span>}
                            </span>
                          ) : (
                            <span className="text-xs text-ink-soft">{c.occurrences}× • inchangé</span>
                          )}
                          <span className="text-xs px-2 py-0.5 rounded-full bg-creme-warm text-ink-soft">déjà importé</span>
                        </Fragment>
                      ) : (
                        <span className="text-xs text-bordeaux font-semibold">{c.occurrences}× commandé</span>
                      )}
                    </label>
                  );
                })}
              </div>
            </Fragment>
          )}
        </div>

        <div className="p-5 border-t border-creme-warm flex items-center justify-between bg-creme-warm">
          <span className="text-sm text-ink-soft">{selectedCount} sélectionnés</span>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="btn-ghost">Annuler</button>
            <button onClick={handleImport} disabled={selectedCount === 0} className="btn-primary">
              Importer {selectedCount > 0 ? `(${selectedCount})` : ''}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AddModeleModal({ existingModeles, onAdd, onClose }) {
  const [nom, setNom] = useState('');
  const [error, setError] = useState('');

  const handleAdd = () => {
    const trimmed = nom.trim();
    if (!trimmed) { setError('Nom requis'); return; }
    const key = modeleKey(trimmed);
    if (!key) { setError('Nom invalide'); return; }
    if (existingModeles && existingModeles[key]) {
      setError('Un modèle avec ce nom existe déjà');
      return;
    }
    onAdd(trimmed);
  };

  return (
    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl card-shadow-lg w-full max-w-md fade-in" onClick={(e) => e.stopPropagation()}>

// ===================== COST INPUT =====================
function CostInput({ value, placeholder, onSave, flashKey, flashMap }) {
  const inputRef = useRef(null);
  useEffect(() => {
    if (inputRef.current && document.activeElement !== inputRef.current) {
      const dom = (value == null || value === '') ? '' : String(value);
      if (inputRef.current.value !== dom) {
        inputRef.current.value = dom;
      }
    }
  }, [value]);
  const isFlash = flashKey && flashMap && !!flashMap[flashKey];
  return (
    <div className="relative">
      <input
        ref={inputRef}
        type="number"
        inputMode="decimal"
        step="0.01"
        min="0"
        placeholder={placeholder}
        defaultValue={value == null ? '' : value}
        onBlur={(e) => onSave(e.target.value)}
        onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }}
        className={`input-field cost-input ${isFlash ? 'flash-saved' : ''}`}
      />
      {isFlash && (
        <span
          className="absolute -right-1 -top-1 text-white bg-green-600 rounded-full flex items-center justify-center"
          style={{ fontSize: '10px', width: '16px', height: '16px' }}
        >✓</span>
      )}
    </div>
  );
}

// ===================== MAIN APP =====================
function App() {
  const [authState, setAuthState] = useState({ loading: true, user: null });
  const [modeles, setModeles] = useState({});
  const [meta, setMeta] = useState({});
  const [search, setSearch] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [savedFlash, setSavedFlash] = useState({});
  const [sortBy, setSortBy] = useState('nom');
  const [sortDir, setSortDir] = useState('asc');
  const showToast = useToast();
  const menuRef = useRef(null);

  // Fermer le menu quand on clique ailleurs
  useEffect(() => {
    if (!showMenu) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) {
        setShowMenu(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [showMenu]);

  useEffect(() => {
    const unsub = window.firebaseOnAuthStateChanged((u) => {
      setAuthState({ loading: false, user: u });
    });
    return () => unsub && unsub();
  }, []);

  useEffect(() => {
    if (!authState.user) return;
    const r = window.firebaseRef(window.db, 'coutCataleya/modeles');
    const unsub = window.firebaseOnValue(r, (snap) => {
      setModeles(snap.val() || {});
    });
    return () => unsub();
  }, [authState.user]);

  useEffect(() => {
    if (!authState.user) return;
    const r = window.firebaseRef(window.db, 'coutCataleya/meta');
    const unsub = window.firebaseOnValue(r, (snap) => {
      setMeta(snap.val() || {});
    });
    return () => unsub();
  }, [authState.user]);

  const handleLogout = async () => {
    await window.firebaseSignOut();
  };

  const flashSaved = (key, field) => {
    const id = `${key}-${field}`;
    setSavedFlash(s => ({ ...s, [id]: Date.now() }));
    setTimeout(() => {
      setSavedFlash(s => {
        const c = { ...s };
        delete c[id];
        return c;
      });
    }, 1500);
  };

  const saveField = async (key, field, value) => {
    const num = (value === '' || value == null) ? null : parseFloat(value);
    if (num !== null && (isNaN(num) || num < 0)) return;
    const existing = modeles[key] || {};
    const updated = {
      ...existing,
      [field]: num,
      updatedAt: Date.now(),
      updatedBy: (authState.user && authState.user.email) || 'admin'
    };
    try {
      await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/modeles/' + key), updated);
      flashSaved(key, field);
    } catch (err) {
      console.error('Save error:', err);
      const msg = err.code || err.message || 'inconnue';
      showToast('Erreur sauvegarde : ' + msg, 'error');
    }
  };

  const handleImport = async (items) => {
    let createdCount = 0;
    let updatedCount = 0;
    const failures = []; // [{nom, error}]
    try {
      for (const item of items) {
        const { modele: nom, quantite, alreadyExists } = item;
        const key = modeleKey(nom);
        if (!key) {
          failures.push({ nom, error: 'clé vide (nom invalide)' });
          continue;
        }
        try {
          if (alreadyExists) {
            const existing = modeles[key] || {};
            await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/modeles/' + key), {
              ...existing,
              quantite,
              updatedAt: Date.now(),
              updatedBy: (authState.user && authState.user.email) || 'admin',
              lastImportAt: Date.now()
            });
            updatedCount++;
          } else {
            await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/modeles/' + key), {
              nom,
              prixMetre: null,
              metresModele: null,
              coutSupp: null,
              quantite,
              createdAt: Date.now(),
              updatedAt: Date.now(),
              updatedBy: (authState.user && authState.user.email) || 'admin',
              lastImportAt: Date.now(),
              source: 'import'
            });
            createdCount++;
          }
        } catch (innerErr) {
          console.error('Save failed for', nom, '(key:', key, ')', innerErr);
          failures.push({ nom, key, error: innerErr.code || innerErr.message || 'inconnue' });
        }
      }
      try {
        await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/meta/lastImportAt'), Date.now());
      } catch (e) { /* ok */ }

      if (createdCount === 0 && updatedCount === 0 && failures.length === 0) {
        showToast('Aucun changement', 'info');
        return;
      }
      let msg = '';
      if (createdCount > 0) msg += `${createdCount} nouveau${createdCount > 1 ? 'x' : ''}`;
      if (updatedCount > 0) {
        if (msg) msg += ' • ';
        msg += `${updatedCount} mis à jour`;
      }
      if (failures.length > 0) {
        // Affiche les échecs sous forme d'alerte non auto-fermante
        const failNames = failures.map(f => `• ${f.nom} : ${f.error}`).join('\n');
        alert(`${failures.length} modèle(s) n'ont pas pu être sauvegardés :\n\n${failNames}`);
      }
      if (msg) showToast(msg);
      if (failures.length === 0) {
        setShowImport(false);
      }
    } catch (err) {
      console.error('Import error (outer):', err);
      const msg = err.code || err.message || 'inconnue';
      showToast('Erreur import : ' + msg, 'error');
    }
  };

  const handleResetAll = async () => {
    try {
      // 1. Lire les commandes depuis usine-cataleya
      const snap = await window.firebaseGet(window.firebaseRef(window.db, 'lists'));
      const lists = snap.val() || {};
      const modeleCount = {};
      const allLists = Array.isArray(lists) ? lists : Object.values(lists);
      allLists.forEach(list => {
        if (!list || list.archived) return;
        const orders = list.orders || [];
        const orderArr = Array.isArray(orders) ? orders : Object.values(orders);
        orderArr.forEach(o => {
          if (o && o.name) {
            const modele = getModele(o.name);
            if (modele) {
              modeleCount[modele] = (modeleCount[modele] || 0) + 1;
            }
          }
        });
      });

      // 2. Construire l'objet complet en mémoire (clé → modèle)
      const now = Date.now();
      const userEmail = (authState.user && authState.user.email) || 'admin';
      const newModeles = {};
      const failures = [];
      Object.entries(modeleCount).forEach(([nom, quantite]) => {
        const key = modeleKey(nom);
        if (!key) {
          failures.push({ nom, error: 'clé vide (nom invalide)' });
          return;
        }
        if (newModeles[key]) {
          // Collision de clés : deux noms différents génèrent la même clé Firebase
          failures.push({
            nom,
            error: `collision avec "${newModeles[key].nom}" (même clé : ${key})`
          });
          // On additionne quand même les quantités pour ne pas les perdre
          newModeles[key].quantite += quantite;
          return;
        }
        newModeles[key] = {
          nom,
          prixMetre: null,
          metresModele: null,
          coutSupp: null,
          quantite,
          createdAt: now,
          updatedAt: now,
          updatedBy: userEmail,
          lastImportAt: now,
          source: 'import'
        };
      });

      // 3. Écriture atomique : un seul firebaseSet pour TOUT remplacer d'un coup
      // Cela évite les états intermédiaires et garantit la cohérence
      await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/modeles'), newModeles);
      await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/meta/lastImportAt'), now);

      // 3.5 VÉRIFICATION POST-ÉCRITURE : relire ce qu'on a vraiment écrit
      const verifySnap = await window.firebaseGet(window.firebaseRef(window.db, 'coutCataleya/modeles'));
      const verifyData = verifySnap.val() || {};
      const verifyKeys = Object.keys(verifyData);
      const verifyUnits = Object.values(verifyData).reduce((s, m) => s + (parseInt(m.quantite) || 0), 0);

      // Identifier les modèles "perdus" (envoyés mais absents après lecture)
      const sentKeys = new Set(Object.keys(newModeles));
      const receivedKeys = new Set(verifyKeys);
      const lostKeys = [...sentKeys].filter(k => !receivedKeys.has(k));
      const lostModeles = lostKeys.map(k => ({
        key: k,
        nom: newModeles[k].nom,
        quantite: newModeles[k].quantite
      }));

      // 4. Récap basé sur ce qu'on a EFFECTIVEMENT écrit (pas sur l'intention)
      const importedKeys = Object.keys(newModeles);
      const importedUnits = Object.values(newModeles).reduce((s, m) => s + (m.quantite || 0), 0);
      const totalLus = Object.values(modeleCount).reduce((s, n) => s + n, 0);

      let recap = `Réinitialisation terminée\n\n`;
      recap += `Modèles trouvés dans usine-cataleya : ${Object.keys(modeleCount).length}\n`;
      recap += `Modèles envoyés à Firebase : ${importedKeys.length}\n`;
      recap += `Modèles présents en base après écriture : ${verifyKeys.length}\n`;
      recap += `Total unités lues : ${totalLus}\n`;
      recap += `Total unités envoyées : ${importedUnits}\n`;
      recap += `Total unités présentes en base : ${verifyUnits}\n`;
      if (totalLus !== verifyUnits) {
        recap += `\n⚠ ÉCART : ${totalLus - verifyUnits} unités perdues`;
      }
      if (lostModeles.length > 0) {
        recap += `\n\n🔴 ${lostModeles.length} modèles ENVOYÉS mais ABSENTS de Firebase :\n`;
        recap += lostModeles.map(m => `• "${m.nom}" (clé: ${m.key}) — ${m.quantite} unités`).join('\n');
        recap += `\n\nFirebase a probablement rejeté ces clés silencieusement.`;
      }
      if (failures.length > 0) {
        recap += `\n\nProblèmes de génération de clés (${failures.length}) :\n` + failures.map(f => `• ${f.nom} : ${f.error}`).join('\n');
      }
      alert(recap);
      showToast(`Reset · ${verifyKeys.length} modèles · ${verifyUnits} unités`);
    } catch (err) {
      console.error('Reset error:', err);
      const msg = err.code || err.message || 'inconnue';
      alert('Erreur lors du reset : ' + msg);
      showToast('Erreur reset : ' + msg, 'error');
    }
  };

  const handleAdd = async (nom) => {
    const key = modeleKey(nom);
    if (!key) return;
    try {
      await window.firebaseSet(window.firebaseRef(window.db, 'coutCataleya/modeles/' + key), {
        nom,
        prixMetre: null,
        metresModele: null,
        coutSupp: null,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        updatedBy: (authState.user && authState.user.email) || 'admin',
        source: 'manual'
      });
      showToast('Modèle ajouté');
      setShowAdd(false);
    } catch (err) {
      console.error('Add error:', err);
      const msg = err.code || err.message || 'inconnue';
      showToast('Erreur ajout : ' + msg, 'error');
    }
  };

  const handleDelete = async (key) => {
    try {
      await window.firebaseRemove(window.firebaseRef(window.db, 'coutCataleya/modeles/' + key));
      showToast('Modèle supprimé');
    } catch (err) {
      console.error('Delete error:', err);
      const msg = err.code || err.message || 'inconnue';
      showToast('Erreur suppression : ' + msg, 'error');
    }
  };

  const modeleList = useMemo(() => {
    const arr = Object.entries(modeles).map(([key, m]) => {
      const prixM = parseFloat(m.prixMetre) || 0;
      const metres = parseFloat(m.metresModele) || 0;
      const coutSupp = parseFloat(m.coutSupp) || 0;
      const coutUnit = (prixM * metres) + coutSupp;
      const quantite = parseInt(m.quantite) || 0;
      const coutTotalModele = coutUnit * quantite;
      return { key, ...m, coutUnit, quantite, coutTotalModele };
    });
    const q = search.trim().toLowerCase();
    const filtered = q ? arr.filter(m => (m.nom || '').toLowerCase().includes(q)) : arr;
    const sorted = [...filtered].sort((a, b) => {
      let va, vb;
      if (sortBy === 'nom') { va = (a.nom || '').toLowerCase(); vb = (b.nom || '').toLowerCase(); }
      else if (sortBy === 'cout') { va = a.coutUnit; vb = b.coutUnit; }
      else if (sortBy === 'metres') { va = parseFloat(a.metresModele) || 0; vb = parseFloat(b.metresModele) || 0; }
      else if (sortBy === 'quantite') { va = a.quantite; vb = b.quantite; }
      else if (sortBy === 'total') { va = a.coutTotalModele; vb = b.coutTotalModele; }
      else { va = a.nom || ''; vb = b.nom || ''; }
      if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb, 'fr') : vb.localeCompare(va, 'fr');
      return sortDir === 'asc' ? va - vb : vb - va;
    });
    return sorted;
  }, [modeles, search, sortBy, sortDir]);

  const stats = useMemo(() => {
    const total = modeleList.length;
    const completed = modeleList.filter(m => m.coutUnit > 0).length;
    const collectionCoutUnitaire = modeleList.reduce((s, m) => s + m.coutUnit, 0);
    const collectionTotalReel = modeleList.reduce((s, m) => s + m.coutTotalModele, 0);
    const totalQuantite = modeleList.reduce((s, m) => s + m.quantite, 0);
    const moyenne = completed > 0 ? collectionCoutUnitaire / completed : 0;
    return { total, completed, collectionCoutUnitaire, collectionTotalReel, totalQuantite, moyenne };
  }, [modeleList]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };

  const exportXLSX = () => {
    const data = [['Modèle', 'Prix/m (dhs)', 'Mètres/modèle', 'Coût supp. (dhs)', 'Coût unitaire (dhs)', 'Qté vendue', 'Coût total modèle (dhs)']];
    modeleList.forEach(m => {
      data.push([
        m.nom,
        m.prixMetre || '',
        m.metresModele || '',
        m.coutSupp || '',
        m.coutUnit || '',
        m.quantite || 0,
        m.coutTotalModele || ''
      ]);
    });
    data.push([]);
    data.push(['TOTAL COLLECTION', '', '', '', '', stats.totalQuantite, stats.collectionTotalReel]);
    const ws = window.XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{ wch: 30 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 18 }, { wch: 12 }, { wch: 22 }];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Coûts');
    const date = new Date().toLocaleDateString('fr-FR').replace(/\//g, '-');
    window.XLSX.writeFile(wb, `CoutsCataleya_${date}.xlsx`);
  };

  const exportPDF = () => {
    const dateStr = new Date().toLocaleDateString('fr-FR');
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Coûts de fabrication — Cataleya</title>
    <style>
      @page { size: A4 landscape; margin: 12mm; }
      body { font-family: Georgia, 'Cormorant Garamond', serif; color: #2a1a1a; }
      .head { border-bottom: 2px solid #6b1f2e; padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
      h1 { font-size: 22px; color: #6b1f2e; margin: 0; font-weight: 600; letter-spacing: 0.04em; }
      .meta { font-size: 10px; color: #5a4848; }
      table { width: 100%; border-collapse: collapse; font-family: Helvetica, Arial, sans-serif; font-size: 10px; }
      th { background: #faf6f0; border-bottom: 2px solid #6b1f2e; padding: 8px 10px; text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: #4a1520; }
      td { border-bottom: 1px solid #e8ddc8; padding: 8px 10px; }
      td.num { text-align: right; font-variant-numeric: tabular-nums; }
      td.qte { text-align: center; font-weight: 600; color: #c87454; }
      td.cost { font-weight: 600; color: #6b1f2e; }
      td.total { font-weight: 700; color: #6b1f2e; font-size: 11px; }
      tr:nth-child(even) td { background: #faf6f0; }
      .total-row td { background: #6b1f2e !important; color: white; font-weight: 600; font-size: 12px; padding: 12px 10px; }
      .no-print { position: fixed; top: 10px; right: 10px; background: #6b1f2e; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
      @media print { .no-print { display: none; } body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
    </style></head><body>
    <button class="no-print" onclick="window.print()">🖨️ Imprimer</button>
    <div class="head">
      <div>
        <h1>Cataleya · Coûts de fabrication</h1>
        <div class="meta" style="margin-top:4px;">Exporté le ${dateStr} • ${modeleList.length} modèles • ${stats.totalQuantite} unités</div>
      </div>
      <div class="meta" style="text-align:right;">
        Total collection<br>
        <span style="font-size:18px;color:#6b1f2e;font-weight:600;">${stats.collectionTotalReel.toFixed(2)} dhs</span>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>Modèle</th>
        <th style="text-align:right;">Prix/m</th>
        <th style="text-align:right;">Mètres</th>
        <th style="text-align:right;">Coût supp.</th>
        <th style="text-align:right;">Coût unit.</th>
        <th style="text-align:center;">Qté</th>
        <th style="text-align:right;">Total modèle</th>
      </tr></thead>
      <tbody>`;
    modeleList.forEach(m => {
      html += `<tr>
        <td>${m.nom || ''}</td>
        <td class="num">${m.prixMetre != null ? Number(m.prixMetre).toFixed(2) : '—'}</td>
        <td class="num">${m.metresModele != null ? Number(m.metresModele).toFixed(2) : '—'}</td>
        <td class="num">${m.coutSupp != null ? Number(m.coutSupp).toFixed(2) : '—'}</td>
        <td class="num cost">${m.coutUnit > 0 ? m.coutUnit.toFixed(2) : '—'}</td>
        <td class="qte">${m.quantite || 0}</td>
        <td class="num total">${m.coutTotalModele > 0 ? m.coutTotalModele.toFixed(2) + ' dhs' : '—'}</td>
      </tr>`;
    });
    html += `<tr class="total-row">
      <td colspan="5">TOTAL COLLECTION</td>
      <td style="text-align:center;">${stats.totalQuantite}</td>
      <td class="num">${stats.collectionTotalReel.toFixed(2)} dhs</td>
    </tr></tbody></table></body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    window.open(URL.createObjectURL(blob), '_blank');
  };

  if (authState.loading) {
    return (
      <div className="login-bg min-h-screen flex items-center justify-center">
        <div className="text-ink-soft">Chargement…</div>
      </div>
    );
  }

  if (!authState.user) {
    return <LoginScreen />;
  }

  return (
    <div className="min-h-screen">
      <Header user={authState.user} onLogout={handleLogout} />

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 mb-6">
          <StatCard label="Modèles" value={stats.total} suffix={stats.totalQuantite > 0 ? ` · ${stats.totalQuantite} u.` : ''} />
          <StatCard label="Avec coût" value={stats.completed} suffix={stats.total > 0 ? ` / ${stats.total}` : ''} />
          <StatCard label="Coût moyen / modèle" value={stats.moyenne.toFixed(0)} suffix=" dhs" />
          <StatCard label="Coût total collection" value={stats.collectionTotalReel.toFixed(0)} suffix=" dhs" highlight />
        </div>

        <div className="bg-white rounded-xl card-shadow p-4 mb-4">
          <div className="flex flex-wrap items-center gap-2">
            <input
              type="text"
              placeholder="Rechercher un modèle…"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              className="input-field flex-1 min-w-[180px]"
            />
            <button onClick={() => setShowImport(true)} className="btn-primary whitespace-nowrap">↓ Importer</button>
            <div className="w-px h-8 bg-creme-warm hidden sm:block"></div>
            <button onClick={exportPDF} className="btn-ghost whitespace-nowrap" disabled={modeleList.length === 0}>🖨 PDF</button>
            <button onClick={exportXLSX} className="btn-ghost whitespace-nowrap" disabled={modeleList.length === 0}>📊 XLSX</button>
            <div className="relative" ref={menuRef}>
              <button
                onClick={() => setShowMenu(m => !m)}
                className="btn-ghost px-3 whitespace-nowrap"
                title="Options avancées"
              >⋯</button>
              {showMenu && (
                <div className="absolute right-0 top-full mt-1 bg-white rounded-lg card-shadow-lg border border-creme-warm py-1 z-20 min-w-[240px]">
                  <button
                    onClick={() => { setShowAdd(true); setShowMenu(false); }}
                    className="w-full text-left px-4 py-2 text-sm hover:bg-creme-warm text-ink transition"
                  >+ Nouveau modèle (manuel)</button>
                  <div className="border-t border-creme-warm my-1"></div>
                  <button
                    onClick={() => { setConfirmReset(true); setShowMenu(false); }}
                    className="w-full text-left px-4 py-2 text-sm hover:bg-red-50 text-red-700 transition"
                  >⟲ Tout réinitialiser & ré-importer</button>
                </div>
              )}
            </div>
          </div>
          {meta.lastImportAt && (
            <div className="mt-2 text-xs text-ink-soft">
              Dernier import : {new Date(meta.lastImportAt).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
            </div>
          )}
        </div>

        <div className="bg-white rounded-xl card-shadow overflow-hidden desktop-only">
          {modeleList.length === 0 ? (
            <EmptyState search={search} onImport={() => setShowImport(true)} onAdd={() => setShowAdd(true)} />
          ) : (
            <table className="w-full">
              <thead>
                <tr className="bg-creme-warm">
                  <th className="text-left py-3 px-4 text-xs uppercase tracking-wider text-bordeaux font-semibold cursor-pointer hover:bg-creme" onClick={() => toggleSort('nom')}>
                    Modèle {sortBy === 'nom' ? (sortDir === 'asc' ? '↑' : '↓') : ''}
                  </th>
                  <th className="text-right py-3 px-3 text-xs uppercase tracking-wider text-bordeaux font-semibold w-28">Prix / m</th>
                  <th className="text-right py-3 px-3 text-xs uppercase tracking-wider text-bordeaux font-semibold w-28 cursor-pointer hover:bg-creme" onClick={() => toggleSort('metres')}>
                    Mètres {sortBy === 'metres' ? (sortDir === 'asc' ? '↑' : '↓') : ''}
                  </th>
                  <th className="text-right py-3 px-3 text-xs uppercase tracking-wider text-bordeaux font-semibold w-28">Coût supp.</th>
                  <th className="text-right py-3 px-3 text-xs uppercase tracking-wider text-bordeaux font-semibold w-32 cursor-pointer hover:bg-creme" onClick={() => toggleSort('cout')}>
                    Coût unit. {sortBy === 'cout' ? (sortDir === 'asc' ? '↑' : '↓') : ''}
                  </th>
                  <th className="text-center py-3 px-3 text-xs uppercase tracking-wider text-terracotta font-semibold w-20 cursor-pointer hover:bg-creme" onClick={() => toggleSort('quantite')}>
                    Qté {sortBy === 'quantite' ? (sortDir === 'asc' ? '↑' : '↓') : ''}
                  </th>
                  <th className="text-right py-3 px-4 text-xs uppercase tracking-wider text-bordeaux font-semibold w-40 cursor-pointer hover:bg-creme" onClick={() => toggleSort('total')}>
                    Total modèle {sortBy === 'total' ? (sortDir === 'asc' ? '↑' : '↓') : ''}
                  </th>
                  <th className="w-12"></th>
                </tr>
              </thead>
              <tbody>
                {modeleList.map((m, idx) => (
                  <ModeleRow
                    key={m.key}
                    modele={m}
                    isAlt={idx % 2 === 1}
                    savedFlash={savedFlash}
                    onSaveField={saveField}
                    onDelete={() => setConfirmDelete({ key: m.key, nom: m.nom })}
                  />
                ))}
                <tr className="bg-bordeaux text-white">
                  <td className="py-4 px-4 font-display text-lg" colSpan={5}>Total collection</td>
                  <td className="py-4 px-3 text-center font-display text-lg">{stats.totalQuantite} u.</td>
                  <td className="py-4 px-4 text-right font-display text-2xl">{stats.collectionTotalReel.toFixed(2)} dhs</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          )}
        </div>

        <div className="mobile-only space-y-3">
          {modeleList.length === 0 ? (
            <div className="bg-white rounded-xl card-shadow">
              <EmptyState search={search} onImport={() => setShowImport(true)} onAdd={() => setShowAdd(true)} />
            </div>
          ) : (
            <Fragment>
              {modeleList.map(m => (
                <ModeleCard
                  key={m.key}
                  modele={m}
                  savedFlash={savedFlash}
                  onSaveField={saveField}
                  onDelete={() => setConfirmDelete({ key: m.key, nom: m.nom })}
                />
              ))}
              <div className="bg-bordeaux text-white rounded-xl card-shadow-lg p-5">
                <div className="flex items-center justify-between mb-1">
                  <div className="font-display text-lg">Total collection</div>
                  <div className="font-display text-2xl">{stats.collectionTotalReel.toFixed(2)} dhs</div>
                </div>
                <div className="text-xs opacity-80 text-right">{stats.totalQuantite} unités · {stats.total} modèles</div>
              </div>
            </Fragment>
          )}
        </div>

        <div className="mt-6 text-center text-xs text-ink-soft">
          Données enregistrées automatiquement dans Firebase · projet usine-cataleya
        </div>
      </main>

      {showImport && (
        <ImportModal
          existingModeles={modeles}
          onImport={handleImport}
          onClose={() => setShowImport(false)}
        />
      )}
      {showAdd && (
        <AddModeleModal
          existingModeles={modeles}
          onAdd={handleAdd}
          onClose={() => setShowAdd(false)}
        />
      )}
      {confirmDelete && (
        <ConfirmModal
          title="Supprimer ce modèle ?"
          message={`« ${confirmDelete.nom} » sera définitivement supprimé. Cette action est irréversible.`}
          confirmLabel="Supprimer"
          danger
          onConfirm={() => handleDelete(confirmDelete.key)}
          onClose={() => setConfirmDelete(null)}
        />
      )}
      {confirmReset && (
        <ConfirmModal
          title="Tout réinitialiser ?"
          message="ATTENTION : tous les modèles et tous les prix saisis (prix/m, mètres, coût supp.) seront DÉFINITIVEMENT supprimés. Ensuite tous les modèles seront ré-importés depuis usine-cataleya avec leurs quantités. Action irréversible."
          confirmLabel="Tout supprimer & ré-importer"
          danger
          onConfirm={handleResetAll}
          onClose={() => setConfirmReset(false)}
        />
      )}
    </div>
  );
}

// ===================== MOUNT =====================
function mount() {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ToastProvider>
      <App />
    </ToastProvider>
  );
}

if (window.__firebaseReady) {
  mount();
} else {
  window.addEventListener('firebase-ready', mount, { once: true });
}
</script>
</body>
</html>
