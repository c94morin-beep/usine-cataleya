<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide Skills — Sousou</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bordeaux: #6b1e2e;
  --bordeaux-deep: #4a1320;
  --terracotta: #c75b12;
  --terracotta-soft: #e08654;
  --cream: #f5f1e8;
  --cream-warm: #ede5d3;
  --paper: #fbf8f1;
  --ink: #2a1f1a;
  --ink-soft: #5a4a42;
  --gold: #b8924a;
  --line: #d4c8b5;
  --green-success: #5a7d3f;
  --green-soft: #e8efd9;
  --code-bg: #1f1816;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.7;
  background-image:
    radial-gradient(at 20% 10%, rgba(199, 91, 18, 0.04) 0%, transparent 40%),
    radial-gradient(at 80% 80%, rgba(107, 30, 46, 0.04) 0%, transparent 40%);
  min-height: 100vh;
}

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(251, 248, 241, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  font-style: italic;
}

.logo .amp { color: var(--terracotta); font-weight: 400; }

.progress-shell {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 14px;
  max-width: 480px;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--cream-warm);
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--bordeaux) 0%, var(--terracotta) 100%);
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  width: 0%;
}

.progress-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--bordeaux);
  font-variant-numeric: tabular-nums;
}

/* ===== LAYOUT ===== */
.layout {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 32px 80px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 56px;
}

.sidebar {
  position: sticky;
  top: 96px;
  height: calc(100vh - 120px);
  overflow-y: auto;
  padding-right: 8px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 100px; }

.toc-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
}

.toc { list-style: none; }
.toc-item { margin-bottom: 4px; }

.toc-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.toc-link:hover {
  background: var(--cream);
  color: var(--bordeaux);
}

.toc-link.active {
  background: var(--bordeaux);
  color: var(--paper);
}

.toc-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--terracotta);
  font-weight: 600;
  min-width: 20px;
}

.toc-link.active .toc-num { color: var(--terracotta-soft); }

.toc-check {
  margin-left: auto;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  flex-shrink: 0;
  transition: all 0.3s;
}

.toc-check.completed {
  background: var(--green-success);
  border-color: var(--green-success);
}

.toc-check.completed::after {
  content: '✓';
  color: white;
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

/* ===== CONTENT ===== */
.content { max-width: 800px; min-width: 0; }

.section {
  display: none;
  animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.section.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 15px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-eyebrow::before {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--terracotta);
}

h1.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 500;
  line-height: 1.05;
  color: var(--bordeaux-deep);
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

h1.section-title em {
  font-style: italic;
  color: var(--terracotta);
  font-weight: 400;
}

.section-lead {
  font-size: 18px;
  line-height: 1.6;
  color: var(--ink-soft);
  margin-bottom: 40px;
  font-weight: 300;
  max-width: 680px;
}

h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--bordeaux);
  margin: 48px 0 16px;
  line-height: 1.2;
}

h2::before {
  content: '§';
  color: var(--terracotta);
  font-style: italic;
  font-weight: 400;
  margin-right: 12px;
  opacity: 0.6;
}

h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--ink);
  margin: 32px 0 10px;
}

h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--terracotta);
  margin: 24px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

p { margin-bottom: 14px; }

p.lead {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 19px;
  color: var(--ink-soft);
  line-height: 1.5;
}

strong { color: var(--bordeaux); font-weight: 600; }
em { color: var(--terracotta); font-style: italic; }

ul, ol { margin: 14px 0 22px; padding-left: 0; list-style: none; }

ul li {
  position: relative;
  padding-left: 26px;
  margin-bottom: 10px;
  line-height: 1.6;
}

ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12px;
  width: 8px;
  height: 1px;
  background: var(--terracotta);
}

ol { counter-reset: ord; }
ol li {
  position: relative;
  padding-left: 32px;
  margin-bottom: 12px;
  line-height: 1.6;
  counter-increment: ord;
}
ol li::before {
  content: counter(ord);
  position: absolute;
  left: 0;
  top: 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-weight: 600;
  font-size: 18px;
  line-height: 1.5;
}

/* ===== STEP CARD ===== */
.step {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 28px 32px;
  margin: 20px 0;
  position: relative;
  overflow: hidden;
}

.step-number {
  position: absolute;
  top: 16px;
  right: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 80px;
  color: var(--cream-warm);
  font-weight: 700;
  line-height: 1;
  z-index: 0;
}

.step-content { position: relative; z-index: 1; }

.step h3 {
  margin-top: 0;
  margin-bottom: 12px;
  color: var(--bordeaux);
}

.step p:last-child { margin-bottom: 0; }

/* ===== CALLOUT ===== */
.callout {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-warm) 100%);
  border-left: 3px solid var(--terracotta);
  padding: 22px 26px;
  margin: 28px 0;
  border-radius: 0 6px 6px 0;
}

.callout.bordeaux { border-left-color: var(--bordeaux); }

.callout-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21px;
  font-weight: 600;
  color: var(--bordeaux);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.callout-title::before {
  content: '◆';
  color: var(--terracotta);
  font-size: 13px;
}

.callout p:last-child { margin-bottom: 0; }
.callout ul:last-child { margin-bottom: 0; }

/* ===== TABLE ===== */
.table-wrap {
  margin: 28px 0;
  overflow-x: auto;
  border-radius: 8px;
  border: 1px solid var(--line);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--paper);
  font-size: 14px;
}

th {
  background: var(--bordeaux);
  color: var(--paper);
  text-align: left;
  padding: 12px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 15px;
}

td {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  vertical-align: top;
  line-height: 1.5;
}

tr:nth-child(even) td {
  background: rgba(245, 241, 232, 0.5);
}

td strong { color: var(--bordeaux); }

/* ===== CODE ===== */
code.inline {
  background: var(--cream);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--bordeaux);
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
  border: 1px solid var(--line);
}

.code-block {
  position: relative;
  background: var(--code-bg);
  color: #e8d9c8;
  padding: 22px 26px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 20px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  border-left: 3px solid var(--terracotta);
}

.code-block .code-label {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--terracotta-soft);
  margin-bottom: 10px;
}

.code-block .code-content {
  white-space: pre;
  display: block;
}

.copy-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #c5b39e;
  padding: 5px 11px;
  border-radius: 5px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.copy-btn:hover {
  background: var(--terracotta);
  border-color: var(--terracotta);
  color: white;
}

.copy-btn.copied {
  background: var(--green-success);
  border-color: var(--green-success);
  color: white;
}

.code-block .kw { color: #e08654; }
.code-block .str { color: #b8c97a; }
.code-block .com { color: #7a6a5e; font-style: italic; }
.code-block .fn { color: #d4a05a; }
.code-block .var { color: #9ec5d8; }

/* ===== SKILL CARD ===== */
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin: 24px 0;
}

.skill-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 18px 20px;
  transition: all 0.2s;
}

.skill-card:hover {
  border-color: var(--terracotta);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
}

.skill-card-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--bordeaux);
  font-weight: 600;
  margin-bottom: 6px;
}

.skill-card-desc {
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* ===== COMPARISON BOX ===== */
.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin: 24px 0;
}

@media (max-width: 768px) {
  .comparison-grid { grid-template-columns: 1fr; }
}

.compare-box {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 20px;
  position: relative;
}

.compare-box.skills {
  border-top: 3px solid var(--terracotta);
}

.compare-box.mcp {
  border-top: 3px solid var(--bordeaux);
}

.compare-box.projects {
  border-top: 3px solid var(--gold);
}

.compare-box h4 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0;
  text-transform: none;
  color: var(--bordeaux);
}

.compare-box.skills h4 { color: var(--terracotta); }
.compare-box.mcp h4 { color: var(--bordeaux); }
.compare-box.projects h4 { color: var(--gold); }

.compare-box .compare-tag {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 12px;
  font-weight: 500;
}

.compare-box ul {
  margin: 12px 0 0;
}

.compare-box ul li {
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 6px;
}

/* ===== EXERCISES ===== */
.exercises {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 26px 30px;
  margin: 36px 0;
  position: relative;
}

.exercises::before {
  content: 'À cocher';
  position: absolute;
  top: -10px;
  left: 24px;
  background: var(--bordeaux);
  color: var(--paper);
  padding: 4px 12px;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  border-radius: 4px;
}

.exercise-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--cream-warm);
  cursor: pointer;
  transition: background 0.2s;
}

.exercise-item:last-child { border-bottom: none; }

.exercise-item:hover {
  background: var(--cream);
  margin: 0 -16px;
  padding: 10px 16px;
  border-radius: 4px;
  border-bottom-color: transparent;
}

.checkbox {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--line);
  border-radius: 5px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.exercise-item:hover .checkbox { border-color: var(--terracotta); }

.checkbox.checked {
  background: var(--green-success);
  border-color: var(--green-success);
}

.checkbox.checked::after {
  content: '✓';
  color: white;
  font-size: 12px;
  font-weight: 700;
}

.exercise-text { flex: 1; line-height: 1.55; font-size: 14.5px; }
.exercise-item.completed .exercise-text {
  text-decoration: line-through;
  color: var(--ink-soft);
}

/* ===== NAV ===== */
.nav-buttons {
  display: flex;
  gap: 14px;
  margin-top: 64px;
  padding-top: 36px;
  border-top: 1px solid var(--line);
}

.nav-btn {
  flex: 1;
  padding: 16px 20px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  text-decoration: none;
  color: var(--ink);
  transition: all 0.2s;
}

.nav-btn:hover {
  border-color: var(--terracotta);
  background: var(--cream);
  transform: translateY(-1px);
}

.nav-btn-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: block;
}

.nav-btn-title { font-weight: 500; color: var(--bordeaux); }
.nav-btn.next { text-align: right; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--bordeaux);
  color: var(--paper);
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 200;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* ===== ORNAMENT ===== */
.ornament {
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--terracotta);
  margin: 36px 0;
  letter-spacing: 0.4em;
  opacity: 0.5;
  font-size: 16px;
}

/* ===== KEY/COMMAND ===== */
kbd {
  display: inline-block;
  padding: 2px 8px;
  background: var(--cream);
  border: 1px solid var(--line);
  border-bottom: 2px solid var(--ink-soft);
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--bordeaux);
  font-weight: 500;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 968px) {
  .layout { grid-template-columns: 1fr; gap: 24px; }
  .sidebar {
    position: static;
    height: auto;
    max-height: 50vh;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
  }
  h1.section-title { font-size: 36px; }
  .step-number { font-size: 60px; top: 12px; right: 18px; }
}

@media (max-width: 640px) {
  .layout { padding: 24px 18px 60px; }
  .topbar-inner { padding: 12px 16px; gap: 12px; }
  .logo { font-size: 17px; }
  .progress-label { font-size: 14px; }
  h2 { font-size: 26px; }
  h3 { font-size: 20px; }
  .step { padding: 22px; }
  .nav-buttons { flex-direction: column; }
  .code-block { padding: 16px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">Skills <span class="amp">&</span> Cie</div>
    <div class="progress-shell">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0%</div>
    </div>
  </div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="toc-title">Sommaire</div>
    <ul class="toc" id="toc"></ul>
  </aside>

  <main class="content" id="content"></main>

</div>

<div class="toast" id="toast"></div>

<script>
const SECTIONS = [

// ============================================================
// 0. INTRO
// ============================================================
{
  id: 'intro',
  num: '',
  label: "Vue d'ensemble",
  html: `
    <div class="section-eyebrow">Guide complet · Calibré desktop</div>
    <h1 class="section-title">Skills, MCP <em>et</em> compagnie</h1>
    <p class="section-lead">Sousou, voici ton guide complet pour activer, utiliser et créer tes propres Skills dans Claude Desktop. À la fin, tu sauras non seulement comment ça marche, mais aussi comment t'en servir pour Cataleya, Lywwane, et tes prestations consulting.</p>

    <h2>Ce que tu vas apprendre</h2>
    <ol>
      <li><strong>Comprendre</strong> ce qu'est un Skill, et la différence avec MCP et Projects (les 3 outils sont souvent confondus)</li>
      <li><strong>Activer</strong> les Skills dans Claude Desktop, étape par étape</li>
      <li><strong>Utiliser</strong> les Skills officiels d'Anthropic (docx, xlsx, pptx, pdf…)</li>
      <li><strong>Créer</strong> tes premiers Skills custom — on attaquera "SAV Cataleya" et "Fiche produit FR/EN"</li>
      <li><strong>Distribuer</strong> tes Skills à ton équipe ou à des clients (axe de monétisation)</li>
    </ol>

    <div class="callout">

<span class="com">## Contexte de la marque</span>

Cataleya Paris est une marque de mode modeste française basée à Alfortville (FR).
Nous expédions en France et à l'international via Mondial Relay, Packlink, UPS,
FedEx, et Chronopost. Délais standards : 3-5 jours en France métropolitaine,
7-15 jours pour l'international.

Politique retours : 14 jours pour retour, frais retour à la charge du client
sauf si produit défectueux ou erreur de notre part.

<span class="com">## Ton et style</span>

- Chaleureux, professionnel, jamais sur la défensive

- Ne jamais commencer par "Je suis désolé" — préférer "Je comprends votre [situation]"

- Phrases courtes, paragraphes aérés (3-4 lignes max)

<span class="com">## Langues</span>

- Français : registre vouvoyé, sauf si le client tutoie en premier

- Arabe : registre respectueux classique (السلام عليكم en ouverture optionnel)

<span class="com">## Structure standard d'une réponse</span>

1. **Reconnaissance** (1 phrase) : "Je comprends votre [problème]…"
2. **Solution claire** (2-4 phrases) avec étapes numérotées si pertinent

<span class="com">## Règles strictes</span>

- NE JAMAIS promettre un remboursement avant validation interne
- NE JAMAIS donner d'estimation de délai si on n'a pas le tracking actif
- TOUJOURS demander la référence de commande si elle n'est pas dans l'email
- TOUJOURS proposer un échange avant un remboursement quand c'est applicable
- NE JAMAIS critiquer un transporteur dans la réponse client

Toujours produire deux blocs séparés :

**Objet :** [objet email court et clair, en français même si le mail est en EN]

**Corps :**
[Le corps de l'email]

**Objet :** Suivi de votre commande n°12345

Bonjour,

    <p class="lead" style="margin-top: 32px;">Les Skills sont l'angle que tu vas exploiter au maximum. C'est concret, c'est livrable, c'est calibré pile sur ton profil d'opérateur. Et personne ne le fait encore vraiment.</p>

    <p>Allez, va activer Code Execution et fais ton premier test. On en reparle quand tu veux. 🥋</p>
  `,
  exercises: [
    "Lister 5 Skills que tu pourrais créer pour Cataleya/Lywwane",
    "Identifier 1 client/prospect potentiel pour un Skills Pack",
    "Estimer ton premier devis Skills Pack (setup + maintenance)",
    "Rédiger un slide \"Skills Pack\" pour ta présentation consulting"
  ]
}

];

// ============================================================
// STATE MANAGEMENT
// ============================================================

let state = {
  currentSection: 'intro',
  sectionsRead: {},
  exercisesDone: {}
};

const STORAGE_KEY = 'sousou-skills-guide-v1';

async function loadState() {
  try {
    const result = await window.storage.get(STORAGE_KEY);
    if (result && result.value) {
      state = JSON.parse(result.value);
    }
  } catch (e) {
    console.log('No saved state yet');
  }
}

async function saveState() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save error:', e);
  }
}

function computeProgress() {
  const learnable = SECTIONS.filter(s => s.id !== 'intro');
  let total = 0, done = 0;
  learnable.forEach(s => {
    total += 1;
    if (state.sectionsRead[s.id]) done += 1;
    s.exercises.forEach((_, idx) => {
      total += 1;
      if (state.exercisesDone[s.id + '-' + idx]) done += 1;
    });
  });
  return total === 0 ? 0 : Math.round((done / total) * 100);
}

function isSectionCompleted(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section || section.id === 'intro') return false;
  if (!state.sectionsRead[sectionId]) return false;
  return section.exercises.every((_, idx) => state.exercisesDone[sectionId + '-' + idx]);
}

function renderTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = SECTIONS.map(s => {
    const isActive = s.id === state.currentSection;
    const completed = isSectionCompleted(s.id);
    return `
      <li class="toc-item">
        <a class="toc-link ${isActive ? 'active' : ''}" onclick="navigateTo('${s.id}')">
          <span class="toc-num">${s.num || '★'}</span>
          <span>${s.label}</span>
          ${s.id !== 'intro' ? `<span class="toc-check ${completed ? 'completed' : ''}"></span>` : ''}
        </a>
      </li>
    `;
  }).join('');
}

function renderProgress() {
  const pct = computeProgress();
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

function renderSection() {
  const section = SECTIONS.find(s => s.id === state.currentSection);
  if (!section) return;

  let html = section.html;

  if (section.exercises && section.exercises.length > 0) {
    html += `<div class="exercises"><h3 style="margin-top: 8px;">À cocher au fur et à mesure</h3>`;
    html += section.exercises.map((ex, idx) => {
      const k = section.id + '-' + idx;
      const checked = state.exercisesDone[k];
      return `
        <div class="exercise-item ${checked ? 'completed' : ''}" onclick="toggleExercise('${section.id}', ${idx})">
          <div class="checkbox ${checked ? 'checked' : ''}"></div>
          <div class="exercise-text">${ex}</div>
        </div>
      `;
    }).join('');
    html += `</div>`;
  }

  if (section.id !== 'intro') {
    const isRead = state.sectionsRead[section.id];
    html += `
      <div style="text-align: center; margin-top: 32px;">
        <button onclick="markRead('${section.id}')" style="
          background: ${isRead ? 'var(--green-success)' : 'var(--bordeaux)'};
          color: var(--paper);
          border: none;
          padding: 13px 28px;
          border-radius: 100px;
          font-family: 'Inter', sans-serif;
          font-size: 13px;
          font-weight: 600;
          cursor: pointer;
          letter-spacing: 0.04em;
        ">${isRead ? 'Section lue ✓' : 'Marquer cette section comme lue'}</button>
      </div>
    `;
  }

  // Nav
  const idx = SECTIONS.findIndex(s => s.id === section.id);
  const prev = SECTIONS[idx - 1];
  const next = SECTIONS[idx + 1];

  html += `<div class="nav-buttons">`;
  if (prev) {
    html += `
      <a class="nav-btn" onclick="navigateTo('${prev.id}')">
        <span class="nav-btn-label">← Précédent</span>
        <span class="nav-btn-title">${prev.label}</span>
      </a>
    `;
  } else {
    html += `<div style="flex:1;"></div>`;
  }
  if (next) {
    html += `
      <a class="nav-btn next" onclick="navigateTo('${next.id}')">
        <span class="nav-btn-label">Suivant →</span>
        <span class="nav-btn-title">${next.label}</span>
      </a>
    `;
  } else {
    html += `<div style="flex:1;"></div>`;
  }
  html += `</div>`;

  document.getElementById('content').innerHTML = `<div class="section active">${html}</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderAll() {
  renderTOC();
  renderProgress();
  renderSection();
}

window.navigateTo = async function(id) {
  state.currentSection = id;
  await saveState();
  renderAll();
};

window.toggleExercise = async function(sectionId, idx) {
  const k = sectionId + '-' + idx;
  if (state.exercisesDone[k]) {
    delete state.exercisesDone[k];
  } else {
    state.exercisesDone[k] = true;
    showToast('Exercice validé ✓');
  }
  await saveState();
  renderAll();
};

window.markRead = async function(sectionId) {
  if (state.sectionsRead[sectionId]) {
    delete state.sectionsRead[sectionId];
  } else {
    state.sectionsRead[sectionId] = true;
    showToast('Section marquée comme lue');
  }
  await saveState();
  renderAll();
};

window.copyText = function(button) {
  const block = button.closest('.code-block');
  const content = block.querySelector('.code-content');
  const text = content.innerText || content.textContent;

  navigator.clipboard.writeText(text).then(() => {
    button.textContent = 'Copié ✓';
    button.classList.add('copied');
    showToast('Copié dans le presse-papiers');
    setTimeout(() => {
      button.textContent = 'Copier';
      button.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    button.textContent = 'Copié ✓';
    button.classList.add('copied');
    showToast('Copié');
    setTimeout(() => {
      button.textContent = 'Copier';
      button.classList.remove('copied');
    }, 2000);
  });
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

(async function init() {
  await loadState();
  renderAll();
})();
</script>

</body>
</html>
