<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAV — Cataleya Paris</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23c8643a'/><text y='.9em' font-size='62' x='50%' dominant-baseline='middle' text-anchor='middle' font-family='serif' fill='white'>S</text></svg>" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f5f2;
            --surface: #ffffff;
            --surface2: #f0ede8;
            --border: #e2ddd6;
            --text: #1a1714;
            --text2: #6b6560;
            --accent: #c8643a;
            --accent-light: #fdf0ea;
            --accent2: #2d5a3d;
            --accent2-light: #edf5f0;
            --gold: #c9a84c;
            --gold-light: #fdf8ed;

            --ouvert: #3b82f6;
            --ouvert-bg: #eff6ff;
            --valide: #8b5cf6;
            --valide-bg: #f5f3ff;
            --traitement: #f59e0b;
            --traitement-bg: #fffbeb;
            --resolu: #10b981;
            --resolu-bg: #ecfdf5;
            --rejete: #ef4444;
            --rejete-bg: #fef2f2;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── LOGIN ── */
        #login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--text);
            position: relative;
            overflow: hidden;
        }
        #login-screen::before {
            content: 'SAV';
            position: absolute;
            font-family: 'DM Serif Display', serif;
            font-size: 30vw;
            color: rgba(255,255,255,0.03);
            letter-spacing: -0.05em;
            user-select: none;
            pointer-events: none;
        }
        .login-box {
            background: var(--surface);
            border-radius: 20px;
            padding: 48px;
            width: 380px;
            position: relative;
            z-index: 1;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }
        .login-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 36px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
        .login-box label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .login-box input {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            background: var(--bg); color: var(--text);
            margin-bottom: 18px; outline: none; transition: border-color .2s;
        }
        .login-box input:focus { border-color: var(--accent); }
        .btn-login {
            width: 100%; padding: 14px;
            background: var(--accent); color: white;
            border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s;
        }
        .btn-login:hover { background: #b5572f; }
        .login-error { color: var(--rejete); font-size: 13px; margin-top: 12px; text-align: center; }

        /* ── LAYOUT ── */
        #app { display: none; flex-direction: column; min-height: 100vh; }

        header {
            background: var(--text);
            color: white;
            padding: 0 28px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); }
        .header-title { font-size: 13px; font-weight: 500; opacity: 0.5; letter-spacing: 0.08em; text-transform: uppercase; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .role-badge {
            font-size: 11px; font-weight: 600; padding: 3px 10px;
            border-radius: 20px; letter-spacing: 0.05em;
        }
        .btn-header {
            padding: 7px 14px; border-radius: 8px; border: none;
            font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s;
        }
        .btn-new { background: var(--accent); color: white; }
        .btn-new:hover { background: #b5572f; }
        .btn-logout { background: rgba(255,255,255,0.1); color: white; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* ── FILTRES ── */
        .filters-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
            background: white; font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all .15s; white-space: nowrap; color: var(--text2);
            display: flex; align-items: center; gap: 6px;
        }
        .filter-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .filter-count {
            background: var(--text); color: white;
            font-size: 10px; font-weight: 700;
            padding: 1px 6px; border-radius: 10px;
        }
        .filter-btn.active .filter-count { background: var(--accent); }

        /* ── KANBAN ── */
        .kanban {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            padding: 24px;
            gap: 16px;
            align-items: start;
        }

        .kanban-col {
            background: var(--surface2);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .col-header {
            padding: 14px 16px;
            display: flex; align-items: center; gap-8px;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .col-label {
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
            display: flex; align-items: center; gap: 8px;
        }
        .col-dot { width: 8px; height: 8px; border-radius: 50%; }
        .col-count {
            font-size: 12px; font-weight: 700;
            background: var(--surface); border: 1px solid var(--border);
            padding: 2px 8px; border-radius: 10px; color: var(--text2);
        }
        .col-cards { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 80px; }

        /* ── CARD ── */
        .sav-card {
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 14px;
            cursor: pointer;
            transition: all .15s;
            position: relative;
        }
        .sav-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); border-color: #ccc; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-ref { font-size: 13px; font-weight: 700; color: var(--text); }
        .card-date { font-size: 11px; color: var(--text2); }
        .card-client { font-size: 13px; color: var(--text2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag {
            font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
            letter-spacing: 0.03em;
        }
        .tag-remboursement { background: #fee2e2; color: #991b1b; }
        .tag-reconfection { background: #dcfce7; color: #166534; }
        .tag-bon { background: #fef9c3; color: #854d0e; }
        .tag-defaut { background: #e0e7ff; color: #3730a3; }
        .tag-mauvais { background: #fce7f3; color: #9d174d; }
        .tag-etiquette { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
        .card-urgence { position: absolute; top: 10px; right: 10px; font-size: 14px; }

        /* ── EMPTY ── */
        .col-empty { text-align: center; padding: 24px 16px; color: var(--text2); font-size: 13px; }

        /* ── MODAL ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 200;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border-radius: 20px;
            width: 100%; max-width: 680px; max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            animation: modalIn .2s ease;
        }
        @keyframes modalIn { from { opacity:0; transform: scale(0.96) translateY(10px); } }
        .modal-header {
            padding: 24px 28px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: white; z-index: 1; border-radius: 20px 20px 0 0;
        }
        .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
        .modal-close {
            width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
            background: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
            transition: all .15s; color: var(--text2);
        }
        .modal-close:hover { background: var(--bg); }
        .modal-body { padding: 24px 28px; }
        .modal-footer {
            padding: 16px 28px 24px;
            display: flex; gap: 10px; flex-wrap: wrap;
            border-top: 1px solid var(--border);
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            background: var(--bg); color: var(--text);
            outline: none; transition: border-color .2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: white; }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* ── STATUS BADGE ── */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .status-Ouvert { background: var(--ouvert-bg); color: var(--ouvert); }
        .status-Validé { background: var(--valide-bg); color: var(--valide); }
        .status-En\ traitement { background: var(--traitement-bg); color: var(--traitement); }
        .status-Résolu { background: var(--resolu-bg); color: var(--resolu); }
        .status-Rejeté { background: var(--rejete-bg); color: var(--rejete); }

        /* ── TIMELINE ── */
        .timeline { margin-top: 20px; }
        .timeline-item { display: flex; gap: 14px; margin-bottom: 14px; }
        .timeline-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0; margin-top: 4px;
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .timeline-line { width: 2px; background: var(--border); margin: 0 auto; }
        .timeline-content { flex: 1; }
        .timeline-action { font-size: 13px; font-weight: 600; color: var(--text); }
        .timeline-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

        /* ── SECTION TITRE ── */
        .section-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text2); margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1px solid var(--border);
        }

        /* ── INFO GRID ── */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-item label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 3px; }
        .info-item span { font-size: 14px; color: var(--text); font-weight: 500; }

        /* ── ACTIONS BUTTONS ── */
        .btn {
            padding: 10px 18px; border-radius: 10px; border: none;
            font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #b5572f; }
        .btn-success { background: var(--accent2); color: white; }
        .btn-success:hover { background: #234a31; }
        .btn-warning { background: var(--gold); color: white; }
        .btn-warning:hover { background: #b8943e; }
        .btn-danger { background: var(--rejete); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-ghost { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
        .btn-ghost:hover { background: var(--border); }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-purple:hover { background: #7c3aed; }

        /* ── RÉSOLUTION OPTIONS ── */
        .resolution-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .resolution-opt {
            border: 2px solid var(--border); border-radius: 12px; padding: 14px 10px;
            text-align: center; cursor: pointer; transition: all .2s;
        }
        .resolution-opt:hover { border-color: var(--accent); background: var(--accent-light); }
        .resolution-opt.selected { border-color: var(--accent); background: var(--accent-light); }
        .resolution-opt .opt-icon { font-size: 24px; margin-bottom: 6px; }
        .resolution-opt .opt-label { font-size: 12px; font-weight: 700; color: var(--text); }

        /* ── PHOTOS ── */
        .photos-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .photo-thumb {
            width: 80px; height: 80px; border-radius: 8px; object-fit: cover;
            border: 1.5px solid var(--border); cursor: pointer;
        }
        .photo-add {
            width: 80px; height: 80px; border-radius: 8px;
            border: 2px dashed var(--border); display: flex; align-items: center;
            justify-content: center; cursor: pointer; color: var(--text2); font-size: 22px;
            transition: all .15s;
        }
        .photo-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* ── TEMPLATE EMAIL ── */
        .email-template {
            background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
            padding: 14px; font-size: 13px; color: var(--text); line-height: 1.6;
            white-space: pre-wrap; margin-top: 8px;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--text); color: white;
            padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
            z-index: 999; opacity: 0; transform: translateY(10px);
            transition: all .3s; pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateY(0); }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .kanban { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .kanban { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .resolution-options { grid-template-columns: 1fr; }
        }

        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">Cataleya Paris</div>
        <div class="login-sub">Service Après-Vente</div>
        <label>Email</label>
        <input type="email" id="login-email" placeholder="votre@email.com" />
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" />
        <button class="btn-login" id="login-btn">Se connecter</button>
        <div class="login-error hidden" id="login-error"></div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <header>
        <div class="header-left">
            <span class="header-logo">SAV</span>
            <span class="header-title">Cataleya Paris</span>
        </div>
        <div class="header-right">
            <span class="role-badge" id="role-badge"></span>
            <button class="btn-header btn-new hidden" id="btn-new-sav">+ Nouveau dossier</button>
            <button class="btn-header btn-logout" id="btn-logout">Déconnexion</button>
        </div>
    </header>

    <div class="filters-bar">
        <button class="filter-btn active" data-filter="all">Tous <span class="filter-count" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="Ouvert">Ouverts <span class="filter-count" id="count-Ouvert">0</span></button>
        <button class="filter-btn" data-filter="Validé">Validés <span class="filter-count" id="count-Validé">0</span></button>
        <button class="filter-btn" data-filter="En traitement">En traitement <span class="filter-count" id="count-En traitement">0</span></button>
        <button class="filter-btn" data-filter="Résolu">Résolus <span class="filter-count" id="count-Résolu">0</span></button>
        <button class="filter-btn" data-filter="Rejeté">Rejetés <span class="filter-count" id="count-Rejeté">0</span></button>
    </div>

    <div class="kanban" id="kanban">
        <!-- colonnes générées par JS -->
    </div>
</div>

<!-- MODAL NOUVEAU DOSSIER -->
<div class="modal-overlay" id="modal-new">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">Nouveau dossier SAV</span>
            <button class="modal-close" onclick="closeModal('modal-new')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">N° commande *</label>
                    <input type="text" class="form-input" id="new-commande" placeholder="ex: 32183" />
                </div>
                <div class="form-group">
                    <label class="form-label">Nom cliente *</label>
                    <input type="text" class="form-input" id="new-client" placeholder="Prénom Nom" />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email cliente *</label>
                    <input type="email" class="form-input" id="new-email" placeholder="cliente@email.com" />
                </div>
                <div class="form-group">
                    <label class="form-label">Téléphone</label>
                    <input type="text" class="form-input" id="new-tel" placeholder="+33 6 00 00 00 00" />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Type de problème *</label>
                <select class="form-select" id="new-type">
                    <option value="">-- Choisir --</option>
                    <option value="Défaut de fabrication">Défaut de fabrication (tache, trou, couture...)</option>
                    <option value="Mauvais produit reçu">Mauvais produit reçu</option>
                    <option value="Produit non conforme">Produit non conforme (couleur, taille...)</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Description du problème *</label>
                <textarea class="form-textarea" id="new-desc" placeholder="Décrivez le problème signalé par la cliente..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Article(s) concerné(s)</label>
                <input type="text" class="form-input" id="new-articles" placeholder="ex: Abaya Perla Olive T52" />
            </div>
            <div class="form-group">
                <label class="form-label">Marque</label>
                <select class="form-select" id="new-marque">
                    <option value="Cataleya Paris">Cataleya Paris</option>
                    <option value="Lywwane">Lywwane</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="btn-create-sav">📋 Créer le dossier</button>
            <button class="btn btn-ghost" onclick="closeModal('modal-new')">Annuler</button>
        </div>
    </div>
</div>

<!-- MODAL DETAIL DOSSIER -->
<div class="modal-overlay" id="modal-detail">
    <div class="modal" style="max-width:740px">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="detail-title">Dossier SAV</div>
                <div style="margin-top:6px" id="detail-status-badge"></div>
            </div>
            <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
        </div>
        <div class="modal-body" id="detail-body">
            <!-- contenu dynamique -->
        </div>
        <div class="modal-footer" id="detail-footer">
            <!-- actions dynamiques -->
        </div>
    </div>
</div>

<!-- MODAL EMAIL TEMPLATE -->
<div class="modal-overlay" id="modal-email">
    <div class="modal" style="max-width:600px">
        <div class="modal-header">
            <span class="modal-title" id="email-modal-title">✉️ Email à envoyer</span>
            <button class="modal-close" onclick="closeModal('modal-email')">✕</button>
        </div>
        <div class="modal-body">
            <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Copiez ce template et envoyez-le depuis Zoho Mail :</p>
            <div class="email-template" id="email-content"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="btn-copy-email">📋 Copier l'email</button>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set, update, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDVpN0cbCqDYI2klKrWqZJAcYDX2ayx8F0",
    authDomain: "usine-cataleya.firebaseapp.com",
    databaseURL: "https://usine-cataleya-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "usine-cataleya",
    storageBucket: "usine-cataleya.firebasestorage.app",
    messagingSenderId: "218489156781",
    appId: "1:218489156781:web:92f657e50e63222a130224"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── STATE ──
let currentUser = null;
let userRole = null;
let savDossiers = {};
let currentFilter = 'all';
let currentDossierId = null;

// ── ROLES ──
const ROLE_LABELS = { admin: '🔑 Admin', operateur: '⚙️ Achraf', commentaires: '💬 Fatima', sara: '🚗 Sara', lecture: '👁 Lecture' };
const ROLE_COLORS = { admin: 'background:#fef08a;color:#713f12', operateur: 'background:#bfdbfe;color:#1e3a5f', commentaires: 'background:#bbf7d0;color:#14532d', sara: 'background:#fbcfe8;color:#831843', lecture: 'background:rgba(255,255,255,.2);color:white' };
const isAdmin = () => userRole === 'admin';
const canEdit = () => ['admin', 'operateur', 'commentaires', 'sara'].includes(userRole);

// ── AUTH ──
document.getElementById('login-btn').onclick = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pwd = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.classList.add('hidden');
    try {
        await signInWithEmailAndPassword(auth, email, pwd);
    } catch(e) {
        err.textContent = 'Email ou mot de passe incorrect';
        err.classList.remove('hidden');
    }
};
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('login-btn').click(); });
document.getElementById('btn-logout').onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid + '/role'));
        userRole = snap.exists() ? snap.val() : 'lecture';
        initApp();
    } else {
        currentUser = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    const badge = document.getElementById('role-badge');
    badge.textContent = ROLE_LABELS[userRole] || '👁 Lecture';
    badge.style.cssText = ROLE_COLORS[userRole] || ROLE_COLORS.lecture;

    if (isAdmin()) document.getElementById('btn-new-sav').classList.remove('hidden');

    // Écoute Firebase
    onValue(ref(db, 'sav_dossiers'), snap => {
        savDossiers = snap.exists() ? snap.val() : {};
        renderKanban();
        updateCounts();
    });

    // Filtres
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderKanban();
        };
    });

    document.getElementById('btn-new-sav').onclick = () => openModal('modal-new');
    document.getElementById('btn-create-sav').onclick = createDossier;
}

// ── KANBAN ──
const COLS = [
    { id: 'Ouvert', label: 'Ouvert', icon: '🔵', color: 'var(--ouvert)' },
    { id: 'Validé', label: 'Validé', icon: '🟣', color: 'var(--valide)' },
    { id: 'En traitement', label: 'En traitement', icon: '🟠', color: 'var(--traitement)' },
    { id: 'Résolu', label: 'Résolu', icon: '🟢', color: 'var(--resolu)' },
];

function renderKanban() {
    const kanban = document.getElementById('kanban');
    const dossiersList = Object.entries(savDossiers).map(([id, d]) => ({ id, ...d }));
    const filtered = currentFilter === 'all' ? dossiersList : dossiersList.filter(d => d.statut === currentFilter);

    // Si filtre = Rejeté, on affiche une colonne unique
    if (currentFilter === 'Rejeté') {
        const rejetes = filtered;
        kanban.style.gridTemplateColumns = '1fr';
        kanban.innerHTML = `
            <div class="kanban-col">
                <div class="col-header">
                    <div class="col-label"><span class="col-dot" style="background:var(--rejete)"></span>Rejetés</div>
                    <span class="col-count">${rejetes.length}</span>
                </div>
                <div class="col-cards">${rejetes.length ? rejetes.sort((a,b) => b.createdAt - a.createdAt).map(renderCard).join('') : '<div class="col-empty">Aucun dossier rejeté</div>'}</div>
            </div>`;
        attachCardListeners();
        return;
    }

    kanban.style.gridTemplateColumns = 'repeat(4, 1fr)';
    kanban.innerHTML = COLS.map(col => {
        const cards = filtered.filter(d => d.statut === col.id).sort((a, b) => b.createdAt - a.createdAt);
        return `
        <div class="kanban-col">
            <div class="col-header">
                <div class="col-label"><span class="col-dot" style="background:${col.color}"></span>${col.label}</div>
                <span class="col-count">${cards.length}</span>
            </div>
            <div class="col-cards">
                ${cards.length ? cards.map(renderCard).join('') : '<div class="col-empty">Aucun dossier</div>'}
            </div>
        </div>`;
    }).join('');
    attachCardListeners();
}

function renderCard(d) {
    const resTag = d.resolution ? `<span class="tag tag-${d.resolution === 'Remboursement' ? 'remboursement' : d.resolution === 'Reconfection' ? 'reconfection' : 'bon'}">${d.resolution}</span>` : '';
    const typeTag = d.type ? `<span class="tag tag-${d.type === 'Mauvais produit reçu' ? 'mauvais' : 'defaut'}">${d.type}</span>` : '';
    const etiqTag = d.etiquetteEnvoyee ? `<span class="tag tag-etiquette">✓ Étiquette</span>` : '';
    return `
    <div class="sav-card" data-id="${d.id}">
        <div class="card-top">
            <span class="card-ref">#${d.commande || '—'}</span>
            <span class="card-date">${formatDate(d.createdAt)}</span>
        </div>
        <div class="card-client">👤 ${d.client || '—'}</div>
        <div class="card-tags">${typeTag}${resTag}${etiqTag}</div>
    </div>`;
}

function attachCardListeners() {
    document.querySelectorAll('.sav-card').forEach(card => {
        card.onclick = () => openDetail(card.dataset.id);
    });
}

// ── COUNTS ──
function updateCounts() {
    const list = Object.values(savDossiers);
    document.getElementById('count-all').textContent = list.length;
    ['Ouvert', 'Validé', 'En traitement', 'Résolu', 'Rejeté'].forEach(s => {
        const el = document.getElementById('count-' + s);
        if (el) el.textContent = list.filter(d => d.statut === s).length;
    });
}

// ── CRÉER DOSSIER ──
async function createDossier() {
    const commande = document.getElementById('new-commande').value.trim();
    const client = document.getElementById('new-client').value.trim();
    const email = document.getElementById('new-email').value.trim();
    const tel = document.getElementById('new-tel').value.trim();
    const type = document.getElementById('new-type').value;
    const desc = document.getElementById('new-desc').value.trim();
    const articles = document.getElementById('new-articles').value.trim();
    const marque = document.getElementById('new-marque').value;

    if (!commande || !client || !email || !type || !desc) { toast('⚠️ Remplissez tous les champs obligatoires'); return; }

    const newRef = push(ref(db, 'sav_dossiers'));
    const dossier = {
        id: newRef.key,
        commande, client, email, tel, type, desc, articles, marque,
        statut: 'Ouvert',
        resolution: null,
        etiquetteEnvoyee: false,
        createdAt: Date.now(),
        createdBy: currentUser.email,
        timeline: [{
            action: 'Dossier ouvert',
            by: currentUser.email,
            at: Date.now()
        }]
    };
    await set(newRef, dossier);
    closeModal('modal-new');
    clearNewForm();
    toast('✅ Dossier SAV créé');
}

function clearNewForm() {
    ['new-commande','new-client','new-email','new-tel','new-desc','new-articles'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('new-type').value = '';
    document.getElementById('new-marque').value = 'Cataleya Paris';
}

// ── DETAIL ──
function openDetail(id) {
    currentDossierId = id;
    const d = { id, ...savDossiers[id] };
    renderDetail(d);
    openModal('modal-detail');
}

function renderDetail(d) {
    document.getElementById('detail-title').textContent = `Dossier #${d.commande || d.id.slice(-6)}`;
    document.getElementById('detail-status-badge').innerHTML = `<span class="status-badge status-${d.statut}">${d.statut}</span>` + (d.marque ? ` <span style="font-size:12px;color:var(--text2);margin-left:8px">${d.marque}</span>` : '');

    const timeline = (d.timeline || []).slice().reverse();

    document.getElementById('detail-body').innerHTML = `
        <div class="info-grid">
            <div class="info-item"><label>Commande</label><span>#${d.commande || '—'}</span></div>
            <div class="info-item"><label>Cliente</label><span>${d.client || '—'}</span></div>
            <div class="info-item"><label>Email</label><span>${d.email || '—'}</span></div>
            <div class="info-item"><label>Téléphone</label><span>${d.tel || '—'}</span></div>
            <div class="info-item"><label>Type</label><span>${d.type || '—'}</span></div>
            <div class="info-item"><label>Articles</label><span>${d.articles || '—'}</span></div>
            ${d.resolution ? `<div class="info-item"><label>Résolution</label><span>${d.resolution}</span></div>` : ''}
            ${d.etiquetteEnvoyee ? `<div class="info-item"><label>Étiquette retour</label><span style="color:var(--accent2)">✓ Envoyée</span></div>` : ''}
        </div>
        <div class="form-group">
            <div class="section-title">Description du problème</div>
            <p style="font-size:14px;line-height:1.6;color:var(--text)">${d.desc || '—'}</p>
        </div>
        ${d.statut === 'Validé' && !d.resolution ? `
        <div class="form-group">
            <div class="section-title">Résolution proposée</div>
            <div class="resolution-options">
                <div class="resolution-opt" data-res="Reconfection"><div class="opt-icon">🧵</div><div class="opt-label">Reconfection</div></div>
                <div class="resolution-opt" data-res="Bon d'achat"><div class="opt-icon">🎫</div><div class="opt-label">Bon d'achat</div></div>
                <div class="resolution-opt" data-res="Remboursement"><div class="opt-icon">💶</div><div class="opt-label">Remboursement</div></div>
            </div>
        </div>` : ''}
        ${d.resolution && d.statut === 'En traitement' ? `
        <div class="form-group">
            <div class="section-title">Notes de traitement</div>
            <textarea class="form-textarea" id="detail-notes" placeholder="Ajouter une note de traitement...">${d.notes || ''}</textarea>
        </div>` : ''}
        <div class="form-group" style="margin-top:20px">
            <div class="section-title">Historique</div>
            <div class="timeline">
                ${timeline.map((t, i) => `
                <div class="timeline-item">
                    <div>
                        <div class="timeline-dot" style="${i > 0 ? 'background:var(--border);box-shadow:none' : ''}"></div>
                    </div>
                    <div class="timeline-content">
                        <div class="timeline-action">${t.action}</div>
                        <div class="timeline-meta">${t.by} · ${formatDateTime(t.at)}</div>
                    </div>
                </div>`).join('')}
            </div>
        </div>
    `;

    // Listeners résolution
    document.querySelectorAll('.resolution-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.resolution-opt').forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
        };
    });

    renderDetailFooter(d);
}

function renderDetailFooter(d) {
    const footer = document.getElementById('detail-footer');
    let btns = '';

    if (canEdit()) {
        if (d.statut === 'Ouvert') {
            if (isAdmin()) {
                btns += `<button class="btn btn-success" onclick="actionValider()">✅ Valider le dossier</button>`;
                btns += `<button class="btn btn-danger" onclick="actionRejeter()">❌ Rejeter</button>`;
            }
            btns += `<button class="btn btn-ghost" onclick="showEmailTemplate('accusé')">✉️ Email accusé réception</button>`;
        }
        if (d.statut === 'Validé') {
            btns += `<button class="btn btn-ghost" onclick="showEmailTemplate('acceptation')">✉️ Email acceptation + options</button>`;
            if (!d.etiquetteEnvoyee) btns += `<button class="btn btn-warning" onclick="actionEtiquette()">📦 Marquer étiquette envoyée</button>`;
            btns += `<button class="btn btn-purple" onclick="actionChoisirResolution()">🎯 Enregistrer résolution</button>`;
        }
        if (d.statut === 'En traitement') {
            if (d.resolution === 'Reconfection' && !d.reconfectionLancee) {
                btns += `<button class="btn btn-success" onclick="openReconfectionModal()">🧵 Lancer reconfection</button>`;
            }
            if (d.reconfectionLancee) {
                btns += `<span style="font-size:13px;color:var(--accent2);font-weight:600">✓ Reconfection envoyée en production</span>`;
            }
            btns += `<button class="btn btn-primary" onclick="actionResoudre()">✓ Marquer résolu</button>`;
            btns += `<button class="btn btn-ghost" onclick="actionSaveNotes()">💾 Sauvegarder notes</button>`;
        }
        if (d.statut === 'Rejeté') {
            btns += `<button class="btn btn-ghost" onclick="showEmailTemplate('refus')">✉️ Email de refus</button>`;
        }
    }
    btns += `<button class="btn btn-ghost" onclick="closeModal('modal-detail')">Fermer</button>`;
    footer.innerHTML = btns;
}

// ── ACTIONS ──
window.actionValider = async () => {
    await updateDossier({ statut: 'Validé' }, 'Dossier validé — en attente choix résolution');
    toast('✅ Dossier validé');
};

window.actionRejeter = async () => {
    if (!confirm('Rejeter ce dossier SAV ?')) return;
    await updateDossier({ statut: 'Rejeté' }, 'Dossier rejeté');
    toast('❌ Dossier rejeté');
};

window.actionEtiquette = async () => {
    await updateDossier({ etiquetteEnvoyee: true }, 'Étiquette de retour envoyée à la cliente');
    toast('📦 Étiquette marquée comme envoyée');
};

window.actionChoisirResolution = async () => {
    const selected = document.querySelector('.resolution-opt.selected');
    if (!selected) { toast('⚠️ Choisissez une résolution'); return; }
    const res = selected.dataset.res;
    await updateDossier({ statut: 'En traitement', resolution: res }, `Résolution choisie : ${res}`);
    toast('🎯 Résolution enregistrée — En traitement');
};

window.actionResoudre = async () => {
    const notes = document.getElementById('detail-notes')?.value || '';
    await updateDossier({ statut: 'Résolu', notes }, 'Dossier résolu');
    toast('🎉 Dossier résolu !');
};

window.actionSaveNotes = async () => {
    const notes = document.getElementById('detail-notes')?.value || '';
    const dosRef = ref(db, 'sav_dossiers/' + currentDossierId);
    await update(dosRef, { notes });
    toast('💾 Notes sauvegardées');
};

async function updateDossier(updates, logAction) {
    const dosRef = ref(db, 'sav_dossiers/' + currentDossierId);
    const snap = await get(dosRef);
    const current = snap.val();
    const timeline = current.timeline || [];
    timeline.push({ action: logAction, by: currentUser.email, at: Date.now() });
    await update(dosRef, { ...updates, timeline });
    // Refresh detail
    const newSnap = await get(dosRef);
    renderDetail({ id: currentDossierId, ...newSnap.val() });
}

// ── RECONFECTION ──
window.openReconfectionModal = () => {
    const d = savDossiers[currentDossierId];
    if (!d) return;
    // Pré-remplir avec les articles du dossier
    document.getElementById('rec-nom').value = d.articles || '';
    document.getElementById('rec-taille').value = '';
    document.getElementById('rec-opt1').value = '';
    document.getElementById('rec-opt2').value = '';
    document.getElementById('rec-opt3').value = '';
    document.getElementById('rec-img').value = '';
    document.getElementById('rec-qty').value = '1';
    updateRecPreview();
    openModal('modal-reconfection');
};

function buildArticleName() {
    const nom = document.getElementById('rec-nom').value.trim();
    const taille = document.getElementById('rec-taille').value.trim();
    const opt1 = document.getElementById('rec-opt1').value.trim();
    const opt2 = document.getElementById('rec-opt2').value.trim();
    const opt3 = document.getElementById('rec-opt3').value.trim();
    if (!nom) return '';
    let parts = [];
    if (taille) parts.push(`Taille personnalisée: Taille personnalisée: ${taille}`);
    if (opt1) parts.push(`Option: ${opt1}`);
    if (opt2) parts.push(`Option2: ${opt2}`);
    if (opt3) parts.push(`Option3: ${opt3}`);
    return parts.length ? `${nom} (${parts.join(', ')})` : nom;
}

function updateRecPreview() {
    document.getElementById('rec-preview').textContent = buildArticleName() || '—';
}

['rec-nom','rec-taille','rec-opt1','rec-opt2','rec-opt3'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', updateRecPreview);
});

document.getElementById('btn-confirm-reconfection').onclick = async () => {
    const nom = buildArticleName();
    if (!nom) { toast('⚠️ Renseignez le nom de l\'article'); return; }
    const d = savDossiers[currentDossierId];
    if (!d) return;

    const qty = parseInt(document.getElementById('rec-qty').value) || 1;
    const urlImage = document.getElementById('rec-img').value.trim();

    // Chercher ou créer la liste "♻️ Reconfections SAV"
    const listsSnap = await get(ref(db, 'lists'));
    let lists = listsSnap.exists() ? listsSnap.val() : [];
    if (!Array.isArray(lists)) lists = Object.values(lists);

    let savList = lists.find(l => l.name && l.name.includes('Reconfections SAV'));
    let savListId;

    if (!savList) {
        // Créer la liste
        const newList = {
            id: 'sav-reconfection-' + Date.now(),
            name: '♻️ Reconfections SAV',
            orders: [],
            archived: false,
            createdAt: new Date().toISOString()
        };
        lists.push(newList);
        savListId = newList.id;
        savList = newList;
    } else {
        savListId = savList.id;
    }

    // Créer la commande
    const newOrder = {
        id: Date.now() + '-SAV',
        reference: 'SAV-' + d.commande,
        client: d.client || '',
        email: d.email || '',
        telephone: d.tel || '',
        adresse_livraison: '',
        transporteur: '♻️ SAV — Reconfection',
        name: nom,
        quantity: qty,
        status: 'En attente',
        url_image: urlImage || '',
        commentaires: `♻️ Reconfection SAV — Dossier #${d.commande} — ${d.type || ''}`,
        commentAuthor: 'SAV',
        updatedAt: Date.now()
    };

    // Injecter dans la liste
    const updatedLists = lists.map(l => {
        if (l.id === savListId) {
            return { ...l, orders: [...(l.orders || []), newOrder] };
        }
        return l;
    });

    await set(ref(db, 'lists'), updatedLists);

    // Marquer le dossier SAV comme reconfection lancée
    await updateDossier({ reconfectionLancee: true }, `Reconfection lancée en production — article : ${nom}`);

    closeModal('modal-reconfection');
    toast('🧵 Reconfection ajoutée dans la liste production !');
};

// ── EMAIL TEMPLATES ──
window.showEmailTemplate = (type) => {
    const d = savDossiers[currentDossierId];
    if (!d) return;
    const prenom = d.client?.split(' ')[0] || 'Madame';
    let subject = '', body = '';

    if (type === 'accusé') {
        subject = `Votre demande SAV — Commande #${d.commande}`;
        body = `Bonjour ${prenom},\n\nNous avons bien reçu votre message concernant votre commande #${d.commande} et nous vous en remercions.\n\nNous examinons actuellement votre demande et reviendrons vers vous dans les plus brefs délais.\n\nPourriez-vous nous faire parvenir des photos du défaut constaté si ce n'est pas déjà fait ? Cela nous permettra de traiter votre dossier au plus vite.\n\nCordialement,\nL'équipe ${d.marque || 'Cataleya Paris'}`;
    } else if (type === 'acceptation') {
        subject = `Votre dossier SAV accepté — Commande #${d.commande}`;
        body = `Bonjour ${prenom},\n\nAprès examen de votre demande concernant votre commande #${d.commande}, nous avons bien pris note du problème signalé et nous nous en excusons sincèrement.\n\nAfin de résoudre cette situation, nous vous proposons les options suivantes :\n\n🧵 Reconfection — Nous recréons l'article à l'identique (option privilégiée)\n🎫 Bon d'achat — Un avoir sur votre prochain achat\n💶 Remboursement — Remboursement du ou des article(s) concerné(s)\n\nUne étiquette de retour vous sera envoyée sous peu pour le renvoi de l'article.\n\nPouvez-vous nous indiquer votre choix en répondant à cet email ?\n\nCordialement,\nL'équipe ${d.marque || 'Cataleya Paris'}`;
    } else if (type === 'refus') {
        subject = `Votre demande SAV — Commande #${d.commande}`;
        body = `Bonjour ${prenom},\n\nNous avons bien examiné votre demande concernant votre commande #${d.commande}.\n\nAprès analyse, nous ne sommes malheureusement pas en mesure de donner suite à votre demande SAV car le motif signalé ne correspond pas à un défaut de fabrication ou à une erreur de notre part.\n\nNous restons bien entendu à votre disposition pour tout renseignement complémentaire.\n\nCordialement,\nL'équipe ${d.marque || 'Cataleya Paris'}`;
    }

    document.getElementById('email-modal-title').textContent = `✉️ ${subject}`;
    document.getElementById('email-content').textContent = body;
    document.getElementById('btn-copy-email').onclick = () => {
        navigator.clipboard.writeText(`Objet : ${subject}\n\n${body}`);
        toast('📋 Email copié !');
    };
    openModal('modal-email');
};

// ── UTILS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
window.closeModal = closeModal;
window.showEmailTemplate = window.showEmailTemplate;

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}

function formatDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}
function formatDateTime(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// Fermer modals en cliquant overlay
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.onclick = (e) => { if (e.target === overlay) overlay.classList.remove('open'); };
});
</script>
</body>
</html>
