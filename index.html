                        {canAdd && (
                            <button onClick={() => { resetForm(); setShowForm(true); }}
                                className="px-3 py-1.5 bg-orange-500 text-white rounded-lg text-sm font-semibold hover:bg-orange-600">
                                ➕ Nouveau SAV
                            </button>
                        )}
                    </div>

                    {/* Stats */}
                    <div className="flex gap-3 mb-4 flex-wrap">
                        {SAV_STATUTS.map(s => {
                            const col = STATUS_COLORS[s];
                            return (
                                <div key={s} className={`px-3 py-2 rounded-xl border text-sm font-semibold cursor-pointer transition ${filterStatus === s ? 'border-orange-400 bg-orange-50' : 'border-gray-200 bg-white'}`}
                                    onClick={() => setFilterStatus(filterStatus === s ? 'tous' : s)}>
                                    <span className={`inline-block w-2 h-2 rounded-full mr-2 ${col.dot}`}></span>
                                    {s} <span className={`ml-1 ${col.text} font-bold`}>{counts[s] || 0}</span>
                                </div>
                            );
                        })}
                        <div className="px-3 py-2 rounded-xl border border-gray-200 bg-white text-sm font-semibold cursor-pointer"
                            onClick={() => setFilterStatus('tous')}>
                            Tous <span className="ml-1 text-gray-600 font-bold">{totalArticles}</span>
                        </div>
                    </div>

                    {/* Search */}
                    <div className="relative mb-4">
                        <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                            placeholder="🔍 Rechercher par produit, cliente, référence..."
                            className="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-orange-400" />
                        {search && <button onClick={() => setSearch('')} className="absolute right-3 top-2 text-gray-400 hover:text-gray-600">✕</button>}
                    </div>

                    {/* Liste SAV */}
                    {filtered.length === 0 ? (
                        <div className="text-center text-gray-400 py-12">
                            {savList.length === 0 ? 'Aucun article SAV pour le moment.' : 'Aucun résultat.'}
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 gap-4">
                            {filtered.map(sav => (
                                <div key={sav.id} className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                    {/* En-tête commande */}
                                    <div className="bg-orange-50 border-b border-orange-100 px-4 py-2 flex items-center justify-between gap-2 flex-wrap">
                                        <div className="flex items-center gap-3">
                                            {sav.reference && <span className="font-bold text-orange-800 text-sm">📦 Réf. {sav.reference}</span>}
                                            {sav.cliente && <span className="text-xs text-orange-600">👤 {sav.cliente}</span>}
                                            <span className="text-xs text-orange-400">{sav.articles.length} article{sav.articles.length > 1 ? 's' : ''}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            {canEdit && (
                                                <button onClick={() => openEdit(sav)}
                                                    className="text-xs px-2 py-1 border border-orange-200 rounded-lg text-orange-600 hover:bg-orange-100">✏️ Modifier</button>
                                            )}
                                            {isAdmin && (
                                                <button onClick={() => deleteSAV(sav.id)}
                                                    className="text-xs px-2 py-1 border border-red-200 rounded-lg text-red-500 hover:bg-red-50">🗑</button>
                                            )}
                                        </div>
                                    </div>
                                    {/* Articles */}
                                    <div className="divide-y divide-gray-100">
                                        {sav.articles.map((art, idx) => {
                                            const col = STATUS_COLORS[art.status] || STATUS_COLORS['En attente'];
                                            const showThisArticle = filterStatus === 'tous' || art.status === filterStatus;
                                            if (!showThisArticle) return null;
                                            return (
                                                <div key={idx} className="p-3 flex items-start gap-3">
                                                    {art.photoUrl && (
                                                        <img src={art.photoUrl} className="w-14 h-14 object-cover rounded-lg border border-gray-200 flex-shrink-0"
                                                            onError={e => e.target.style.display='none'} />
                                                    )}
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2 flex-wrap mb-1">
                                                            <span className="font-semibold text-gray-800 text-sm">{art.produit}</span>
                                                            {art.couleurTaille && <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">{art.couleurTaille}</span>}
                                                            <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${col.bg} ${col.text}`}>
                                                                <span className={`inline-block w-1.5 h-1.5 rounded-full mr-1 ${col.dot}`}></span>
                                                                {art.status}
                                                            </span>
                                                        </div>
                                                        {art.description && <p className="text-xs text-gray-600 italic bg-gray-50 rounded p-2 mb-1">{art.description}</p>}
                                                        {canStatus && (
                                                            <select value={art.status}
                                                                onChange={e => updateArticleStatus(sav.id, idx, e.target.value)}
                                                                className="text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:border-orange-400 mt-1">
                                                                {SAV_STATUTS.map(s => <option key={s} value={s}>{s}</option>)}
                                                            </select>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    {sav.updatedBy && (
                                        <div className="px-4 py-1 text-xs text-gray-300 border-t border-gray-100">Modifié par {sav.updatedBy}</div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Modal création/édition SAV */}
                    {showForm && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-xl max-h-[90vh] overflow-y-auto">
                                <h3 className="text-lg font-bold mb-4">{editSavId ? '✏️ Modifier le SAV' : '➕ Nouveau SAV'}</h3>

                                {/* Infos commande */}
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Nom de la cliente</label>
                                        <input value={formHeader.cliente} onChange={e => setFormHeader(p => ({...p, cliente: e.target.value}))}
                                            className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-400" placeholder="Ex: Marie D." />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1">Référence commande</label>
                                        <input value={formHeader.reference} onChange={e => setFormHeader(p => ({...p, reference: e.target.value}))}
                                            className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-400" placeholder="Ex: 32564" />
                                    </div>
                                </div>

                                {/* Articles */}
                                <div className="mb-3">
                                    <label className="block text-xs font-semibold text-gray-600 mb-2">Articles *</label>
                                    <div className="flex flex-col gap-3">
                                        {formArticles.map((art, i) => (
                                            <div key={i} className="border border-gray-200 rounded-xl p-3 relative">
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-xs font-bold text-orange-600">Article {i + 1}</span>
                                                    {formArticles.length > 1 && (
                                                        <button onClick={() => removeArticleRow(i)} className="text-red-400 hover:text-red-600 text-xs">✕ Supprimer</button>
                                                    )}
                                                </div>
                                                <input value={art.produit} onChange={e => updateArticleRow(i, 'produit', e.target.value)}
                                                    className="w-full border rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:border-orange-400" placeholder="Nom du produit *" />
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    <input value={art.couleurTaille} onChange={e => updateArticleRow(i, 'couleurTaille', e.target.value)}
                                                        className="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-400" placeholder="Couleur / Taille" />
                                                    <select value={art.status} onChange={e => updateArticleRow(i, 'status', e.target.value)}
                                                        className="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-400">
                                                        {SAV_STATUTS.map(s => <option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                                <textarea value={art.description} onChange={e => updateArticleRow(i, 'description', e.target.value)}
                                                    rows={2} className="w-full border rounded-lg px-3 py-2 text-sm resize-none mb-2 focus:outline-none focus:border-orange-400"
                                                    placeholder="Description du problème..." />
                                                <input value={art.photoUrl} onChange={e => updateArticleRow(i, 'photoUrl', e.target.value)}
                                                    className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-400" placeholder="URL photo (https://...)" />
                                                {art.photoUrl && <img src={art.photoUrl} className="mt-2 h-20 rounded-lg object-cover" onError={e => e.target.style.display='none'} />}
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={addArticleRow}
                                        className="mt-3 w-full py-2 border-2 border-dashed border-orange-300 text-orange-500 rounded-xl text-sm font-semibold hover:bg-orange-50">
                                        ➕ Ajouter un article
                                    </button>
                                </div>

                                <div className="flex gap-2 justify-end mt-4">
                                    <button onClick={resetForm} className="px-4 py-2 border rounded-lg text-sm text-gray-600 hover:bg-gray-50">Annuler</button>
                                    <button onClick={saveSAV} disabled={!formArticles.some(a => a.produit.trim())}
                                        className="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-semibold hover:bg-orange-600 disabled:opacity-50">
                                        {editSavId ? '✅ Enregistrer' : '➕ Créer le SAV'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    </div>
                    )}
                </div>
            );
        }

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <div style="position:fixed;bottom:8px;right:12px;font-size:10px;color:#aaa;z-index:9999;pointer-events:none;">v3.5 — 27/03/26</div>
</body>
</html>
