    <script>
        // Impression étiquette via proxy PHP + window.print()
        window.printLabel = async function(labelUrl, fallbackFn) {
            try {
                const proxyUrl = 'https://www.cataleyaparis.com/proxy-label.php?url=' + encodeURIComponent(labelUrl);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Fetch PDF échoué: ' + response.status);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const win = window.open(blobUrl, '_blank');
                if (win) {
                    win.onload = function() {
                        setTimeout(() => {
                            win.focus();
                            win.print();
                        }, 800);
                    };
                } else { fallbackFn(); }
            } catch(e) {
                console.warn('[Print] Erreur, fallback:', e);
                fallbackFn();
            }
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Statuts
        const STATUTS = {
            EN_ATTENTE: 'En attente',
            RECU: 'Reçu',
            RANGE: 'Rangé',
            AVEC_COMMENTAIRE: 'Avec commentaire'
        };

        // Composant principal
        // ── Thèmes de listes (constantes globales) ──────────────────────────────
        const LIST_THEMES = [
            { id: 'global', from: '#16a34a', to: '#059669', gradient: 'from-green-600 to-emerald-600', headerSub: 'text-green-100',  tabActive: 'bg-green-100 text-green-700 border-2 border-green-300',   btnActive: 'bg-green-600 text-white border-green-600',   label: '📂 GLOBAL', accent: '#16a34a' },
            { from: '#2563eb', to: '#4338ca', gradient: 'from-blue-600 to-indigo-600',     headerSub: 'text-blue-100',   tabActive: 'bg-blue-100 text-blue-700 border-2 border-blue-300',     btnActive: 'bg-blue-600 text-white border-blue-600',     accent: '#2563eb' },
            { from: '#9333ea', to: '#7c3aed', gradient: 'from-purple-600 to-violet-600',   headerSub: 'text-purple-100', tabActive: 'bg-purple-100 text-purple-700 border-2 border-purple-300', btnActive: 'bg-purple-600 text-white border-purple-600', accent: '#9333ea' },
            { from: '#f97316', to: '#d97706', gradient: 'from-orange-500 to-amber-500',    headerSub: 'text-orange-100', tabActive: 'bg-orange-100 text-orange-700 border-2 border-orange-300', btnActive: 'bg-orange-500 text-white border-orange-500', accent: '#f97316' },
            { from: '#e11d48', to: '#db2777', gradient: 'from-rose-600 to-pink-600',       headerSub: 'text-rose-100',   tabActive: 'bg-rose-100 text-rose-700 border-2 border-rose-300',       btnActive: 'bg-rose-600 text-white border-rose-600',     accent: '#e11d48' },
            { from: '#0d9488', to: '#0891b2', gradient: 'from-teal-600 to-cyan-600',       headerSub: 'text-teal-100',   tabActive: 'bg-teal-100 text-teal-700 border-2 border-teal-300',       btnActive: 'bg-teal-600 text-white border-teal-600',     accent: '#0d9488' },
            { from: '#ca8a04', to: '#65a30d', gradient: 'from-yellow-500 to-lime-500',     headerSub: 'text-yellow-100', tabActive: 'bg-yellow-100 text-yellow-700 border-2 border-yellow-300', btnActive: 'bg-yellow-500 text-white border-yellow-500', accent: '#eab308' },
        ];
        const getTheme = (listId, listsArr) => {
            if (!listId || listId === 'global') return LIST_THEMES[0];
            const idx = listsArr.findIndex(l => l.id === listId);
            if (idx === -1) return LIST_THEMES[1];
            return LIST_THEMES[(idx % (LIST_THEMES.length - 1)) + 1];
        };
        // ────────────────────────────────────────────────────────────────────────

        function App() {
            const [lists, setLists] = useState([]);
            // activeListId géré via wrapper ci-dessous

            // Système de thèmes par liste
            // (LIST_THEMES et getTheme définis en global)
            const [activeTab, setActiveTabRaw] = useState(() => localStorage.getItem('cataleya_activeTab') || 'dashboard');
            const setActiveTab = (tab) => { setActiveTabRaw(tab); localStorage.setItem('cataleya_activeTab', tab); };
            const [activeListIdRaw, setActiveListIdRaw] = useState(() => localStorage.getItem('cataleya_activeListId') || 'global');
            const setActiveListId = (id) => { setActiveListIdRaw(id); localStorage.setItem('cataleya_activeListId', id); };
            const activeListId = activeListIdRaw;
            const activeTheme = getTheme(activeListId, lists);
            const activeListName = activeListId === 'global' ? 'GLOBAL' : lists.find(l => l.id === activeListId)?.name || '';
            const [showArchives, setShowArchives] = useState(false);
            const [editingArchiveListId, setEditingArchiveListId] = useState(null);
            const [editingArchiveListName, setEditingArchiveListName] = useState('');
            React.useEffect(() => {
                if (isSara) setActiveTab('dashboard');
                else if (isCommentaires) setActiveTab('production');
                else if (isOperateur) setActiveTab('dashboard');
            }, [userRole]);
            const [globalSelectedOrder, setGlobalSelectedOrder] = useState(null);
            const [zoomedImage, setZoomedImage] = useState(null);
            const [boxPopup, setBoxPopup] = useState(null); // {articleName, casierNum, reference}
            const [globalCasiersData, setGlobalCasiersData] = useState({});
            React.useEffect(() => { if (window._casiersCache) setGlobalCasiersData(window._casiersCache); }, []);
            const getCasierNum = (reference) => { const entry = Object.entries(globalCasiers || {}).find(([, v]) => String(v.commande) === String(reference)); return entry ? (entry[1].casierNum || entry[0]) : null; };
            const [globalCasiers, setGlobalCasiers] = useState({});
            const [poidsData, setPoidsData] = useState({});
            const [orderNotesData, setOrderNotesData] = useState({});
            React.useEffect(() => {
                const r = window.firebaseRef(window.db, 'poids');
                const unsub = window.firebaseOnValue(r, snap => setPoidsData(snap.val() || {}));
                return () => unsub();
            }, []);
            React.useEffect(() => {
                const r = window.firebaseRef(window.db, 'order_notes');
                const unsub = window.firebaseOnValue(r, snap => setOrderNotesData(snap.val() || {}));
                return () => unsub();
            }, []);
            const [validations, setValidations] = useState({}); // { ref: timestamp }
            React.useEffect(() => {
                const r = window.firebaseRef(window.db, 'validations');
                const unsub = window.firebaseOnValue(r, snap => setValidations(snap.val() || {}));
                return () => unsub();
            }, []);
            // Sauvegarde d'un champ de la commande (client, email, adresse, transporteur, telephone)
            // Modification désactivée temporairement — à reconstruire proprement
            const saveOrderField = async (ref, field, value) => {
                alert("Modification temporairement désactivée. Contactez l'administrateur.");
            };
            const saveArticleField = async (ref, itemId, field, value) => {
                alert("Modification temporairement désactivée. Contactez l'administrateur.");
            };

            const toggleValidation = async (ref) => {
                const already = validations[ref];
                if (already) {
                    await window.firebaseRemove(window.firebaseRef(window.db, 'validations/' + ref));
                } else {
                    await window.firebaseUpdate(window.firebaseRef(window.db, 'validations'), { [ref]: Date.now() });
                }
            };
            const savePoids = async (ref, val) => {
                if (!val || val.trim() === '') {
                    await window.firebaseRemove(window.firebaseRef(window.db, 'poids/' + ref));
                } else {
                    await window.firebaseUpdate(window.firebaseRef(window.db, 'bordereaux'), {});
                    await window.firebaseUpdate(window.firebaseRef(window.db, 'poids'), { [ref]: val.trim() });
                }
                setPoidsData(prev => ({ ...prev, [ref]: val.trim() }));
            };
            const saveOrderNote = async (ref, val) => {
                if (!val || val.trim() === '') {
                    await window.firebaseRemove(window.firebaseRef(window.db, 'order_notes/' + ref));
                } else {
                    await window.firebaseUpdate(window.firebaseRef(window.db, 'order_notes'), {
                        [ref]: { text: val.trim(), author: 'Admin', updatedAt: Date.now() }
                    });
                }
                setOrderNotesData(prev => ({ ...prev, [ref]: val.trim() ? { text: val.trim(), author: 'Admin', updatedAt: Date.now() } : null }));
            };
            const [showImportModal, setShowImportModal] = useState(false);
            const [completionAlert, setCompletionAlert] = useState(null); // {reference, client, autresCommandes[]}
            const [casierAlert, setCasierAlert] = useState(null); // {casierNum, reference}
            const [showScrollTop, setShowScrollTop] = useState(false);

            useEffect(() => {
                const onScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', onScroll);
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            // Auth
            const [user, setUser] = useState(null);
            const [userRole, setUserRole] = useState(null);
            const [notifications, setNotifications] = useState([]);
            const [showNotifPanel, setShowNotifPanel] = useState(false);
            const [lastSeenNotif, setLastSeenNotif] = useState(() => parseInt(localStorage.getItem('lastSeenNotif') || '0'));
            const [showBackupReminder, setShowBackupReminder] = useState(false);

            // Notifications pour Achraf — écouter les articles passant en Reçu
            React.useEffect(() => {
                if (userRole !== 'operateur') return;
                const r = window.firebaseRef(window.db, 'notifications_achraf');
                const unsub = window.firebaseOnValue(r, snap => {
                    const val = snap.val() || {};
                    const arr = Object.entries(val)
                        .map(([id, v]) => ({ id, ...v }))
                        .sort((a, b) => b.at - a.at);
                    setNotifications(arr);
                });
                return () => unsub();
            }, [userRole]);

            // Rappel sauvegarde hebdomadaire — admin seulement
            React.useEffect(() => {
                if (userRole !== 'admin') return;
                const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
                const lastBackup = parseInt(localStorage.getItem('lastBackupReminder') || '0');
                if (Date.now() - lastBackup > WEEK_MS) {
                    const t = setTimeout(() => setShowBackupReminder(true), 3000);
                    return () => clearTimeout(t);
                }
            }, [userRole]);

            const markNotifsRead = () => {
                const now = Date.now();
                localStorage.setItem('lastSeenNotif', now.toString());
                setLastSeenNotif(now);
                // Mark all as read in Firebase
                notifications.forEach(n => {
                    if (!n.read) {
                        window.firebaseUpdate(window.firebaseRef(window.db, 'notifications_achraf/' + n.id), { read: true });
                    }
                });
            };

            const clearNotifs = async () => {
                if (!window.confirm('Effacer toutes les notifications ?')) return;
                await window.firebaseRemove(window.firebaseRef(window.db, 'notifications_achraf'));
                setShowNotifPanel(false);
            };

            const dismissBackupReminder = () => {
                localStorage.setItem('lastBackupReminder', Date.now().toString());
                setShowBackupReminder(false);
            };

            const exportBackup = async () => {
                try {
                    const [listsSnap, casiersSnap, listesCoupeSnap] = await Promise.all([
                        window.firebaseRef ? window.firebaseGet(window.firebaseRef(window.db, 'lists')) : Promise.resolve(null),
                        window.firebaseRef ? window.firebaseGet(window.firebaseRef(window.db, 'casiers')) : Promise.resolve(null),
                        window.firebaseRef ? window.firebaseGet(window.firebaseRef(window.db, 'listescoupe')) : Promise.resolve(null),
                    ]);
                    const backup = {
                        exportedAt: new Date().toISOString(),
                        lists: listsSnap ? listsSnap.val() : null,
                        casiers: casiersSnap ? casiersSnap.val() : null,
                        listescoupe: listesCoupeSnap ? listesCoupeSnap.val() : null,
                    };
                    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'cataleya-backup-' + new Date().toISOString().slice(0,10) + '.json';
                    a.click();
                    URL.revokeObjectURL(url);
                    localStorage.setItem('lastBackupReminder', Date.now().toString());
                    setShowBackupReminder(false);
                    alert('✅ Sauvegarde téléchargée !');
                } catch(e) {
                    alert('Erreur sauvegarde: ' + e.message);
                }
            };
            const [authLoading, setAuthLoading] = useState(true);

            useEffect(() => {
                const init = () => {
                    window.firebaseOnAuthStateChanged(async (firebaseUser) => {
                        if (firebaseUser) {
                            const role = await window.firebaseGetUserRole(firebaseUser.uid);
                            // Rôles autorisés sur cette app
                            const ROLES_AUTORISES = ['admin', 'operateur', 'commentaires', 'livreur', 'lecture'];
                            if (!ROLES_AUTORISES.includes(role)) {
                                // Rediriger vers l'app coupe
                                await window.firebaseSignOut();
                                alert('Accès non autorisé sur cette application. Vous allez être redirigé.');
                                window.location.href = 'coupe-cataleya.html';
                                return;
                            }
                            setUser(firebaseUser); setUserRole(role);
                        } else { setUser(null); setUserRole(null); }
                        setAuthLoading(false);
                    });
                };
                if (window.firebaseOnAuthStateChanged) { init(); }
                else { window.addEventListener('firebase-ready', init); return () => window.removeEventListener('firebase-ready', init); }
            }, []);

            // Charger les données depuis Firebase en temps réel
            const ignoringFirebaseRef = React.useRef(false);
            useEffect(() => {
                if (!user) return;
                const init = () => {
                    const unsub = window.firebaseOnLists((data) => {
                        if (ignoringFirebaseRef.current) { console.log('[Firebase] update ignoré (flag actif)'); return; }
                        const rawData = data || {};
                        const raw = (Array.isArray(rawData) ? rawData : Object.values(rawData)).filter(Boolean);
                        // Log pour debug commentaires
                        const sample = raw[0]?.orders?.slice(0,3).map(o => ({id:o.id, commentaires:o.commentaires}));
                        console.log('[Firebase] setLists depuis Firebase, sample:', JSON.stringify(sample));
                        const cleaned = raw.map(list => {
                            const rawOrders = list.orders || [];
                            const ordersArr = Array.isArray(rawOrders) ? rawOrders : Object.values(rawOrders);
                            return {
                                ...list,
                                orders: ordersArr.filter(Boolean).map(order => ({
                                    ...order,
                                    commentaires: order.commentaires === '__clear__' ? '' : order.commentaires,
                                    commentAuthor: order.commentAuthor === '__clear__' ? null : order.commentAuthor,
                                }))
                            };
                        });
                        setLists(cleaned);
                    });
                    return unsub;
                };
                if (window.firebaseOnLists) {
                    const unsub = init();
                    return () => unsub && unsub();
                } else {
                    window.addEventListener('firebase-ready', () => { init(); }, { once: true });
                }
            }, [user]);

            // Nettoyer les undefined/null pour Firebase
            const cleanForFirebase = (lists) => lists.map(list => ({
                ...list,
                orders: (list.orders || []).map(order => ({
                    ...order,
                    commentaires: (!order.commentaires || order.commentaires === '') ? '__clear__' : order.commentaires,
                    commentAuthor: (!order.commentAuthor || order.commentAuthor === null) ? '__clear__' : order.commentAuthor,
                }))
            }));

            // Sauvegarder sur Firebase
            const saveLists = (newLists) => {
                setLists(newLists);
                const doSave = () => {
                    if (window.firebaseSaveLists) {
                        ignoringFirebaseRef.current = true;
                        window.firebaseSaveLists(cleanForFirebase(newLists))
                            .then(() => { setTimeout(() => { ignoringFirebaseRef.current = false; }, 2000); })
                            .catch(e => console.error('Firebase ERREUR:', e));
                    } else {
                        console.warn('firebaseSaveLists pas encore dispo, retry...');
                        setTimeout(doSave, 500);
                    }
                };
                doSave();
            };

            // Obtenir toutes les commandes (pour la vue globale)
            const getAllOrders = () => {
                return lists.filter(l => !l.archived).flatMap(list => list.orders);
            };

            // Obtenir les commandes de la liste active
            const getActiveOrders = () => {
                if (activeListId === 'global') {
                    return getAllOrders();
                }
                const activeList = lists.find(l => l.id === activeListId);
                return activeList ? activeList.orders : [];
            };

            // Calculer les stats
            const calculateStats = (orders) => {
                return {
                    total: orders.length,
                    enAttente: orders.filter(o => o.status === STATUTS.EN_ATTENTE).length,
                    termines: orders.filter(o => o.status === STATUTS.RECU || o.status === STATUTS.RANGE).length,
                    avecCommentaire: [...new Set(orders.filter(o => o.commentaires && o.commentaires.trim() !== '').map(o => o.reference))].length
                };
            };

            // Import nouvelle liste
            const handleImportNewList = (listName, file) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const lines = text.split('\n');
                        
                        if (lines.length < 2) {
                            alert('Fichier CSV vide ou invalide');
                            return;

                                                                            value={editingArchiveListName}
                                                                            onChange={e => setEditingArchiveListName(e.target.value)}
                                                                            onKeyDown={e => { if (e.key === 'Enter') renameArchivedList(list.id, editingArchiveListName); if (e.key === 'Escape') { setEditingArchiveListId(null); } }}
                                                                            autoFocus
                                                                            className="font-bold text-gray-800 border border-blue-400 rounded-lg px-2 py-1 focus:outline-none text-sm flex-1"
                                                                        />
                                                                        <button onClick={() => renameArchivedList(list.id, editingArchiveListName)} className="text-green-600 hover:text-green-800 font-bold text-sm px-2 py-1 bg-green-50 rounded-lg">✅</button>
                                                                        <button onClick={() => setEditingArchiveListId(null)} className="text-gray-400 hover:text-gray-600 text-sm px-2 py-1">✕</button>
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex items-center gap-2 mb-2">
                                                                        <h3 className="font-bold text-gray-800">📋 {list.name}</h3>
                                                                        {isAdmin && <button onClick={() => { setEditingArchiveListId(list.id); setEditingArchiveListName(list.name); }} className="text-gray-400 hover:text-blue-500 text-sm" title="Renommer">✏️</button>}
                                                                    </div>
                                                                )}
                                                                {/* Stats */}
                                                                <div className="flex flex-wrap gap-2 text-xs">
                                                                    <span className="px-2 py-1 bg-blue-100 text-blue-700 rounded-full font-semibold">{commandes} commande(s)</span>
                                                                    <span className="px-2 py-1 bg-purple-100 text-purple-700 rounded-full font-semibold">{totalArticles} articles</span>
                                                                    <span className="px-2 py-1 bg-green-100 text-green-700 rounded-full font-semibold">{termines} terminés</span>
                                                                    {totalArticles > 0 && <span className="px-2 py-1 bg-gray-100 text-gray-600 rounded-full font-semibold">{Math.round(termines / totalArticles * 100)}%</span>}
                                                                </div>
                                                            </div>
                                                            {/* Actions admin */}
                                                            {isAdmin && (
                                                                <div className="flex flex-col gap-2 flex-shrink-0">
                                                                    <button
                                                                        onClick={() => unarchiveList(list.id)}
                                                                        className="px-3 py-1.5 bg-amber-100 hover:bg-amber-200 text-amber-700 font-semibold text-xs rounded-lg transition"
                                                                        title="Remettre dans les listes actives"
                                                                    >
                                                                        ↩️ Désarchiver
                                                                    </button>
                                                                    <button
                                                                        onClick={() => { if (confirm(`Supprimer définitivement "${list.name}" ? Cette action est irréversible.`)) deleteList(list.id); }}
                                                                        className="px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-700 font-semibold text-xs rounded-lg transition"
                                                                        title="Supprimer définitivement"
                                                                    >
                                                                        🗑️ Supprimer
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                        {/* Aperçu commandes */}
                                                        <div className="mt-3 max-h-40 overflow-y-auto space-y-1">
                                                            {[...new Set(list.orders.map(o => o.reference))].map(ref => {
                                                                const items = list.orders.filter(o => o.reference === ref);
                                                                const allDone = items.every(o => o.status === 'Rangé');
                                                                return (
                                                                    <div key={ref} className="flex items-center justify-between px-3 py-1.5 bg-white border border-gray-100 rounded-lg text-xs">
                                                                        <span className="font-mono font-semibold text-gray-700">#{ref}</span>
                                                                        <span className="text-gray-500">{items[0]?.client || '—'}</span>
                                                                        <span className={`px-2 py-0.5 rounded-full font-semibold ${allDone ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                                                            {items.filter(o => o.status === 'Rangé').length}/{items.length} ✅
                                                                        </span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Import */}
                    {showImportModal && (
                        <ImportModal
                            onImport={handleImportNewList}
                            onClose={() => setShowImportModal(false)}
                        />
                    )}

                    {/* Tabs */}
                    <nav className="bg-white border-b border-gray-200">
                        <div className="container mx-auto px-6">
                            <div className="flex gap-1 overflow-x-auto">
                                {/* Dashboard — Admin + Achraf + Sara + Fatima */}
                                {(isAdmin || isOperateur || isSara || isCommentaires || isLecteur) && (
                                    <TabButton active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="📊" label="Dashboard" />
                                )}
                                {/* Suivi Production — Admin + Sara + Fatima + Achraf */}
                                {(isAdmin || isOperateur || isSara || isCommentaires || isLecteur) && (
                                    <TabButton active={activeTab === 'production'} onClick={() => setActiveTab('production')} icon="🧵" label="Suivi Production" />
                                )}
                                {/* Multi-Commandes — Admin + Achraf */}
                                {(isAdmin || isOperateur || isLecteur) && (
                                    <TabButton active={activeTab === 'multiorders'} onClick={() => setActiveTab('multiorders')} icon="👯" label="Multi-Commandes" />
                                )}
                                {/* Casiers — Admin seulement */}
                                {(isAdmin || isLecteur) && (
                                    <TabButton active={activeTab === 'casiers'} onClick={() => setActiveTab('casiers')} icon="💡" label="Casiers" />
                                )}
                                {/* Réception — Admin + Sara */}
                                {(isAdmin || isSara || isCommentaires || isLecteur) && (
                                    <TabButton active={activeTab === 'listecoupe'} onClick={() => setActiveTab('listecoupe')} icon="✂️" label="Listes Coupe" />
                                )}
                                {(isAdmin || isCommentaires || isLecteur) && (
                                    <TabButton active={activeTab === 'sav'} onClick={() => setActiveTab('sav')} icon="🔧" label="SAV" />
                                )}
                                {(isAdmin || isSara || isOperateur) && (
                                    <TabButton active={activeTab === 'reception'} onClick={() => setActiveTab('reception')} icon="📥" label="Réception" />
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* Contenu */}
                    <main className="container mx-auto px-3 md:px-6 py-4 md:py-8">
                        {lists.length === 0 && activeListId === 'global' ? (
                            <EmptyState onImport={() => setShowImportModal(true)} />
                        ) : (
                            <>
                                {activeTab === 'dashboard' && (
                                    <Dashboard stats={stats} orders={activeOrders} listName={activeListId === 'global' ? 'GLOBAL' : lists.find(l => l.id === activeListId)?.name} openOrderRecap={openGlobalOrderRecap} getCasierNum={getCasierNum} isSara={isSara} isCommentaires={isCommentaires} isAdmin={isAdmin} isOperateur={isOperateur} isLecteur={isLecteur} setActiveTab={setActiveTab} updateStatus={updateStatus} canEditStatus={canEditStatus} validations={validations} toggleValidation={toggleValidation} />
                                )}
                                {activeTab === 'production' && (
                                    <ProductionTab
                                        orders={activeOrders}
                                        updateStatus={updateStatus}
                                        updateComment={updateComment}
                                        isAdmin={isAdmin}
                                        isOperateur={isOperateur}
                                        isSara={isSara}
                                        isCommentaires={isCommentaires}
                                        canEditStatus={canEditStatus}
                                        canEditComment={canEditComment}
                                        userName={userName}
                                        getCasierNum={getCasierNum}
                                        openOrderRecap={openGlobalOrderRecap}
                                    />
                                )}
                                {activeTab === 'multiorders' && (
                                    <MultiOrdersTab orders={activeOrders} openOrderRecap={openGlobalOrderRecap} />
                                )}
                                {activeTab === 'casiers' && (
                                    <CasiersTab orders={getAllOrders()} isAdmin={isAdmin} canEditStatus={canEditStatus} openOrderRecap={openGlobalOrderRecap} updateStatus={updateStatus} setCasierAlert={setCasierAlert} lists={lists} />
                                )}
                                {activeTab === 'listecoupe' && (
                                    <ListeCoupeTab isAdmin={isAdmin} isSara={isSara} isCommentaires={isCommentaires} userName={userName} activeTheme={activeTheme} listThemes={LIST_THEMES} activeListId={activeListId} parentLists={lists} />
                                )}
                                {activeTab === 'sav' && (
                                    <SAVTab isAdmin={isAdmin} isSara={isSara} isCommentaires={isCommentaires} isOperateur={isOperateur} userName={userName} />
                                )}
                                {activeTab === 'reception' && (
                                    <ReceptionTab orders={activeOrders} updateStatus={updateStatus} userName={userName} openOrderRecap={openGlobalOrderRecap} lists={lists} activeListId={activeListId} casiersData={globalCasiers} />
                                )}


                            </>
                        )}
                    </main>
                </div>
            );
        }

        // Composant TabButton
        function TabButton({ active, onClick, icon, label }) {
            return (
                <button
                    onClick={onClick}
                    className={`px-6 py-3 font-semibold transition border-b-4 ${
                        active
                            ? 'text-green-600 border-green-600 bg-green-50'
                            : 'text-gray-600 border-transparent hover:text-green-600 hover:bg-gray-50'
                    }`}
                >
                    {icon} {label}
                </button>
            );
        }

        // Modal Import
        function ImportModal({ onImport, onClose }) {
            const [listName, setListName] = useState('');
            const [file, setFile] = useState(null);

            const handleSubmit = () => {
                if (!listName.trim()) {
                    alert('Veuillez donner un nom à la liste');
                    return;
                }
                if (!file) {
                    alert('Veuillez sélectionner un fichier');
                    return;
                }
                onImport(listName, file);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-lg p-6 max-w-md w-full mx-4">
                        <h3 className="text-xl font-bold mb-4">➕ Importer une nouvelle liste</h3>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold mb-2">Nom de la liste</label>
                                <input
                                    type="text"
                                    placeholder="Ex: Février Semaine 1"
                                    value={listName}
                                    onChange={(e) => setListName(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-semibold mb-2">Fichier CSV</label>
                                <input
                                    type="file"
                                    accept=".csv"
                                    onChange={(e) => setFile(e.target.files[0])}
                                    className="w-full"
                                />
                                <p className="text-xs text-gray-500 mt-1">Format attendu : CSV avec point-virgule (export PrestaShop)</p>
                            </div>
                        </div>

                        <div className="flex gap-3 mt-6">
                            <button
                                onClick={handleSubmit}
                                className="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-green-700"
                            >
                                Importer
                            </button>
                            <button
                                onClick={onClose}
                                className="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300"
                            >
                                Annuler
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Empty State
        function EmptyState({ onImport }) {
            return (
                <div className="text-center py-16">
                    <div className="text-6xl mb-4">📦</div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Aucune liste importée</h2>
                    <p className="text-gray-600 mb-6">Commencez par importer votre première liste de commandes</p>
                    <button
                        onClick={onImport}
                        className="px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700"
                    >
                        ➕ Importer ma première liste
                    </button>
                </div>
            );
        }

        // Dashboard
        function Dashboard({ stats, orders, listName, openOrderRecap, getCasierNum, isSara, isCommentaires, isAdmin, isOperateur, isLecteur, setActiveTab, updateStatus, canEditStatus, validations, toggleValidation }) {
            const [showSAVModal, setShowSAVModal] = useState(false);
            const [globalSearch, setGlobalSearch] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searchShipping, setSearchShipping] = useState({}); // { ref: {labelUrl, packlinkUrl, ...} }

            const doGlobalSearch = (q) => {
                setGlobalSearch(q);
                if (!q.trim()) { setSearchResults([]); return; }
                const query = q.toLowerCase().trim();
                const allRefs = [...new Set(orders.map(o => o.reference))];
                const results = [];
                allRefs.forEach(ref => {
                    const items = orders.filter(o => o.reference === ref);
                    const first = items[0];
                    // Si la query est numérique, chercher uniquement dans le numéro de commande
                    const isNumeric = /^\d+$/.test(query);
                    const match = isNumeric
                        ? ref.toString().includes(query)
                        : ref.toString().includes(query) ||
                          (first.client || '').toLowerCase().includes(query) ||
                          (first.email || '').toLowerCase().includes(query) ||
                          (first.telephone || '').toLowerCase().includes(query) ||
                          (first.adresse_livraison || '').toLowerCase().includes(query);
                    if (!match) return;
                    const allDone = items.every(o => o.status === STATUTS.RANGE);
                    const allRange = items.every(o => o.status === STATUTS.RANGE);
                    const enAttente = items.filter(o => o.status === STATUTS.EN_ATTENTE).length;
                    const ranges = items.filter(o => o.status === STATUTS.RANGE).length;
                    let statut, statutColor;
                    if (validations[ref]) { statut = '📦✅ Validée'; statutColor = 'text-emerald-600'; }
                    else if (allDone) { statut = '✅ Terminée'; statutColor = 'text-green-600'; }
                    else if (ranges > 0) { statut = `📦 ${ranges}/${items.length} rangés`; statutColor = 'text-teal-600'; }
                    else { statut = `⏳ En attente (${enAttente}/${items.length})`; statutColor = 'text-yellow-600'; }
                    results.push({ ref, client: first.client, email: first.email, transporteur: first.transporteur, adresse: first.adresse_livraison, total: items.length, statut, statutColor });
                });
                setSearchResults(results.slice(0, 10));
            };

            const fetchShippingForRef = async (ref) => {
                if (searchShipping[ref]) return;
                setSearchShipping(prev => ({ ...prev, [ref]: { loading: true } }));
                try {
                    const [relayRes, packlinkRes] = await Promise.all([
                        fetch(`https://cataleyaparis.com/get_relay_token.php?id_order=${ref}`).then(r => r.json()).catch(() => null),
                        fetch(`https://cataleyaparis.com/get_packlink_label.php?id_order=${ref}`).then(r => r.json()).catch(() => null)
                    ]);
                    setSearchShipping(prev => ({ ...prev, [ref]: {
                        loading: false,
                        labelUrl: relayRes?.success ? relayRes.label_url : null,
                        trackingUrl: relayRes?.success ? relayRes.tracking_url : null,
                        packlinkUrl: packlinkRes?.success ? packlinkRes.label_url : null,
                        packlinkTrackingUrl: packlinkRes?.success ? packlinkRes.tracking_url : null,
                        packlinkCarrier: packlinkRes?.success ? packlinkRes.carrier : null,
                    }}));
                } catch(e) {
                    setSearchShipping(prev => ({ ...prev, [ref]: { loading: false } }));
                }
            };
            const [savArticles, setSavArticles] = useState([]);
            const [showTerminesModal, setShowTerminesModal] = useState(false);
            const [showValidésModal, setShowValidésModal] = useState(false);
            const [validésSortMode, setValidésSortMode] = useState('date'); // 'date' | 'transporteur'
            const [bordereaux, setBordereaux] = useState({}); // { ref: timestamp }
            const [selectedRefs, setSelectedRefs] = useState(new Set());

            const toggleSelectRef = (ref) => {
                setSelectedRefs(prev => {
                    const next = new Set(prev);
                    if (next.has(ref)) next.delete(ref); else next.add(ref);
                    return next;
                });
            };

            const markSelectedValidated = async () => {
                if (selectedRefs.size === 0) return;
                const updates = {};
                selectedRefs.forEach(ref => { updates[ref] = Date.now(); });
                await window.firebaseUpdate(window.firebaseRef(window.db, 'validations'), updates);
                setSelectedRefs(new Set());
            };

            React.useEffect(() => {
                const r = window.firebaseRef(window.db, 'bordereaux');
                const unsub = window.firebaseOnValue(r, snap => {
                    setBordereaux(snap.val() || {});
                });
                return () => unsub();
            }, []);

            const toggleBordereau = async (ref, e) => {
                e.stopPropagation();
                const already = bordereaux[ref];
                const updated = { ...bordereaux };
                if (already) {
                    delete updated[ref];
                    await window.firebaseRemove(window.firebaseRef(window.db, 'bordereaux/' + ref));
                } else {
                    updated[ref] = Date.now();
                    await window.firebaseUpdate(window.firebaseRef(window.db, 'bordereaux'), { [ref]: Date.now() });
                }
                setBordereaux(updated);
            };

            // Charger les articles SAV pour la carte
            React.useEffect(() => {
                const r = window.firebaseRef(window.db, 'sav');
                const unsub = window.firebaseOnValue(r, snap => {
                    const val = snap.val() || {};
                    setSavArticles(Object.values(val));
                });
                return () => unsub();
            }, []);
            const [showCommentairesModal, setShowCommentairesModal] = useState(false);
            const [showCommandesModal, setShowCommandesModal] = useState(false);
            const [showRangesModal, setShowRangesModal] = useState(false);
            const [showRecusModal, setShowRecusModal] = useState(false);
            const [rangesSortMode, setRangesSortMode] = useState('article');
            const [recusSortMode, setRecusSortMode] = useState('article');
            const terminesOrders = orders.filter(o => o.status === STATUTS.RANGE);
            // Une commande est "terminée" uniquement si TOUS ses articles sont terminés ET pas encore validée
            const terminesRefs = [...new Set(orders.map(o => o.reference))].filter(ref => {
                const articlesCommande = orders.filter(o => o.reference === ref);
                return articlesCommande.every(o => o.status === STATUTS.RANGE) && !validations[ref];
            }).sort((a, b) => b - a);
            // Commandes validées (vérifiées + emballées)
            const validéesRefs = [...new Set(orders.map(o => o.reference))].filter(ref => {
                const articlesCommande = orders.filter(o => o.reference === ref);
                return articlesCommande.every(o => o.status === STATUTS.RANGE) && !!validations[ref];
            }).sort((a, b) => b - a);



            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between gap-4 flex-wrap">
                        <h2 className="text-2xl font-bold">Dashboard - {listName}</h2>
                        <div className="relative w-full md:w-96">
                            <input
                                type="text"
                                value={globalSearch}
                                onChange={e => doGlobalSearch(e.target.value)}
                                placeholder="🔍 Rechercher une commande, cliente, email..."
                                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-400 shadow-sm"
                            />
                            {globalSearch && <button onClick={() => { setGlobalSearch(''); setSearchResults([]); }} className="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">✕</button>}
                            {searchResults.length > 0 && (
                                <div className="absolute top-12 left-0 right-0 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 max-h-[70vh] overflow-y-auto">
                                    {searchResults.map(r => {
                                        const ship = searchShipping[r.ref];
                                        return (
                                            <div key={r.ref} className="p-4 border-b border-gray-100 last:border-0 hover:bg-gray-50"
                                                onMouseEnter={() => fetchShippingForRef(r.ref)}>
                                                <div className="flex items-start justify-between gap-2">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <button onClick={() => { openOrderRecap(r.ref); setGlobalSearch(''); setSearchResults([]); }}
                                                                className="font-bold text-blue-600 hover:underline text-base">#{r.ref}</button>
                                                            <span className={`text-sm font-semibold ${r.statutColor}`}>{r.statut}</span>
                                                        </div>
                                                        {r.client && <p className="text-sm text-gray-700 mt-0.5">👤 {r.client}</p>}
                                                        {r.email && <p className="text-xs text-gray-400">{r.email}</p>}
                                                        {r.transporteur && <p className="text-xs text-gray-500 mt-0.5">🚚 {r.transporteur}</p>}
                                                        <div className="flex items-center gap-2 mt-2 flex-wrap">
                                                            <a href={`https://cataleyaparis.fr/FIEdit.php?secure_key=ed3fa1ce558e1cfbaa3f99403&id_order=${r.ref}`}
                                                                target="_blank" rel="noopener noreferrer"
                                                                className="text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 font-semibold">🧾 Facture</a>
                                                            {ship?.loading && <span className="text-xs text-gray-400">⏳ Chargement...</span>}
                                                            {ship?.labelUrl && <a href={ship.labelUrl} target="_blank" rel="noopener noreferrer" className="text-xs px-2 py-1 bg-blue-50 hover:bg-blue-100 rounded-lg text-blue-600 font-semibold">📄 Étiquette MR</a>}
                                                            {ship?.trackingUrl && <a href={ship.trackingUrl} target="_blank" rel="noopener noreferrer" className="text-xs px-2 py-1 bg-blue-50 hover:bg-blue-100 rounded-lg text-blue-600 font-semibold">🔍 Suivi MR</a>}
                                                            {ship?.packlinkUrl && <a href={ship.packlinkUrl} target="_blank" rel="noopener noreferrer" className="text-xs px-2 py-1 bg-orange-50 hover:bg-orange-100 rounded-lg text-orange-600 font-semibold">📄 Étiquette {ship.packlinkCarrier || 'Packlink'}</a>}
                                                            {ship?.packlinkTrackingUrl && <a href={ship.packlinkTrackingUrl} target="_blank" rel="noopener noreferrer" className="text-xs px-2 py-1 bg-orange-50 hover:bg-orange-100 rounded-lg text-orange-600 font-semibold">🔍 Suivi Packlink</a>}
                                                        </div>
                                                    </div>
                                                    <span className="text-xs text-gray-400 whitespace-nowrap">{r.total} article(s)</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        {/* Cartes visibles par tous */}
                        {!isSara && !isCommentaires && <StatCard title="Total / En attente" value={stats.total} subtitle={`${stats.enAttente} en attente`} color="blue" icon="📦" />}
                        {!isSara && !isCommentaires && <StatCard title="Commandes" value={[...new Set(orders.map(o => o.reference))].length} color="indigo" icon="🛒" onClick={() => setShowCommandesModal(true)} clickable={true} />}
                        {!isSara && !isCommentaires && <StatCard title="Terminés" value={terminesRefs.length} subtitle={`commandes complètes`} color="green" icon="✅" onClick={() => setShowTerminesModal(true)} clickable={true} />}
                        {!isSara && !isCommentaires && <StatCard title="Validés" value={validéesRefs.length} subtitle={`vérifiés & emballés`} color="emerald" icon="📦✅" onClick={() => setShowValidésModal(true)} clickable={true} />}
                        {!isSara && !isCommentaires && <StatCard title="Rangés" value={(() => { const refs = [...new Set(orders.filter(o => o.status === STATUTS.RANGE).map(o => o.reference))]; return refs.filter(ref => { const items = orders.filter(o => o.reference === ref); return !items.every(o => o.status === STATUTS.RANGE); }).length; })()} subtitle={`${orders.filter(o => { if(o.status !== STATUTS.RANGE) return false; const c = orders.filter(a => a.reference === o.reference); return !c.every(a => a.status === STATUTS.RANGE); }).length} articles rangés`} color="teal" icon="📦" onClick={() => setShowRangesModal(true)} clickable={true} />}
                        {/* Reçus — Admin/Achraf + Sara */}

                                                    const pays = paysLine.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

        // ProductionTab
        function ProductionTab({ orders, updateStatus, updateComment, isAdmin, isOperateur, isSara, isCommentaires, canEditStatus, canEditComment, userName, getCasierNum, openOrderRecap }) {
            const [searchTerm, setSearchTerm] = React.useState('');
            const [filterStatus, setFilterStatus] = React.useState('all');
            const filteredOrders = orders.filter(order => {
                const q = (searchTerm || '').toLowerCase().trim();
                const matchSearch = !q ||
                    (order.name || '').toLowerCase().includes(q) ||
                    (order.reference || '').toString().includes(q) ||
                    (order.client || '').toLowerCase().includes(q) ||
                    (order.email || '').toLowerCase().includes(q) ||
                    (order.telephone || '').toLowerCase().includes(q);
                const matchStatus = filterStatus === 'all' || order.status === filterStatus;
                return matchSearch && matchStatus;
            });
            const statutsDisponibles = isSara 
                ? [STATUTS.EN_ATTENTE]
                : isOperateur 
                ? [STATUTS.EN_ATTENTE, STATUTS.RANGE]
                : [STATUTS.EN_ATTENTE, STATUTS.RECU, STATUTS.RANGE];
            const [selectedImage, setSelectedImage] = React.useState(null);
            const [sortColumn, setSortColumn] = React.useState('name'); // Colonne de tri par défaut
            const [sortDirection, setSortDirection] = React.useState('asc'); // asc ou desc
            const [showDerniersRanges, setShowDerniersRanges] = React.useState(false);
            
            // Fonction de tri
            const handleSort = (column) => {
                if (sortColumn === column) {
                    // Inverse la direction si on clique sur la même colonne
                    setSortDirection(sortDirection === 'asc' ? 'desc' : 'asc');
                } else {
                    // Nouvelle colonne, tri ascendant par défaut
                    setSortColumn(column);
                    setSortDirection('asc');
                }
            };
            
            // Trier les commandes
            const sortedOrders = (() => {
                // Mode "Derniers rangés" : filtre Rangé + tri par updatedAt décroissant
                if (showDerniersRanges) {
                    return [...orders]
                        .filter(o => o.status === STATUTS.RANGE)
                        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
                }
                return [...filteredOrders].sort((a, b) => {
                    let aVal = a[sortColumn] || '';
                    let bVal = b[sortColumn] || '';
                    if (sortColumn === 'no_article') {
                        const aVal = a.ref_declinaison || a.ref_produit || '';
                        const bVal = b.ref_declinaison || b.ref_produit || '';
                        return sortDirection === 'asc' ? aVal.localeCompare(bVal, undefined, {numeric: true}) : bVal.localeCompare(aVal, undefined, {numeric: true});
                    }
                    if (sortColumn === 'reference') {
                        aVal = parseInt(aVal) || 0;
                        bVal = parseInt(bVal) || 0;
                    } else {
                        aVal = String(aVal).toLowerCase();
                        bVal = String(bVal).toLowerCase();
                    }
                    if (sortDirection === 'asc') {
                        return aVal > bVal ? 1 : -1;
                    } else {
                        return aVal < bVal ? 1 : -1;
                    }
                });
            })();
            
            // Fonction pour ouvrir le récap d'une commande

                                    onClick={() => setSelectedImage(null)}
                                    className="absolute -top-10 right-0 text-white text-2xl hover:text-gray-300"

                                    ✕ Fermer
                                </button>
                                <img 
                                    src={selectedImage.url}
                                    alt={selectedImage.name}
                                    className="max-w-full max-h-[90vh] object-contain rounded shadow-2xl"
                                    onClick={(e) => e.stopPropagation()}
                                />
                                <p className="text-white text-center mt-4 text-lg">{selectedImage.name}</p>
                            </div>
                        </div>
                    )}
                    
                    {/* Modal Récapitulatif Commande */}

                    
                    <div className="bg-white rounded-lg shadow p-6">
                        <div className="grid grid-cols-1 gap-3 md:grid-cols-3 md:gap-4">
                            <div>
                                <label className="block text-sm font-semibold mb-2">🔍 Rechercher</label>
                                <input
                                    type="text"
                                    placeholder="Produit ou n° commande..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                />

                                    const total = filteredOrders.length;
                                    const refs = new Set(filteredOrders.map(o => o.reference));

                                            <span className="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-semibold">

                                            <span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-semibold">
                                                {refs.size} commande{refs.size > 1 ? 's' : ''}

                            <div>
                                <label className="block text-sm font-semibold mb-2">📊 Statut</label>
                                <select

                                    onChange={(e) => setFilterStatus(e.target.value)}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                >
                                    <option value="all">Tous</option>
                                    {statutsDisponibles.map(s => (

                                <button

                    {/* TRI MOBILE */}
                    <div className="md:hidden bg-white rounded-lg shadow p-3 flex gap-2 items-center">
                        <span className="text-sm font-semibold text-gray-600 whitespace-nowrap">Trier par :</span>
                        <select
                            value={sortColumn}
                            onChange={(e) => setSortColumn(e.target.value)}

        // ReadyToShipTab - Commandes prêtes à expédier dès réception d'un article
        function ReadyToShipTab({ orders, updateStatus, isAdmin, casiersData, setBoxPopup }) {
            const [search, setSearch] = React.useState('');
            const [selectedOrder, setSelectedOrder] = React.useState(null);

            // Trouver les commandes où l'article recherché est le SEUL en attente
            const results = React.useMemo(() => {
                if (!search.trim()) return [];
                const query = search.toLowerCase().trim();
                
                // Grouper par référence
                const byRef = {};
                orders.forEach(o => {
                    if (!byRef[o.reference]) byRef[o.reference] = [];
                    byRef[o.reference].push(o);
                });

                const matches = [];
                Object.entries(byRef).forEach(([ref, items]) => {
                    // Articles en attente qui correspondent à la recherche
                    const enAttente = items.filter(o => o.status !== STATUTS.RECU && o.status !== STATUTS.RANGE);
                    const matchingEnAttente = enAttente.filter(o => o.name.toLowerCase().includes(query));
                    
                    // La commande est "prête" si :
                    // - il y a exactement 1 article en attente ET il correspond à la recherche
                    if (enAttente.length === 1 && matchingEnAttente.length === 1) {
                        const termines = items.filter(o => o.status === STATUTS.RECU || o.status === STATUTS.RANGE);
                        matches.push({
                            reference: ref,
                            client: items[0].client,
                            email: items[0].email,
                            transporteur: items[0].transporteur,
                            adresse_livraison: items[0].adresse_livraison,
                            telephone: items[0].telephone,
                            articleManquant: matchingEnAttente[0],
                            articlesTermines: termines,
                            totalArticles: items.length
                        });
                    }
                });

                return matches.sort((a, b) => b.reference - a.reference);
            }, [search, orders]);

            const terminerArticle = (article, reference) => {
                const casiers = casiersData || {};
                const entry = Object.entries(casiers).find(([, v]) => String(v.commande) === String(reference));
                const casierNum = entry ? (entry[1].casierNum || entry[0]) : null;
                if (casierNum) {
                    setBoxPopup({
                        articleName: article.name,
                        casierNum,
                        reference,
                        onConfirm: () => updateStatus(article.id, STATUTS.RANGE, article.commentaires)
                    });
                } else {

                                        <p className="text-xs font-bold text-orange-600 mb-2">⏳ ARTICLE EN ATTENTE</p>

                                                >
                                                    ✅ Terminer
                                                </button>
