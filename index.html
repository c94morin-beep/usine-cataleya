                                        </div>
                                    </div>
                                    {/* Articles déjà terminés */}
                                    {selectedOrder.articlesTermines.map((item, i) => (
                                        <div key={i} className="flex items-center gap-3 border border-green-200 bg-green-50 rounded-lg p-3">
                                            {item.url_image && <img src={item.url_image} className="w-12 h-12 object-cover rounded cursor-pointer hover:opacity-80" onClick={() => setZoomedImage({url: item.url_image, name: item.name})} onError={e => e.target.style.display='none'} />}
                                            <p className="flex-1 text-sm text-gray-700">{item.name}</p>
                                            <span className="text-xs bg-green-200 text-green-800 px-2 py-1 rounded-full">✅ Déposé</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div>
                        <h2 className="text-xl font-bold text-gray-800 mb-1">🎯 Prêt à expédier</h2>
                        <p className="text-sm text-gray-500 mb-4">Tapez le nom d'un article reçu pour voir les commandes qu'il permet de clôturer</p>
                    </div>

                    {/* Barre de recherche */}
                    <div className="relative">
                        <input
                            type="text"
                            value={search}
                            onChange={e => setSearch(e.target.value)}
                            placeholder="🔍 Ex: Abaya Sineme, Robe Ella..."
                            className="w-full px-5 py-4 text-lg border-2 border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 shadow-sm"
                            autoFocus
                        />
                        {search && <button onClick={() => setSearch('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xl">✕</button>}
                    </div>

                    {/* Résultats */}
                    {search.trim() && (
                        <div>
                            {results.length === 0 ? (
                                <div className="text-center py-12 text-gray-400">
                                    <div className="text-4xl mb-3">🔍</div>
                                    <p className="font-semibold">Aucune commande prête à clôturer</p>
                                    <p className="text-sm mt-1">Soit l'article n'existe pas, soit d'autres articles sont encore en attente</p>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <p className="text-sm font-semibold text-green-700">🎉 {results.length} commande(s) peuvent être clôturées !</p>
                                    {results.map(order => (
                                        <div key={order.reference}
                                            className="bg-white rounded-xl border-2 border-orange-200 shadow-sm p-4 cursor-pointer hover:shadow-md hover:border-orange-400 transition-all"
                                            onClick={() => setSelectedOrder(order)}
                                        >
                                            <div className="flex items-center justify-between gap-3">
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-mono font-bold text-gray-800">#{order.reference}</span>
                                                        <span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">1 article manquant</span>
                                                    </div>
                                                    <p className="text-sm text-gray-600 mt-0.5">👤 {order.client}</p>
                                                    {order.transporteur && <p className="text-xs text-gray-400">🚚 {order.transporteur}</p>}
                                                </div>
                                                <div className="flex flex-col items-end gap-1">
                                                    <span className="text-xs text-gray-400">{order.totalArticles} article(s) au total</span>
                                                    <span className="text-xs text-green-600 font-semibold">{order.articlesTermines.length} terminé(s)</span>
                                                </div>
                                            </div>
                                            <div className="mt-3 pt-3 border-t border-orange-100">
                                                <p className="text-xs text-orange-600 font-semibold mb-1">⏳ Il manque :</p>
                                                <p className="text-sm text-gray-700">{order.articleManquant.name}</p>
                                                {(() => {
                                                    const entry = Object.entries(casiersData || {}).find(([, v]) => String(v.commande) === String(order.reference));
                                                    return entry ? <p className="text-xs text-blue-600 font-semibold mt-1">📦 Box {entry[1].casierNum || entry[0]}</p> : null;
                                                })()}
                                            </div>
                                            {isAdmin && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); terminerArticle(order.articleManquant, order.reference); }}
                                                    className="mt-3 w-full py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg transition"
                                                >
                                                    ✅ Terminer cet article et clôturer la commande
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {!search.trim() && (
                        <div className="text-center py-16 text-gray-300">
                            <div className="text-6xl mb-4">🎯</div>
                            <p className="text-lg font-semibold text-gray-400">Tapez un nom d'article</p>
                            <p className="text-sm text-gray-300 mt-1">pour trouver les commandes prêtes à partir</p>
                        </div>
                    )}
                </div>
            );
        }



        // Page de connexion
        function LoginPage() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                if (!email || !password) { setError('Veuillez remplir tous les champs'); return; }
                setLoading(true); setError('');
                try {
                    await window.firebaseSignIn(email, password);
                } catch (e) {
                    setError('Email ou mot de passe incorrect');
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="text-6xl mb-4">📦</div>
                            <h1 className="text-2xl font-bold text-gray-800">Gestion Production</h1>
                            <p className="text-gray-500 text-sm mt-1">Sousou Fashion</p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                    placeholder="votre@email.com"
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                    placeholder="••••••••"
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                />
                            </div>
                            {error && <p className="text-red-500 text-sm bg-red-50 px-3 py-2 rounded-lg">{error}</p>}
                            <button
                                onClick={handleLogin}
                                disabled={loading}
                                className="w-full py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition disabled:opacity-50"
                            >
                                {loading ? 'Connexion...' : 'Se connecter'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // CasiersTab
        function ReceptionTab({ orders, updateStatus, userName, openOrderRecap, lists, activeListId, casiersData }) {
            const [searchBase, setSearchBase] = React.useState('');
            const [selectedBase, setSelectedBase] = React.useState(null);
            const [selectedAttrs, setSelectedAttrs] = React.useState({});
            const [showDropdown, setShowDropdown] = React.useState(false);
            const [selectedTailles, setSelectedTailles] = React.useState([]); // multi-sélection tailles

            // Parser un nom de produit en {base, attrs}
            const parseProduct = (name) => {
                const match = name.match(/^(.*?)(?:\s*\((.*)\))?$/);
                const base = match[1].trim();
                const attrsStr = match[2] || '';
                const attrs = {};
                if (attrsStr) {
                    attrsStr.split(',').forEach(part => {
                        part = part.trim();
                        if (part.includes(':')) {
                            const colonIdx = part.indexOf(':');
                            let key = part.substring(0, colonIdx).trim();
                            let val = part.substring(colonIdx + 1).trim();
                            if (val.includes(':')) val = val.split(':').pop().trim();
                            // Simplifier les clés
                            if (key.toLowerCase().includes('taille')) key = 'Taille';
                            if (key.toLowerCase() === 'option') key = 'Option';
                            if (key.toLowerCase() === 'option2') key = 'Option 2';
                            attrs[key] = val;
                        }
                    });
                }
                return { base, attrs };
            };

            const produitsEnAttente = orders.filter(o => o.status === STATUTS.EN_ATTENTE);

            // Noms de base uniques
            const basesUniques = [...new Set(produitsEnAttente.map(o => parseProduct(o.name).base))]
                .filter(b => b.toLowerCase().includes(searchBase.toLowerCase()))
                .sort((a, b) => {
                    const aAmana = produitsEnAttente.some(o => parseProduct(o.name).base === a && (o.transporteur || '').toLowerCase().includes('amana'));
                    const bAmana = produitsEnAttente.some(o => parseProduct(o.name).base === b && (o.transporteur || '').toLowerCase().includes('amana'));
                    if (aAmana && !bAmana) return -1;
                    if (!aAmana && bAmana) return 1;
                    return a.localeCompare(b);
                });

            // Articles filtrés par base sélectionnée
            const articlesDeBase = selectedBase 
                ? produitsEnAttente.filter(o => parseProduct(o.name).base === selectedBase)
                : [];

            // Clés d'attributs disponibles pour les articles de base
            const getAttrKeys = () => {
                const keys = new Set();
                articlesDeBase.forEach(o => {
                    Object.keys(parseProduct(o.name).attrs).forEach(k => keys.add(k));
                });
                return [...keys];
            };

            // Articles filtrés par les attributs sélectionnés
            const articlesMatch = articlesDeBase.filter(o => {
                const { attrs } = parseProduct(o.name);
                return Object.entries(selectedAttrs).every(([k, v]) => attrs[k] === v);
            });

            // Valeurs disponibles pour le prochain attribut non encore sélectionné
            const attrKeys = getAttrKeys();
            const nextAttrKey = attrKeys.find(k => !selectedAttrs[k]);
            const nextAttrValues = nextAttrKey
                ? [...new Set(articlesMatch.map(o => parseProduct(o.name).attrs[nextAttrKey]).filter(Boolean))].sort()
                : [];

            // Est-ce que la sélection est complète (pas d'autres attributs à choisir) ?
            const selectionComplete = selectedBase && (!nextAttrKey || articlesMatch.length === 1 || nextAttrValues.length === 0);

            const handleSelectAttr = (key, val) => {
                setSelectedAttrs(prev => ({ ...prev, [key]: val }));
                // Ne pas reset les tailles si c'est un autre attribut (Option, etc.)
            };

            const resetSelection = () => {
                setSearchBase('');
                setSelectedBase(null);
                setSelectedAttrs({});
                setShowDropdown(false);
                setSelectedTailles([]);
            };

            const handleReception = (order) => {
                updateStatus(order.id, STATUTS.RANGE, order.commentaires || '', userName);
            };

            const getArticlesARecevoir = () => articlesMatch;

            const handleReceptionTous = () => {
                const articles = getArticlesARecevoir();
                if (!window.confirm(`Marquer ${articles.length} article(s) comme déposés ?`)) return;
                articles.forEach(o => updateStatus(o.id, STATUTS.RANGE, o.commentaires || '', userName));
            };

            // Pour compat avec le reste du code
            const selectedProduct = selectedBase;

            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-xl shadow p-6">
                        <h2 className="text-xl font-bold text-gray-800 mb-4">📥 Réception des articles</h2>
                        <p className="text-gray-500 text-sm mb-6">Sélectionnez un produit apporté pour identifier et mettre à jour les commandes correspondantes.</p>

                        {/* Étape 1 : Recherche nom de base */}
                        <div className="relative mb-4">
                            <div className="flex items-center gap-2 mb-2">
                                <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white bg-blue-500`}>1</span>
                                <span className="text-sm font-semibold text-gray-700">Nom du produit</span>
                                {selectedBase && <span className="text-sm font-bold text-blue-600">{selectedBase}</span>}
                            </div>
                            {!selectedBase ? (
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={searchBase}
                                        onChange={e => { setSearchBase(e.target.value); setShowDropdown(true); }}
                                        onFocus={() => setShowDropdown(true)}
                                        placeholder="🔍 Ex: Basma, Ava, Jasmine..."
                                        className="w-full px-4 py-3 pr-10 border-2 border-blue-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        autoFocus
                                    />
                                    {showDropdown && basesUniques.length > 0 && (
                                        <div className="absolute z-10 w-full bg-white border border-gray-200 rounded-xl shadow-lg mt-1 max-h-60 overflow-y-auto">
                                            {basesUniques.map(base => {
                                                const count = produitsEnAttente.filter(o => parseProduct(o.name).base === base).length;
                                                return (
                                                    <div key={base} onClick={() => { setSelectedBase(base); setShowDropdown(false); setSelectedAttrs({}); }}
                                                        className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 flex justify-between items-center">
                                                        <span className="text-sm font-medium text-gray-800">{base}</span>
                                                        <span className="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-full font-semibold">{count} en attente</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <button onClick={resetSelection} className="text-xs text-gray-400 hover:text-red-500 underline">Changer de produit</button>
                            )}
                        </div>

                        {/* Étapes suivantes : attributs en cascade */}
                        {selectedBase && attrKeys.map((key, idx) => {
                            const vals = [...new Set(articlesDeBase
                                .filter(o => Object.entries(selectedAttrs).filter(([k]) => k !== key).every(([k,v]) => parseProduct(o.name).attrs[k] === v))
                                .map(o => parseProduct(o.name).attrs[key]).filter(Boolean))].sort();
                            if (vals.length === 0) return null;
                            const isSelected = !!selectedAttrs[key];
                            const isPending = !isSelected && Object.keys(selectedAttrs).length === idx;
                            return (
                                <div key={key} className={`mb-4 transition-all ${!isPending && !isSelected ? 'opacity-40' : ''}`}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white bg-blue-500`}>{idx + 2}</span>
                                        <span className="text-sm font-semibold text-gray-700">{key}</span>
                                        {isSelected && <span className="text-sm font-bold text-blue-600">{selectedAttrs[key]}</span>}
                                    </div>
                                    {(!isSelected) && (
                                        <div className="flex flex-wrap gap-2">
                                            {vals.map(val => (
                                                <button key={val} onClick={() => handleSelectAttr(key, val)}
                                                    className="px-4 py-2 bg-white border-2 border-blue-200 hover:border-blue-500 hover:bg-blue-50 rounded-xl text-sm font-semibold text-gray-700 transition">
                                                    {val}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    {isSelected && (
                                        <button onClick={() => { const a = {...selectedAttrs}; delete a[key]; setSelectedAttrs(a); }} className="text-xs text-gray-400 hover:text-red-500 underline">Changer</button>
                                    )}
                                </div>
                            );
                        })}

                        {/* Résultats */}
                        {selectedProduct && articlesMatch.length > 0 && (() => {
                            const getTailleOrder = (order) => parseProduct(order.name).attrs['Taille'];
                            const isActive = (order) => true;

                            // Séparer : commandes où c'est le DERNIER article en attente vs les autres
                            const urgentes = articlesMatch.filter(o => {
                                const tousArticles = orders.filter(a => a.reference === o.reference);
                                const enAttente = tousArticles.filter(a => a.status === STATUTS.EN_ATTENTE);
                                return enAttente.length === 1;
                            });
                            const normales = articlesMatch.filter(o => {
                                const tousArticles = orders.filter(a => a.reference === o.reference);
                                const enAttente = tousArticles.filter(a => a.status === STATUTS.EN_ATTENTE);
                                return enAttente.length > 1;
                            });
                            return (
                            <div>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-gray-700">
                                        {articlesMatch.length} commande(s) en attente de <span className="text-blue-600">"{selectedProduct}"</span>
                                    </h3>
                                    <button
                                        onClick={handleReceptionTous}
                                        className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition"
                                    >
                                        ✅ Tout marquer déposé
                                    </button>
                                </div>

                                {/* Commandes URGENTES - dernier article manquant */}
                                {urgentes.length > 0 && (
                                    <div className="mb-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-sm font-bold text-green-700 uppercase tracking-wide">🎯 Commandes prêtes à clôturer</span>
                                            <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold">{urgentes.length}</span>
                                        </div>
                                        <div className="space-y-2">
                                            {urgentes.sort((a,b) => { const aA = (a.transporteur||'').toLowerCase().includes('amana'); const bA = (b.transporteur||'').toLowerCase().includes('amana'); if (aA && !bA) return -1; if (!aA && bA) return 1; return a.reference - b.reference; }).map(order => {
                                                const tousArticles = orders.filter(a => a.reference === order.reference);
                                                const active = isActive(order);
                                                const taille = getTailleOrder(order);
                                                const isAmana = (order.transporteur || '').toLowerCase().includes('amana');
                                                return (
                                                    <div key={order.id} className={`flex items-center justify-between rounded-xl p-4 shadow-sm border-2 transition-all ${isAmana ? 'bg-red-50 border-red-400' : active ? 'bg-green-50 border-green-400' : 'bg-gray-50 border-gray-200 opacity-40'}`}>
                                                        <div>
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <button onClick={() => openOrderRecap(order.reference)} className="font-bold text-blue-600 hover:underline text-lg">#{order.reference}</button>
                                                                {isAmana && <span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">🇲🇦 Amana — PRIORITÉ</span>}
                                                                <span className="text-xs bg-green-500 text-white px-2 py-0.5 rounded-full font-bold">Dernière pièce !</span>
                                                                {taille && <span className="text-xs px-2 py-0.5 rounded-full font-bold bg-blue-100 text-blue-700">T.{taille}</span>}
                                                                {activeListId === 'global' && lists && (() => { const l = lists.find(li => li.orders.some(o => o.id === order.id)); return l ? <span className="text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full font-semibold">📋 {l.name}</span> : null; })()}
                                                                {(() => { const entry = Object.entries(casiersData || {}).find(([, v]) => String(v.commande) === String(order.reference)); return entry ? <span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-bold">📦 Box {entry[1].casierNum || entry[0]}</span> : null; })()}
                                                            </div>
                                                            <p className="text-sm text-gray-600 mt-0.5">{order.client}</p>
                                                            <p className="text-xs text-green-600 mt-0.5">✅ {tousArticles.length - 1} autre(s) article(s) déjà prêt(s)</p>
                                                            {order.commentaires && <p className="text-xs text-orange-700 bg-orange-100 border border-orange-300 rounded-lg px-2 py-1 mt-1 font-semibold">💬 {order.commentaires}</p>}
                                                        </div>
                                                        {active && <button onClick={() => handleReception(order)} className="px-4 py-2 bg-green-500 hover:bg-green-600 text-white text-sm font-semibold rounded-lg transition">✅ Déposé</button>}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* Commandes normales */}
                                {normales.length > 0 && (
                                    <div>
                                        {urgentes.length > 0 && <p className="text-xs text-gray-400 uppercase font-semibold mb-2 tracking-wide">Autres commandes</p>}
                                        <div className="space-y-2">
                                            {normales.sort((a,b) => { const aA = (a.transporteur||'').toLowerCase().includes('amana'); const bA = (b.transporteur||'').toLowerCase().includes('amana'); if (aA && !bA) return -1; if (!aA && bA) return 1; return a.reference - b.reference; }).map(order => {
                                                const active = isActive(order);
                                                const taille = getTailleOrder(order);
                                                const isAmana = (order.transporteur || '').toLowerCase().includes('amana');
                                                return (
                                                    <div key={order.id} className={`flex items-center justify-between rounded-xl p-4 border transition-all ${isAmana ? 'bg-red-50 border-red-300' : active ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200 opacity-40'}`}>
                                                        <div>
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <button onClick={() => openOrderRecap(order.reference)} className="font-bold text-blue-600 hover:underline">#{order.reference}</button>

            const genererCasiers = (cfg) => {
                const casiers = [];
                let num = 1;
                const etagesEffectifs = (base) => cfg.etage6Actif ? base + 1 : base;

                // 1. Colonne gauche
                for (let e = 0; e < cfg.colonneGauche.etageres; e++) {
                    for (let et = 0; et < etagesEffectifs(cfg.colonneGauche.etages); et++) {
                        for (let c = 0; c < cfg.colonneGauche.casiersParEtage; c++) {
                            casiers.push({ num, zone: 'gauche', etagere: e, etage: et, casier: c });
                            num++;
                        }
                    }
                }

                // 2. Rangées du milieu (serpent)
                for (let r = 0; r < cfg.rangeesMilieu.nb; r++) {
                    const descendre = r % 2 === 0;
                    const etageres = Array.from({length: cfg.rangeesMilieu.etageresParRangee}, (_, i) => i);
                    const ordered = descendre ? etageres : [...etageres].reverse();
                    for (let e of ordered) {
                        for (let et = 0; et < etagesEffectifs(cfg.rangeesMilieu.etages); et++) {
                            for (let c = 0; c < cfg.rangeesMilieu.casiersParEtage; c++) {
                                casiers.push({ num, zone: `milieu_${r}`, etagere: e, etage: et, casier: c });
                                num++;
                            }
                        }
                    }
                }

                // 3. Fond
                for (let e = 0; e < cfg.fond.etageres; e++) {
                    for (let et = 0; et < etagesEffectifs(cfg.fond.etages); et++) {
                        for (let c = 0; c < cfg.fond.casiersParEtage; c++) {
                            casiers.push({ num, zone: 'fond', etagere: e, etage: et, casier: c });
                            num++;
                        }
                    }
                }

                // 4. Étagères bonus (gros volume)
                if (cfg.bonusActif) {
                    for (let e = 0; e < 2; e++) {
                        for (let et = 0; et < etagesEffectifs(5); et++) {
                            for (let c = 0; c < 4; c++) {
                                casiers.push({ num, zone: `bonus_${e}`, etagere: e, etage: et, casier: c });
                                num++;

                        }
                    }

                return casiers;

                    setCasiersData(data);

                    setLoading(false);

                return () => unsubscribe();
            }, []);

            // Initialiser la collection — assigner les commandes aux casiers
            const initialiserCollection = async () => {
                const refs = [...new Set(orders.map(o => o.reference))].sort((a, b) => {
                    const listIdxA = lists ? lists.findIndex(l => l.orders.some(o => String(o.reference) === String(a))) : -1;
                    const listIdxB = lists ? lists.findIndex(l => l.orders.some(o => String(o.reference) === String(b))) : -1;
                    if (listIdxA !== listIdxB) return listIdxA - listIdxB;
                    return a - b;
                });
                
                // Relire Firebase pour avoir les données les plus récentes
                const currentCasiers = await window.firebaseGetCasiers();
                
                // Commandes déjà assignées

                const casiers = genererCasiers(config);
                // Casiers déjà utilisés
                const casiersUtilises = new Set(Object.values(currentCasiers).map(v => v.casierNum));
                const casiersLibres = casiers.filter(c => !casiersUtilises.has(c.num));
                
                const nouvellesAssignations = {};
                nouvellesCommandes.forEach((ref, i) => {

                        {/* Config panel */}
                        {showConfig && isAdmin && (

                    .section-title { font-size: 11px; background: #16a34a; color: white; padding: 5px 10px; margin-bottom: 0; }
                    .page-header-mini { font-size: 8px; color: #666; display: flex; justify-content: space-between; padding: 2px 4px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }

                    .section-title { font-size: 11px; background: #16a34a; color: white; padding: 5px 10px; margin-bottom: 0; }
                    .page-header-mini { display: flex; justify-content: space-between; font-size: 8px; color: #666; padding: 2px 4px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }

                    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
                    thead th { background: #f0fdf4; border: 1px solid #ccc; padding: 4px; text-align: center; font-size: 9px; font-weight: bold; white-space: nowrap; }
                    thead th.col-produit { text-align: left; width: 200px; }
                    thead th.col-img { width: 150px; }
                    thead th.col-num { width: 42px; }
                    thead th.col-comment { text-align: left; }

                    td { border: 1px solid #e5e7eb; padding: 2px 4px; text-align: center; vertical-align: middle; }
                    td.col-produit { text-align: left; font-weight: 600; font-size: 11px; line-height: 1.4; width: 200px; }
                    td.col-img { padding: 2px; width: 150px; height: 110px; }
                    td.col-img img { width: 144px; height: 106px; object-fit: cover; border-radius: 4px; display: block; margin: auto; }
                    td.col-num { font-size: 15px; font-weight: bold; color: #16a34a; width: 42px; }
                    td.col-num.done { color: #9ca3af; text-decoration: line-through; }
                    td.col-num.zero { color: #d1d5db; font-weight: normal; font-size: 11px; }
                    td.col-option { font-size: 9px; color: #6b7280; width: 42px; }
                    td.col-comment { text-align: left; padding: 3px 5px; font-size: 9px; }
                    .comment-badge { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 8px; margin: 1px; line-height: 1.5; }
                    tr.row-done td { background: #fff7ed; opacity: 0.7; }
                    tr.row-alt:not(.row-done) td { background: #f3f4f6; }

                    @media print {
                        .no-print { display: none !important; }
                        body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    }
                </style></head><body>
                <button class="no-print" id="btn-print">🖨️ Imprimer</button>
                <div class="page-header">
                    <h1>✂️ Liste de coupe — ${liste.name}</h1>
                    <div class="meta">Exporté le ${dateStr} à ${timeStr}</div>
                </div>`;

                const renderRow = (row, colorIdx=0) => {
                    const numCells = row.cells.slice(2,-1).map((c,i)=>({val:parseInt(c)||0,idx:i+2})).filter(c=>c.val>0);
                    const allDone = numCells.length > 0 && numCells.every(c => row.cells_done && row.cells_done[c.idx]);
                    const altClass = colorIdx % 2 === 0 ? 'row-alt' : '';
                    let r = `<tr class="${allDone?'row-done':altClass}">`;
                    row.cells.slice(0,-1).forEach((cell, ci) => {
                        if (ci === 0) r += `<td class="col-produit">${cell}</td>`;
                        else if (ci === 1) r += `<td class="col-img">${cell ? `<img src="${cell}" onerror="this.style.display='none'">` : ''}</td>`;
                        else {
                            const val = parseInt(cell) || 0;
                            const isDone = row.cells_done && row.cells_done[ci];
                            if (isNaN(cell) || cell === '') r += `<td class="col-option">${cell}</td>`;
                            else if (val > 0) r += `<td class="col-num${isDone?' done':''}">${cell}</td>`;
                            else r += `<td class="col-num zero">0</td>`;
                        }
                    });
                    const comments = row.comments || {};
                    const cellComments = row.cell_comments || {};
                    const colors = {'Admin':'#fef9c3','Fatima':'#dcfce7','Sara':'#fce7f3'};
                    // Commentaires de ligne
                    const lineHtml = Object.entries(comments).map(([user, c]) => {
                        const txt = typeof c === 'object' ? c.text : c;
                        return `<span class="comment-badge" style="background:${colors[user]||'#f3f4f6'}">${user[0]}: ${txt}</span>`;
                    }).join('');
                    // Commentaires de cellule (tailles)
                    const cellHtml = Object.entries(cellComments).map(([ci, userComments]) => {
                        const header = row.headers && row.headers[parseInt(ci)] ? row.headers[parseInt(ci)] : 'Col'+ci;
                        return Object.entries(userComments).map(([user, c]) => {
                            const txt = typeof c === 'object' ? c.text : c;
                            return `<span class="comment-badge" style="background:#fecaca">[${header}] ${user[0]}: ${txt}</span>`;
                        }).join('');
                    }).join('');
                    const commentHtml = lineHtml + cellHtml;
                    r += `<td class="col-comment">${commentHtml || '<span style="color:#d1d5db">—</span>'}</td>`;
                    r += '</tr>';
                    return r;
                };

                const renderTheadRow = (headers) => {
                    let h = '<thead><tr>';
                    headers.forEach((hdr, hi) => {
                        if (hi === 0) h += `<th class="col-produit">${hdr}</th>`;
                        else if (hi === 1) h += `<th class="col-img">${hdr}</th>`;
                        else h += `<th class="col-num">${hdr}</th>`;
                    });
                    h += `<th class="col-comment">Commentaires</th></tr></thead>`;
                    return h;
                };

                const sectionsToRender = pdfSection === 'all'
                    ? SECTION_ORDER
                    : [pdfSection];

                sectionsToRender.forEach(section => {
                    const sectionRows = (bySection[section] || []).sort((a,b) => (a.cells[0]||'').localeCompare(b.cells[0]||'','fr'));
                    if (!sectionRows.length) return;
                    const headers = sectionRows[0].headers.slice(0,-1);

                    html += `<div class="section-wrap">`;
                    html += `<div class="section-title">${section}</div>`;
                    html += `<div class="page-header-mini"><span>${liste.name}</span><span>${dateStr}</span></div>`;
                    html += `<table>${renderTheadRow(headers)}`;
                    let lastProduit = null;
                    let colorIdx = 0;
                    let groupRows = [];
                    const flushGroup = () => {
                        if (!groupRows.length) return;
                        html += `<tbody class="product-group">`;
                        groupRows.forEach(r => { html += renderRow(r, colorIdx); });
                        html += `</tbody>`;
                        groupRows = [];
                    };
                    sectionRows.forEach(row => {
                        const produit = row.cells[0] || '';
                        if (produit !== lastProduit) {
                            flushGroup();
                            colorIdx++;
                            lastProduit = produit;
                        }
                        groupRows.push(row);
                    });
                    flushGroup();
                    html += '</table></div>';
                });

                html += `
                <script>
                    window.onload = function() {
                        document.getElementById('btn-print').onclick = function() { window.print(); };
                    };
                <\/script>
                </body></html>`;
                const blob = new Blob([html], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                setShowPdfModal(false);
            };

            const exportXLSX = async (listeId) => {
                const liste = listes.find(l => l.id === listeId);
                if (!liste) return;
                const snap = await window.firebaseGet(window.firebaseRef(db, 'listescoupe/' + listeId + '/lignes'));
                const rows = snap.val() || {};

                const SECTION_ORDER = ['Sans déclinaison','Taille personnalisée (50-62)','Taille + Largeur','Taille + Largeur + Option','Manteaux (Taille 1/2/3)','Enfants (2-14 ans)'];
                const bySection = {};
                Object.entries(rows).forEach(([key, row]) => {
                    if (!bySection[row.section]) bySection[row.section] = [];
                    const cells = row.c ? row.c.split('||') : [];
                    const headers = row.h ? row.h.split('||') : [];
                    bySection[row.section].push({ key, ...row, cells, headers });
                });

                const wb = window.XLSX.utils.book_new();

                // Toutes les sections présentes dans cet ordre, puis les autres
                const allSections = [
                    ...SECTION_ORDER.filter(s => bySection[s]),
                    ...Object.keys(bySection).filter(s => !SECTION_ORDER.includes(s))
                ];

                allSections.forEach(section => {
                    const sectionRows = (bySection[section] || []).sort((a,b) => (a.cells[0]||'').localeCompare(b.cells[0]||'','fr'));
                    if (!sectionRows.length) return;

                    const headers = sectionRows[0].headers.slice(0,-1);
                    const sheetData = [
                        [...headers, 'Commentaires']
                    ];

                    sectionRows.forEach(row => {
                        const cells = row.cells.slice(0,-1);
                        const rowData = cells.map((cell, ci) => {
                            if (ci === 0) return cell || '';
                            if (ci === 1) return cell || '';
                            const trimmed = (cell || '').trim();
                            return /^\d+$/.test(trimmed) ? parseInt(trimmed) : trimmed;
                        });
                        const comments = row.comments || {};
                        const cellComments = row.cell_comments || {};
                        const lineText = Object.entries(comments)
                            .map(([user, c]) => `${user}: ${typeof c === 'object' ? c.text : c}`)
                            .join(' | ');
                        // Commentaires cellule avec nom de colonne
                        const cellText = Object.entries(cellComments).map(([ci, userComments]) => {
                            const header = row.headers && row.headers[parseInt(ci)] ? row.headers[parseInt(ci)] : 'Col'+ci;
                            return Object.entries(userComments)
                                .map(([user, c]) => `[${header}] ${user}: ${typeof c === 'object' ? c.text : c}`)
                                .join(' | ');
                        }).join(' | ');
                        const commentText = [lineText, cellText].filter(Boolean).join(' | ');
                        sheetData.push([...rowData, commentText]);
                    });

                    const ws = window.XLSX.utils.aoa_to_sheet(sheetData);
                    const sheetName = section.substring(0, 31);
                    window.XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });

                window.XLSX.writeFile(wb, `ListeCoupe_${liste.name}_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.xlsx`);
                setShowPdfModal(false);
            };

            const openCommentPopup = (rowKey, row) => {
                const myComment = row.comments && row.comments[userName] ? row.comments[userName].text : '';
                setCommentInput(myComment);
                setCommentPopup({ rowKey, row });

            const [search, setSearch] = React.useState('');
            const [zoomPhoto, setZoomPhoto] = React.useState(null);

            // Charger la liste des listes de coupe
            React.useEffect(() => {
                const r = window.firebaseRef(db, 'listescoupe');
                const unsub = window.firebaseOnValue(r, snap => {
                    const val = snap.val() || {};
                    const arr = Object.entries(val).map(([id, v]) => ({ id, ...v }))
                        .sort((a, b) => a.createdAt - b.createdAt);
                    setListes(arr);
                    if (!activeListe && arr.length > 0) setActiveListe(arr[0].id);
                });
                return () => unsub();
            }, []);

            // Charger les lignes de la liste active
            React.useEffect(() => {
                if (!activeListe) return;
                const r = window.firebaseRef(db, 'listescoupe/' + activeListe + '/lignes');

                    setListeRows(snap.val() || {});
                });
                return () => unsub();
            }, [activeListe]);

            // Parse CSV
            const parseCSV = (text) => {
                const lines = text.split('\n').filter(l => l.trim());
                const sections = {};
                let currentSection = null;
                let headers = [];
                lines.forEach(line => {
                    const cells = line.split(';').map(c => c.replace(/^"|"$/g, '').trim());
                    if (cells[0].startsWith('===')) {
                        currentSection = cells[0].replace(/===/g, '').trim();
                        sections[currentSection] = { headers: [], rows: [] };
                        headers = [];
                    } else if (currentSection && headers.length === 0 && cells[0] === 'Produit') {
                        headers = cells;
                        sections[currentSection].headers = headers;
                    } else if (currentSection && headers.length > 0 && cells[0]) {
                        sections[currentSection].rows.push(cells);
                    }
                });
                return sections;
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const text = ev.target.result;
                    const parsed = parseCSV(text);
                    setImportData(parsed);
                    setImportName('Coupe ' + new Date().toLocaleDateString('fr-FR'));
                };
                reader.readAsText(file, 'utf-8');
            };

            const [importProgress, setImportProgress] = React.useState(0);

            const handleImport = async () => {
                if (!importData || !importName.trim()) return;
                setImporting(true);
                setImportProgress(0);
                try {
                    const id = 'lc_' + Date.now();

                    // 1. Créer l'entrée principale sans les lignes
                    await window.firebaseSet(window.firebaseRef(db, 'listescoupe/' + id), {
                        name: importName,
                        createdAt: Date.now(),
                        createdBy: userName
                    });

                    // 2. Préparer toutes les lignes
                    const allRows = [];
                    let idx = 0;
                    Object.entries(importData).forEach(([section, data]) => {
                        const hStr = data.headers.join('||');
                        data.rows.forEach((row) => {
                            allRows.push({
                                key: 'r' + (idx++),
                                data: { section, h: hStr, c: row.join('||'), done: false, comment: '', by: '', at: 0 }
                            });
                        });
                    });

                    // 3. Écrire par batch de 100
                    const BATCH = 100;
                    for (let i = 0; i < allRows.length; i += BATCH) {
                        const batch = allRows.slice(i, i + BATCH);
                        const updates = {};
                        batch.forEach(r => { updates['listescoupe/' + id + '/lignes/' + r.key] = r.data; });
                        await window.firebaseUpdate(window.firebaseRef(db, '/'), updates);
                        setImportProgress(Math.round((i + batch.length) / allRows.length * 100));
                    }

                    setActiveListe(id);
                    setShowImport(false);
                    setImportData(null);
                } catch(e) {
                    alert('Erreur import: ' + e.message);
                }
                setImporting(false);
                setImportProgress(0);
            };

            const toggleDone = async (rowKey, current) => {
                await window.firebaseUpdate(window.firebaseRef(db, 'listescoupe/' + activeListe + '/lignes/' + rowKey), {
                    done: !current, by: userName, at: Date.now()
                });
            };

            const toggleCell = async (rowKey, cellIdx, current) => {
                const path = 'listescoupe/' + activeListe + '/lignes/' + rowKey + '/cells_done/' + cellIdx;
                if (current) {
                    await window.firebaseRemove(window.firebaseRef(db, path));
                } else {
                    await window.firebaseSet(window.firebaseRef(db, path), true);
                }
            };

            const saveCellComment = async (rowKey, cellIdx, val, targetUser) => {
                const user = targetUser || userName;
                const path = 'listescoupe/' + activeListe + '/lignes/' + rowKey + '/cell_comments/' + cellIdx + '/' + user;
                if (!val || !val.trim()) {
                    await window.firebaseRemove(window.firebaseRef(db, path));
                } else {
                    await window.firebaseSet(window.firebaseRef(db, path), { text: val.trim(), at: Date.now() });
                }
            };

            const saveComment = async (rowKey, val) => {
                try {
                    const path = 'listescoupe/' + activeListe + '/lignes/' + rowKey + '/comments/' + userName;
                    if (!val.trim()) {
                        await window.firebaseRemove(window.firebaseRef(db, path));
                    } else {
                        await window.firebaseSet(window.firebaseRef(db, path), {
                            text: val.trim(), at: Date.now()
                        });
                    }
                    setCommentPopup(null);
                    setCommentInput('');
                } catch(e) {
                    alert('Erreur: ' + e.message);
                }
            };

            const deleteList = async (id) => {
                if (!confirm('Supprimer cette liste ?')) return;
                await window.firebaseRemove(window.firebaseRef(db, 'listescoupe/' + id));
                setActiveListe(null);
            };

            // Grouper les lignes par section puis par numéro de liste
            const SECTION_ORDER = [
                'Sans déclinaison', 'Taille personnalisée (50-62)',
                'Taille + Largeur', 'Taille + Largeur + Option',
                'Manteaux (Taille 1/2/3)', 'Enfants (2-14 ans)'
            ];

            const rowsBySection = {};
            Object.entries(listeRows).forEach(([key, row]) => {
                if (!rowsBySection[row.section]) rowsBySection[row.section] = [];
                rowsBySection[row.section].push({ key, ...row });
            });

            // Stats globales
            const totalRows = Object.keys(listeRows).length;
            const doneRows = Object.values(listeRows).filter(r => r.done).length;
            // Calcul basé sur les cellules validées
            const allCells = Object.values(listeRows).reduce((acc, r) => {
                const parsed = r.c ? r.c.split('||') : (r.cells || []);
                return acc + parsed.slice(2, -1).filter(c => !isNaN(c) && parseInt(c) > 0).length;
            }, 0);
            const doneCells = Object.values(listeRows).reduce((acc, r) => acc + (r.cells_done ? Object.keys(r.cells_done).length : 0), 0);
            const pct = allCells > 0 ? Math.round(doneCells / allCells * 100) : 0;

            const activeListeInfo = listes.find(l => l.id === activeListe);
            const listNums = activeListeInfo ? Object.keys(rowsBySection) : [];
            const displaySections = activeListeNum 
                ? [activeListeNum]
                : (SECTION_ORDER.filter(s => rowsBySection[s]) );

            return (
                <div className="p-3">
                    {/* Header */}
                    <div className="flex items-center gap-3 mb-4 flex-wrap">

                            </button>

                        {listes.length > 0 && (
                            <button onClick={() => { setPdfListeId(activeListe || listes[0]?.id); setShowPdfModal(true); }}
                                className="px-3 py-1.5 bg-red-600 text-white rounded-lg text-sm font-semibold hover:bg-red-700">
                                📤 Exporter
                            </button>
                        )}

                                    className={`px-3 py-1.5 rounded-lg text-sm font-semibold border transition ${!isActive ? 'bg-white text-gray-700 border-gray-300 hover:border-gray-400' : ''}`}>

                                </button>

                                />
                                {search && <button onClick={() => setSearch('')} className="absolute right-3 top-2 text-gray-400 hover:text-gray-600 text-sm">✕</button>}
                            </div>

                            {/* Onglets sections */}
                            <div className="flex gap-2 flex-wrap mb-3">

                                    className={`px-3 py-1 rounded-lg text-xs font-semibold border ${!activeListeNum ? '' : 'bg-white text-gray-600 border-gray-300'}`}>

                                setCellCommentInput={setCellCommentInput}
                                userName={userName}
                                themeAccent={themeAccent}
                            />
                        </>
                    )}

                    {activeListe && totalRows === 0 && (
                        <div className="text-center text-gray-400 py-12">Aucune donnée dans cette liste.</div>
                    )}
                    {!activeListe && listes.length === 0 && (
                        <div className="text-center text-gray-400 py-12">Aucune liste de coupe. {isAdmin ? 'Importez un CSV pour commencer.' : ''}</div>
                    )}

                    {/* Modal Import */}
                    {/* Modal Cellule */}
                    {cellPopup && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" onClick={() => setCellPopup(null)}>

                                <div className="flex justify-between items-center mb-3">

                                        {cellPopup.cellLabel} — {cellPopup.row.cells[0]}

                                    <button onClick={() => setCellPopup(null)} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>

                                {/* Commentaires existants */}
                                {cellPopup.row.cell_comments && cellPopup.row.cell_comments[cellPopup.cellIdx] && Object.keys(cellPopup.row.cell_comments[cellPopup.cellIdx]).length > 0 && (
                                    <div className="mb-3 space-y-1">

                                                    <span style={{fontSize:'11px',color:col.text}}>
                                                        <span style={{fontWeight:'bold'}}>{user}</span> : {c.text}

                                                    {(isAdmin || user === userName) && (
                                                        <button onClick={async () => {

        // ── SectionTables component ──
        function SectionTables({ displaySections, rowsBySection, search, toggleCell, setZoomPhoto, openCommentPopup, getColor, activeListe, canEditListe, setCellPopup, setCellCommentInput, userName, themeAccent }) {

                    .map(r => ({ cells: r.c ? r.c.split('||') : (r.cells || []) }))

                            .sort((a, b) => (a.cells[0] || '').localeCompare(b.cells[0] || '', 'fr'));

                                                const allCellsDone = numCells.length > 0 && numCells.every(c => row.cells_done && row.cells_done[c.idx]);
                                                const isOdd = globalNameColorMap[row.cells[0] || ''] % 2 === 1;

                                                                        background: isCellDone ? '#dcfce7' : (isNum && row.cell_comments && row.cell_comments[ci] && Object.keys(row.cell_comments[ci]).length > 0) ? '#fecaca' : 'transparent',

                                                                            </div>

                                                                })}
                                                                {/* Rien du tout */}

                                                                    <span style={{color:'#d1d5db',fontSize:'11px'}}>{canEditListe ? '+ ajouter' : '—'}</span>
                                                                )}

        // ===================== TOP PRODUITS =====================
        function TopProduitsCard({ orders }) {
            const [vue, setVue] = React.useState('produit');

            const cleanName = (raw) => (raw || '').replace(/\s*\(.*?\)/g, '').trim();

            const COULEURS = new Set([
                'noir','noire','black','blanc','blanche','white','gris','grise','grey','gray',
                'rouge','red','rose','pink','bleu','bleue','blue','vert','verte','green',
                'jaune','yellow','orange','violet','purple','lilas','beige','marron','brown',
                'camel','mocha','mokka','taupe','greige','ivoire','ecru','nude','creme','marine',
                'navy','bordeaux','burgundy','kaki','khaki','ocre','sable','corail','coral',
                'aubergine','terracotta','terracota','gold','dore','argent','silver','cognac',
                'caramel','chocolat','miel','latte','cappuccino','espresso','praline','noisette',
                'poudre','poudrée','poudré','emeraude','amande','grenat','cobalt',
                'indigo','saphir','saphyr','sapphire','turquoise','teal','aqua','cyan','lavande',
                'menthe','olive','anthracite','charbon','ebony','pearl','champagne','cuivre',
                'copper','bronze','sienna','rouille','rust','blush','peach','abricot','citron',
                'vanille','vanilla','cacao','stone','sand','clay','smoke','ash','coal','ivory',
                'mist','sage','plum','cerise','framboise','magenta','fuchsia','fushia',
                'nuit','roi','mate','satin','vif','doux','nacre','irise','brule','fume','velvet',
                'glace','intense','profond','deep','dark','light','bright','soft','baby','dusty',
                'pale','vivid','lime','mint','sky','forest','ocean','denim','electric','neon',
                'fluo','pastel','naturel','naturelle','multicolore',
            ].map(c => c.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')));

            const norm = (w) => (w||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
            const isCouleur = (w) => COULEURS.has(norm(w));

            const getModele = (raw) => {
                const cleaned = cleanName(raw);
                const words = cleaned.split(' ');
                let end = words.length;
                while (end > 1) {
                    const w = words[end - 1];
                    const prev = end >= 2 ? words[end - 2] : '';
                    const pprev = end >= 3 ? words[end - 3] : '';
                    if (isCouleur(w)) {
                        if (prev === '&' && isCouleur(pprev)) end -= 3;
                        else if (prev === '&') end -= 2;
                        else if (isCouleur(prev)) end -= 2;
                        else end -= 1;
                    } else { break; }
                }
                return words.slice(0, end).join(' ') || cleaned;
            };

            const buildCounts = () => {
                const counts = {};
                orders.forEach(o => {
                    if (!o.name) return;
                    const key = vue === 'produit' ? cleanName(o.name) : getModele(o.name);
                    if (!key) return;
                    counts[key] = (counts[key] || 0) + 1;
                });
                return Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'fr'));
            };

            const sorted = buildCounts();
            const sortedAlpha = [...sorted].sort((a,b) => a[0].localeCompare(b[0],'fr'));
            const max = sorted[0]?.[1] || 1;
            const total = sorted.reduce((s,[,q]) => s+q, 0);

            // Grouper par modèle pour la colonne C
            const buildGroups = () => {
                // Pour chaque produit (trié alpha), calculer le total de son modèle
                const modeleTotals = {};
                sortedAlpha.forEach(([name, qty]) => {
                    const modele = getModele(name);
                    modeleTotals[modele] = (modeleTotals[modele] || 0) + qty;
                });
                // Construire les groupes : [{modele, produits:[{name,qty}], total}]
                const groups = [];
                let lastModele = null;
                sortedAlpha.forEach(([name, qty]) => {
                    const modele = getModele(name);
                    if (modele !== lastModele) {
                        groups.push({ modele, produits: [], total: modeleTotals[modele] });
                        lastModele = modele;
                    }
                    groups[groups.length - 1].produits.push({ name, qty });
                });
                return groups;
            };

            const exportListePDF = () => {
                const dateStr = new Date().toLocaleDateString('fr-FR');
                const groups = buildGroups();
                let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
                <title>Produits vendus</title>
                <style>
                    @page { size: A4 portrait; margin: 15mm; }
                    body { font-family: Arial, sans-serif; font-size: 11px; color: #111; }
                    .header { display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #16a34a; padding-bottom: 8px; margin-bottom: 12px; }
                    h1 { font-size: 14px; color: #16a34a; margin:0; }
                    .meta { font-size: 9px; color: #666; }
                    table { width:100%; border-collapse:collapse; }
                    th { background:#f0fdf4; border:1px solid #ccc; padding:5px 8px; font-size:10px; }
                    th:first-child { text-align:left; }
                    th.qty, th.total { text-align:center; width:70px; }
                    td { border:1px solid #e5e7eb; padding:4px 8px; vertical-align:middle; }
                    td.qty { text-align:center; font-weight:bold; color:#16a34a; width:70px; }
                    td.total { text-align:center; font-weight:bold; color:#1d4ed8; width:70px; vertical-align:middle; font-size:13px; }
                    tr:nth-child(even) td:not(.total) { background:#fafafa; }

                        let articles = v.articles;

                            articles = [{ produit: v.produit || '', couleurTaille: v.couleurTaille || '', description: v.description || '', photoUrl: v.photoUrl || '', status: v.status || 'En attente' }];

                            articles = Object.values(articles);

                        return { id, cliente: v.cliente || '', reference: v.reference || '', createdAt: v.createdAt || 0, updatedAt: v.updatedAt || 0, updatedBy: v.updatedBy || '', articles };
